              h('div',{style:{fontSize:16,fontWeight:800,color:['var(--emerald)','#FFB23E','#A78BFA'][i]}},t.couponTargetPct > 0 ? t.couponTargetPct+'%' : 'Residual'),
              h('div',{style:{fontSize:10,color:'var(--txt-mute)',marginTop:2}},i===0?'Cobra primero':i===1?'Cobra segundo':'Absorbe la mora')))))),

      // pregunta a la IA
      h('div',{className:'card',style:{marginBottom:14}},
        h('div',{style:{fontSize:12,fontWeight:700,color:'var(--txt-mute)',marginBottom:8}},'💬 Preguntar a la IA sobre los parámetros'),
        h('div',{style:{display:'flex',gap:8}},
          h('input',{value:aiQuestion,onChange:e=>setAiQuestion(e.target.value),onKeyDown:e=>{if(e.key==='Enter')askAI();},placeholder:'¿Por qué soulbound=true? ¿Qué pasa si habilitamos USA?',style:{...fs,flex:1}}),
          h('button',{className:'btn btn-ghost btn-sm',onClick:askAI,disabled:aiLoading||!aiQuestion.trim()},aiLoading?'…':'Preguntar')),
        aiAnswer && h('div',{style:{marginTop:10,fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,padding:'10px 12px',borderRadius:8,background:'rgba(0,0,0,.3)'}},aiAnswer)),

      // acciones
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}},
        h('button',{className:'btn btn-ghost btn-sm',onClick:aiValidate,disabled:aiLoading},'✦ IA: validar parámetros'),
        !deployed
          ? h('button',{className:'btn btn-primary',onClick:deployDemo},'⚡ Configurar contrato (demo)')
          : h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              h('span',{style:{fontSize:12,color:'var(--emerald)',fontWeight:700}},'✓ Contrato configurado'),
              h('span',{style:{fontSize:11,color:'var(--txt-mute)'}},'Activá enableEmission en el gate de gobernanza para habilitar la emisión.'))
      )
    )
  );
}

/* ════════════════════════════════════════════════════════════════════
   EmissionStatus — panel del emisor: estado del contrato en su panel
   ════════════════════════════════════════════════════════════════════ */
function EmissionStatus({chain, project, toast, wallet}) {
  const [pid, setPid] = useState(0);
  const p = project || (chain.projects && chain.projects[pid]) || {};
  const status = p.emissionStatus;
  const enabled = p.emissionEnabled && p.emissionEnabled[0];
  const paused  = p.emissionPaused;
  const params  = p.emissionParams;
  const [deploying, setDeploying] = useState(false);
  const [deployResult, setDeployResult] = useState(null);

  async function handleDeploy() {
    if (!chain.deployToken) return;
    setDeploying(true);
    setDeployResult(null);
    try {
      const result = await chain.deployToken(p);
      setDeployResult(result);
      if (result.ok) {
        toast && toast({ title: 'Token desplegado', msg: `${p.symbol} en ${result.tokenAddr.slice(0,10)}… · gas: ${result.gasPOL} POL` });
      } else {
        toast && toast({ type:'err', title: 'Error al desplegar', msg: result.reason || 'Transacción revertida' });
      }
    } catch(e) {
      toast && toast({ type:'err', title: 'Error inesperado', msg: e.message });
    } finally { setDeploying(false); }
  }

  // Selector de proyecto si hay más de uno
  const projectSelector = (chain.projects||[]).length > 1 && h('div',{style:{marginBottom:14}},
    h('select',{value:pid,onChange:e=>setPid(+e.target.value),style:{padding:'7px 12px',borderRadius:8,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:12.5,width:'100%'}},
      (chain.projects||[]).map((x,i)=>h('option',{key:i,value:i},`${x.symbol} — ${x.name}`)))
  );

  // ── Tarjeta de deploy (Estrategia A) — Ronda 5 sin token desplegado ──────────
  if (p.ronda >= 5 && !p.tokenDeployed) {
    return h('div',{},
      projectSelector,
      h('div',{style:{
        background:'linear-gradient(135deg,rgba(0,214,126,.07) 0%,rgba(77,168,255,.07) 100%)',
        border:'1.5px solid rgba(0,214,126,.35)',
        borderRadius:16, padding:'28px 24px', marginBottom:16,
      }},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16}},
          h('div',{style:{width:44,height:44,borderRadius:12,background:'rgba(0,214,126,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}},'🚀'),
          h('div',{},
            h('div',{style:{fontWeight:800,fontSize:15,color:'var(--txt)',marginBottom:2}},'Estructuración Aprobada por TOKAI'),
            h('span',{style:{fontSize:10.5,fontWeight:700,padding:'2px 8px',borderRadius:20,background:'rgba(0,214,126,.15)',color:'var(--emerald)'}},'RONDA 5 · LISTO PARA DEPLOY'))),

        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:18}},
          [['Símbolo',p.symbol||'—'],['Supply máx',(p.maxSupply||0).toLocaleString()],['Estándar',p.tokenStandard||'ERC-3643']].map(([k,v],i)=>
            h('div',{key:i,style:{padding:'10px 12px',borderRadius:9,background:'rgba(255,255,255,.04)',border:'1px solid var(--line-solid)'}},
              h('div',{style:{fontSize:10,color:'var(--txt-mute)',marginBottom:3}},k),
              h('div',{style:{fontWeight:700,fontSize:13}},v)))),

        deployResult && deployResult.ok && h('div',{style:{marginBottom:14,padding:'10px 14px',borderRadius:9,background:'rgba(0,214,126,.08)',border:'1px solid rgba(0,214,126,.25)',fontSize:12}},
          h('div',{style:{fontWeight:700,color:'var(--emerald)',marginBottom:4}},'✓ Token desplegado'),
          h('div',{style:{color:'var(--txt-dim)',fontFamily:'JetBrains Mono,monospace',fontSize:11,wordBreak:'break-all'}},deployResult.tokenAddr),
          deployResult.gasPOL && h('div',{style:{marginTop:4,color:'var(--txt-mute)',fontSize:11}},`Gas pagado: ${deployResult.gasPOL} POL`),
          deployResult.warning && h('div',{style:{marginTop:8,padding:'8px 10px',borderRadius:7,background:'rgba(255,178,62,.1)',border:'1px solid rgba(255,178,62,.25)',color:'#FFB23E',fontSize:11,lineHeight:1.5}},
            '⚠ ',deployResult.warning)),

        deployResult && !deployResult.ok && h('div',{style:{marginBottom:14,padding:'10px 14px',borderRadius:9,background:'rgba(255,92,92,.08)',border:'1px solid rgba(255,92,92,.2)',fontSize:12,color:'#FF5C5C'}},
          '⚠ ',deployResult.reason),

        !deployResult?.ok && h('div',{},
          !enabled && h('div',{style:{
            background:'rgba(255,178,62,.04)',
            border:'1px solid rgba(255,178,62,.2)',
            padding:'12px 14px',
            borderRadius:10,
            marginBottom:14,
            fontSize:12.5,
            color:'#FFB23E',
            lineHeight:1.5
          }},
            '⚠️ Para poder desplegar el contrato del token en la red, TOKAI debe completar el checklist de 7 requisitos pre-emisión y habilitar el gate de la serie desde su panel de supervisión.'
          ),
          h('p',{style:{fontSize:12,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:14}},
            'Hacé clic para desplegar el contrato ' + (p.tokenStandard || 'ERC-3643') + ' en Polygon PoS vía TokenFactory.',
            h('br'),
            'MetaMask te pedirá confirmar la transacción y pagar el gas en POL.',
            h('br'),
            h('span',{style:{color:'var(--txt-mute)',fontSize:11}},'El contrato se registra en TOKAI y el proyecto avanza a la Ronda 6 (Emisión activa).')),
          h('button',{
            className:'btn btn-primary',
            style:{
              width:'100%',
              padding:'11px',
              fontSize:14,
              fontWeight:700,
              opacity: (!enabled || deploying) ? 0.5 : 1,
              cursor: (!enabled || deploying) ? 'not-allowed' : 'pointer'
            },
            onClick: enabled ? handleDeploy : undefined,
            disabled: !enabled || deploying,
          }, deploying ? '⏳ Desplegando…' : !enabled ? '🔐 Desplegar Token (Esperando Habilitación TOKAI)' : '🔐 Desplegar Token (MetaMask)'))
      )
    );
  }

  if (!status && !params) return h('div',{},
    projectSelector,
    h('div',{style:{padding:'14px 16px',borderRadius:10,background:'rgba(255,255,255,.03)',border:'1px solid var(--line-solid)',fontSize:12.5,color:'var(--txt-mute)'}},
      '📋 TOKAI está preparando los parámetros del contrato para tu proyecto. Te notificaremos cuando estés listo para emitir.'));

  const MECH = {A:'Renta periódica',B:'Waterfall de crédito',C:'Sin yield (acceso/certificado)'};

  return h('div',{},
    projectSelector,
    h('div',{className:'card'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      h('div',{style:{fontWeight:700,fontSize:13}},'Estado de emisión'),
      h('span',{style:{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,
        background:paused?'rgba(255,92,92,.15)':enabled?'rgba(0,214,126,.15)':'rgba(154,160,166,.12)',
        color:paused?'#FF5C5C':enabled?'var(--emerald)':'#9AA0A6'}},
        paused?'⏸ Pausada':enabled?'⚡ Habilitada':'⏳ Configurada — esperando habilitación')),

    params && h('div',{style:{display:'grid',gap:6}},
      [
        ['Tipo de contrato', p.contractType || 'TOKAIToken'],
        ['Certificados/tokens', p.soulbound ? 'Soulbound (intransferibles)' : 'Transferibles (mercado OTC)'],
        ['Inversores máx.', p.maxHolders || 'Sin límite'],
        ['Lock-up', p.lockupDays ? p.lockupDays+' días' : 'Sin lock-up'],
        ['Mecanismo de flujo', MECH[p.yieldMechanism] || '—'],
      ].map(([k,v],i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderBottom:i<4?'1px solid rgba(255,255,255,.04)':'none'}},
        h('span',{style:{color:'var(--txt-mute)'}},k),h('span',{style:{fontWeight:600,color:'var(--txt)'}},String(v))))),

    !enabled && !paused && h('div',{style:{marginTop:10,fontSize:12,color:'var(--txt-mute)',lineHeight:1.5}},
      'Cuando TOKAI active la emisión, podrás emitir tokens directamente desde tu panel. Los inversores con KYC aprobado podrán suscribir.'),

    enabled && !paused && h('div',{style:{marginTop:10,padding:'10px 12px',borderRadius:8,background:'rgba(0,214,126,.06)',border:'1px solid rgba(0,214,126,.2)',fontSize:12,color:'var(--txt-dim)'}},
      '✓ Podés emitir. Andá a la pestaña "Emisión" en el panel de administración para mintear tokens a inversores verificados.')
    )  // cierre h('div',{className:'card'})
  );   // cierre h('div',{})
}


/* ════════════════════════════════════════════════════════════════════
   MÓDULO E · ReportExporter
   Genera el Reporte del Modelo de Negocio e importa desde Claude.ai
   ════════════════════════════════════════════════════════════════════ */
function ReportExporter({chain, toast}) {
  const projects = chain.projects||[];
  const [pid, setPid] = useState(0);
  const p = projects[pid]||projects[0]||{};
  const [mode, setMode] = useState('export'); // 'export' | 'import' | 'preview'
  const [generating, setGenerating] = useState(false);
  const [reportMd, setReportMd] = useState(p.businessReport||'');
  const [importText, setImportText] = useState('');
  const [copied, setCopied] = useState(false);

  /* Genera el reporte via IA */
  async function generateReport() {
    setGenerating(true);
    try {
      const ctx = [
        `Proyecto: ${p.name} (${p.symbol})`,
        `Vertical: ${p.vertical} | Activo: ${p.assetType||'—'}`,
        `Valuación: USD ${(p.valuationUsd||0).toLocaleString()} | Precio token: USD ${(p.priceUsdCents||0)/100}`,
        `Supply máx: ${p.maxSupply||'—'} tokens | Régimen: ${p.regime||'—'}`,
        `Mecanismo: ${p.yieldMechanism||'A'} | Yield est: ${p.yieldAnnualPct||0}% anual`,
        `Descripción: ${p.desc||'—'}`,
        p.pitch?.porque ? `Pitch del emisor: ${p.pitch.porque.slice(0,300)}` : '',
        p.thesis?.blocks ? `Tesis de valor: ${p.thesis.blocks.map(b=>b.titulo+': '+(b.contenido||b.items?.join(', ')||'')).join(' | ').slice(0,400)}` : '',
      ].filter(Boolean).join('\n');

      const prompt = `Generá el Reporte del Modelo de Negocio del Token para este proyecto.

El reporte debe cubrir:
1. RESUMEN EJECUTIVO — qué es el token, qué problema resuelve, por qué tokenizar vs. instrumentos tradicionales
2. NATURALEZA JURÍDICA DEL TOKEN — clasificación (security/utility/híbrido), Howey Test, régimen aplicable (CNV RG 1069/1088), encuadre legal
3. MODELO DE NEGOCIO — activo subyacente, cómo genera valor, quién opera, cuál es la cadena de valor
4. ESTRUCTURA FINANCIERA — proyección de flujos (3 escenarios: pesimista/base/optimista), yield estimado, métricas clave (NOI/cap rate si inmobiliario, LTV/mora si crédito), waterfall si aplica
5. MECANISMO DE DISTRIBUCIÓN — cómo y cuándo cobra el holder (Mecanismo A/B/C), frecuencia, moneda, canal de pago
6. ESTRUCTURA TÉCNICA — estándar de token (ERC-3643), compliance (soulbound, lock-up, geo-blocking), vehículo legal (fideicomiso/SPV)
7. RIESGOS Y MITIGACIONES — mínimo 4 riesgos concretos del proyecto con su mitigación propuesta
8. HOJA DE RUTA — próximos hitos hasta la emisión

Formato: Markdown con encabezados claros. Usá tablas para datos financieros. Tono institucional, rioplatense. Las proyecciones van con supuestos explícitos — nunca garantizás retornos.`;

      const res = await fetch((window.__API_URL__||'')+'/ai/chat', {
        method:'POST',
        credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mode:'report', messages:[{role:'user',content:ctx}], context:ctx.slice(0,800)})
      });
      if(!res.ok){ toast&&toast({type:'err',title:'Error',msg:'No se pudo conectar con la IA.'}); setGenerating(false); return; }
      const data = await res.json();
      const report = data.text||'Error al generar el reporte.';
      setReportMd(report);
      setMode('preview');
      if(chain.updateProject) chain.updateProject(pid, {businessReport: report});
      toast&&toast({title:'Reporte generado', msg:'Revisá, editá si necesitás, y enviá al cliente.'});
    } catch(e) {
      toast&&toast({type:'err', title:'Error', msg:'No se pudo conectar con la IA.'});
    } finally { setGenerating(false); }
  }

  /* Importar reporte generado en Claude.ai (pegado manual) */
  function importReport() {
    if(!importText.trim()) return;
    setReportMd(importText.trim());
    if(chain.updateProject) chain.updateProject(pid, {businessReport: importText.trim()});
    setMode('preview');
    setImportText('');
    toast&&toast({title:'Reporte importado', msg:'El reporte quedó vinculado al proyecto.'});
  }

  /* Copiar prompt listo para pegar en Claude.ai */
  function copyClaudePrompt() {
    const ctx = `Proyecto: ${p.name} | ${p.vertical} | USD ${(p.valuationUsd||0).toLocaleString()} | ${p.regime||''} | ${p.desc||''}`;
    const prompt = `Actuá como TOKAI RWA. Generá el Reporte del Modelo de Negocio del Token para este proyecto:\n\n${ctx}\n\nCubrí: naturaleza jurídica, modelo de negocio, estructura financiera (3 escenarios), mecanismo de distribución, estructura técnica, riesgos y hoja de ruta. Formato Markdown con tablas. Rioplatense institucional.`;
    navigator.clipboard&&navigator.clipboard.writeText(prompt);
    setCopied(true);
    setTimeout(()=>setCopied(false), 2500);
  }

  const ta = {width:'100%', padding:'11px 13px', borderRadius:10, border:'1px solid var(--line-solid)',
    background:'var(--black)', color:'var(--txt)', fontSize:12, fontFamily:'var(--mono)',
    resize:'vertical', boxSizing:'border-box', lineHeight:1.6};

  return h('div',{},
    h('div',{className:'eyebrow'},'Panel TOKAI · Reporte'),
    h('h1',{className:'page'},'Reporte del Modelo de Negocio'),
    h('p',{className:'page-sub'},'Generá o importá el reporte de análisis. Este documento se vincula al proyecto y sustenta la Tesis de Valor que el cliente confirma.'),

    /* selector proyecto */
    projects.length>1 && h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      projects.map((pr,i)=>h('button',{key:i,onClick:()=>{setPid(i);setReportMd(pr.businessReport||'');setMode('export');},
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,
          border:'1.5px solid '+(i===pid?'var(--emerald)':'var(--line-solid)'),
          background:i===pid?'rgba(0,214,126,.08)':'var(--panel)',
          color:i===pid?'var(--emerald)':'var(--txt)'}},pr.name))),

    /* tabs */
    h('div',{className:'role-switch',style:{marginBottom:16,width:'fit-content'}},
      [['export','Generar con IA'],['import','Importar desde Claude.ai'],['preview','Ver reporte']].map(([k,l])=>
        h('button',{key:k,className:'role-btn '+(mode===k?'active':''),onClick:()=>setMode(k)},l))),

    /* TAB: Generar con IA embebida */
    mode==='export' && h('div',{},
      h('div',{className:'card',style:{marginBottom:14}},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'Generación automática (IA embebida)'),
        h('p',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:14}},'La IA de la plataforma genera el reporte usando el knowledge base completo de TOKAI + los datos del proyecto. Revisá y editá el resultado antes de enviarlo al cliente.'),
        h('div',{style:{padding:'10px 13px',borderRadius:8,background:'rgba(0,214,126,.06)',border:'1px solid rgba(0,214,126,.15)',fontSize:12,color:'var(--txt-dim)',marginBottom:14}},
          '✦ Usa el knowledge base actualizado: metodología 6 rondas, regulatorio ARG/USA/EU, verticales, métricas de crédito, casos de referencia.'),
        h('button',{className:'btn btn-primary',disabled:generating,onClick:generateReport},
          generating?'Generando reporte…':'✦ Generar reporte con IA')),

      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'O generalo en Claude.ai y pegalo acá'),
        h('p',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:12}},'Para análisis más profundos (stress test completo, waterfall detallado, casos edge), generá el reporte en tu chat de Claude.ai con el contexto completo del proyecto y pegalo en la pestaña "Importar".'),
        h('button',{className:'btn btn-ghost btn-sm',onClick:copyClaudePrompt},
          copied?'✓ Copiado':'Copiar prompt para Claude.ai →'))),

    /* TAB: Importar */
    mode==='import' && h('div',{className:'card'},
      h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'Pegar reporte desde Claude.ai'),
      h('p',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:12}},'Generá el reporte en claude.ai/chat con el prompt completo del proyecto, copiá el resultado en Markdown y pegalo acá.'),
      h('textarea',{value:importText,rows:14,onChange:e=>setImportText(e.target.value),
        placeholder:'# Reporte del Modelo de Negocio — [Nombre del Proyecto]\n\n## 1. Resumen ejecutivo\n...',
        style:ta}),
      h('div',{style:{display:'flex',gap:10,marginTop:12}},
        h('button',{className:'btn btn-primary',disabled:!importText.trim(),onClick:importReport},'Importar reporte'),
        h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setMode('export')},'Cancelar'))),

    /* TAB: Preview del reporte */
    mode==='preview' && h('div',{},
      reportMd ? h('div',{},
        h('div',{className:'card',style:{marginBottom:12}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
            h('div',{style:{fontWeight:700,fontSize:13}},p.name+' · Reporte del Modelo de Negocio'),
            h('div',{style:{display:'flex',gap:8}},
              h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{navigator.clipboard&&navigator.clipboard.writeText(reportMd);toast&&toast({title:'Copiado',msg:'Reporte copiado como Markdown'});}},
                'Copiar MD'),
              h('button',{className:'btn btn-primary btn-sm',
                onClick:()=>{if(chain.updateProject)chain.updateProject(pid,{businessReport:reportMd,reportSentToClient:true});toast&&toast({title:'Reporte enviado al cliente',msg:'El cliente puede revisarlo en su panel.'});},
              },'Enviar al cliente →')))),
        h('div',{style:{padding:'20px',borderRadius:12,background:'var(--black)',border:'1px solid var(--line-solid)',whiteSpace:'pre-wrap',fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.7,fontFamily:'inherit',maxHeight:600,overflow:'auto'}},
          reportMd),
        h('textarea',{value:reportMd,rows:3,onChange:e=>{setReportMd(e.target.value);if(chain.updateProject)chain.updateProject(pid,{businessReport:e.target.value});},
          placeholder:'Editá el reporte si necesitás ajustes…',
          style:{...ta,marginTop:10}}))
      : h('div',{style:{textAlign:'center',padding:'32px',color:'var(--txt-mute)',fontSize:13}},
        'Todavía no hay reporte para este proyecto. Generalo con IA o importalo desde Claude.ai.')
    )
  );
}


/* ════════════════════════════════════════════════════════════════════
   MÓDULO B · EmissionChecklist — 7 requisitos bloqueantes pre-emisión
   Req 6 (PSAV): lee isPsavActive(project) en lugar de input manual.
   Para soulbound/issuer-mode: el req 6 se cumple automáticamente.
   ════════════════════════════════════════════════════════════════════ */
function EmissionChecklist({chain, toast, pid:pidProp}) {
  const projects = chain.projects||[];
  const [pid, setPid] = useState(pidProp||0);
  const p = projects[pid]||projects[0]||{};

  /* Único campo manual restante: fiduciario */
  const [fiduciario, setFiduciario] = useState(p.fiduciario||'');
  const [docLegal, setDocLegal]     = useState(p.docLegalConfirmado||false);
  const [saved, setSaved]           = useState(false);

  /* Helpers del módulo KYC — disponibles globalmente desde views_kyc.js */
  const kycMode      = typeof resolveKycMode !== 'undefined' ? resolveKycMode(p) : 'psav';
  const psavOk       = typeof isPsavActive   !== 'undefined' ? isPsavActive(p)   : !!(p.psav && p.psavActivated);
  const activePsav   = typeof getActivePsav  !== 'undefined' ? getActivePsav(p)  : null;
  const psavLabel    = psavOk
    ? '✓ ' + (activePsav ? activePsav.name : p.psav||'PSAV') + ' activo · ' + (activePsav ? activePsav.categoryLabel : '')
    : kycMode === 'issuer'
      ? '✓ Modo emisor (soulbound sin régimen CNV) — no requiere PSAV'
      : '⚠ Sin PSAV activo — ir a Panel TOKAI → PSAV';
  const psavReqOk    = psavOk || kycMode === 'issuer';

  /* Evaluación automática de los 7 requisitos */
  const checks = [
    {
      id:'wizard',

/* Calcula la etapa actual de un proyecto */
function getProjectStage(p) {
  if (!p) return 0;
  // Etapa 7: en distribución activa
  if (p.emissionEnabled?.[0] && (p.totalSupply||0) > 0) return 7;
  // Etapa 6: gate habilitado
  if (p.emissionEnabled?.[0]) return 6;
  // Etapa 5: contrato configurado
  if (p.emissionStatus === 'configured' || p.emissionParams) return 5;
  // Etapa 4: reporte del modelo generado
  if (p.businessReport || p.reportSentToClient) return 4;
  // Etapa 3: tesis confirmada o en proceso
  if (p.thesis?.estado === 'confirmada') return 3;
  if (p.thesis?.estado === 'enviada' || p.thesis?.estado === 'borrador') return 3;
  // Etapa 2: TOKAI tomó el proyecto (ronda >= 2)
  if (p.ronda >= 2) return 2;
  // Etapa 1: proyecto creado
  if (p.name) return 1;
  return 0;
}

              : h('span',{style:{fontSize:stage.id===currentStage?11:9,fontWeight:700,color:stageColor(stage.id)}},stage.id))),

/* ════════════════════════════════════════════════════════════════════
   TOKAI Platform — Módulo KYC Dual (views_kyc.js)
   DOS MODOS POR PROYECTO:
   MODO A (psav):   tokens transferibles con régimen CNV → Ripio API + Sumsub
   MODO B (issuer): soulbound sin régimen CNV → emisor verifica directamente
   MODO C (demo):   desarrollo y testing
   ════════════════════════════════════════════════════════════════════ */

var KYC_MODES = {
  psav:   { label: 'PSAV', color: '#4DA8FF', desc: 'Verificacion por PSAV registrado UIF' },
  issuer: { label: 'Emisor', color: '#00D67E', desc: 'Verificacion directa del emisor · Solo soulbound sin CNV' },
  demo:   { label: 'Demo',  color: '#888',    desc: 'Modo simulado · Sin verificacion real' },
};
/* Devuelve el label del modo con el nombre del PSAV activo si aplica */
function kycModeLabel(project) {
  var mode = resolveKycMode(project);
  if (mode === 'psav') {
    var psav = getActivePsav ? getActivePsav(project) : null;
    return psav && psav.id !== 'none' ? 'PSAV · ' + psav.name : 'PSAV';
  }
  return KYC_MODES[mode] ? KYC_MODES[mode].label : mode;
}

function resolveKycMode(project) {
  if (!project) return 'demo';
  if (project.kycMode) return project.kycMode;
  if (project.soulbound && !/RG 106[89]|RG 1088/i.test(project.regime||'')) return 'issuer';
  if (/RG 106[89]|RG 1088/i.test(project.regime||'')) return 'psav';
  return 'psav';
}

function buildClaimHash(walletAddr, legalName, docNumber, kycMode) {
  const data = walletAddr + '|' + legalName + '|' + docNumber + '|' + kycMode + '|' + Date.now();
  var hash = 0;
  for (var i = 0; i < data.length; i++) { hash = ((hash << 5) - hash + data.charCodeAt(i)) | 0; }
  return '0x' + Math.abs(hash).toString(16).padStart(64, '0');
}

/* ─── KycPsavFlow: flujo via API del PSAV activo del proyecto ─────── */
function KycPsavFlow({ project, walletAddr, onComplete, onError }) {
  var psav = getActivePsav(project) || getPsavById('ripio');
  var psavName = psav ? psav.name : 'PSAV';
  var psavColor = psav ? psav.color : '#4DA8FF';
  var kycProvider = psav ? psav.kycProvider : 'Sumsub';
  var [step, setStep] = useState('init');
  var [loading, setLoading] = useState(false);
  var [kycData, setKycData] = useState(null);

  async function startSession() {
    setLoading(true);
    await new Promise(function(r){ setTimeout(r, 1200); });
    setStep('session');
    setLoading(false);
  }

  async function simulateApproval() {
    setLoading(true);
    await new Promise(function(r){ setTimeout(r, 1500); });
    var result = {
      wallet: walletAddr, status: 'APPROVED',
      jurisdiction: 32, category: 2,
      claimHash: buildClaimHash(walletAddr, 'Demo User', '30.123.456', psav ? psav.id : 'psav'),
      provider: psavName, approvedAt: new Date().toISOString(),
    };
    setKycData(result);
    setStep('confirmed');
    setLoading(false);
  }

  var boxStyle = { padding: '10px 12px', borderRadius: 8, background: psavColor+'0D', border: '1px solid '+psavColor+'25', marginBottom: 14, fontSize: 12, color: 'var(--txt-dim)', lineHeight: 1.6 };
  var fs12 = { fontSize: 12, color: 'var(--txt-dim)', lineHeight: 1.6 };

  if (step === 'init') return h('div', {},
    h('div', { className: 'card', style: { marginBottom: 14 } },
      h('div', { style: { display: 'flex', gap: 10, alignItems: 'center', marginBottom: 12 } },
        h('div', { style: { width: 36, height: 36, borderRadius: '50%', background: psavColor+'22', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 15, color: psavColor, flexShrink: 0, border: '1px solid '+psavColor+'40' } }, psav ? psav.logo : 'P'),
        h('div', {},
          h('div', { style: { fontWeight: 700, fontSize: 13 } }, 'Verificacion via ' + psavName),
          h('div', { style: { fontSize: 11, color: 'var(--txt-mute)' } }, 'KYC Provider: ' + kycProvider + ' · PSAV registrado UIF'))),
      h('div', { style: boxStyle },
        h('b', {}, 'Que necesitas: '), 'DNI o pasaporte vigente · Selfie con documento · CUIL/CUIT'),
      h('div', { style: { ...fs12, marginBottom: 12 } }, 'La PII queda en los servidores de ' + psavName + '. Solo el hash del legajo se registra on-chain en el IdentityRegistry de TOKAI.'),
      h('button', { className: 'btn btn-primary', style: { background: psavColor, borderColor: psavColor }, onClick: startSession, disabled: loading },
        loading ? 'Iniciando...' : 'Iniciar verificacion via ' + psavName)));

  if (step === 'session') return h('div', { className: 'card' },

/* ─── KycGate: router principal ───────────────────────────────────── */
function KycGate({ project, walletAddr, chain, toast, onComplete }) {
  var mode = resolveKycMode(project);
  var modeInfo = KYC_MODES[mode];
  var already = chain && chain.identities && chain.identities[walletAddr];
  var [error, setError] = useState(null);

  async function handleComplete(kycData) {
    try {
      var r = await chain.registerIdentity(walletAddr, kycData.jurisdiction, kycData.category, kycData.claimHash);
      if (r && r.ok) {
        toast && toast({ title: 'KYC registrado on-chain', msg: '0x..' + walletAddr.slice(-6) + ' via ' + modeInfo.label });
        onComplete && onComplete(kycData);
      } else { setError((r && r.reason) || 'Error al registrar on-chain.'); }
    } catch (e) { setError(e.message); }
  }

  function handleError(msg) { setError(msg); toast && toast({ type: 'err', title: 'Error KYC', msg: msg }); }

  if (already && already.verified) return h('div', { style: { padding: '12px 16px', borderRadius: 10, background: 'rgba(0,214,126,.06)', border: '1px solid rgba(0,214,126,.2)', display: 'flex', gap: 10, alignItems: 'center' } },
    h('div', { style: { fontSize: 18 } }, '✅'),
    h('div', {},
      h('div', { style: { fontWeight: 700, fontSize: 13, color: 'var(--emerald)' } }, 'Identidad verificada'),
      h('div', { style: { fontSize: 11, color: 'var(--txt-mute)', marginTop: 2 } }, 'Via ' + modeInfo.label + ' · 0x..' + walletAddr.slice(-6))));

  return h('div', {},
    h('div', { style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 14 } },
      h('span', { style: { padding: '3px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: modeInfo.color+'18', color: modeInfo.color, border: '1px solid '+modeInfo.color+'40' } }, modeInfo.label),
      h('span', { style: { fontSize: 11, color: 'var(--txt-mute)' } }, modeInfo.desc)),
    error ? h('div', { style: { padding: '10px 12px', borderRadius: 8, background: 'rgba(255,92,92,.08)', border: '1px solid rgba(255,92,92,.25)', color: '#FF5C5C', fontSize: 12, marginBottom: 12 } }, error) : null,
    mode === 'psav'   ? h(KycPsavFlow,   { project: project, walletAddr: walletAddr, onComplete: handleComplete, onError: handleError }) : null,
    mode === 'issuer' ? h(KycIssuerFlow, { project: project, walletAddr: walletAddr, chain: chain, onComplete: handleComplete, onError: handleError }) : null,
    mode === 'demo'   ? h(KycDemoFlow,   { project: project, walletAddr: walletAddr, chain: chain, onComplete: handleComplete }) : null);
}

              h('div', { style: { fontWeight: 700, color: 'var(--emerald)', marginBottom: 8 } }, 'Suscriptor registrado'),

    renderTabContent());
}

/* ─── Helpers del catálogo ─────────────────────────────────────────── */
function getPsavById(id) {
  return PSAV_CATALOG.find(function(p){ return p.id === id; }) || null;
}

function getActivePsav(project) {
  if (!project) return null;
  var id = project.psavId || (project.psav === 'Ripio' ? 'ripio' : null);
  if (id) return getPsavById(id);
  if (resolveKycMode(project) === 'issuer') return getPsavById('none');
  return getPsavById('ripio'); // default
}

function isPsavActive(project) {
  var psav = getActivePsav(project);
  return !!(psav && psav.id !== 'none' && project.psavActivated === true);
}

  var isActivated  = isPsavActive(p);

  var canActivate = kycMode === 'psav' && selectedPsavId !== 'none' && !activating;

  /* Cambio de proyecto */
  function switchProject(i) {
    var pr = projects[i] || {};
    setPid(i);
    setSelectedPsavId(pr.psavId || 'ripio');
    setShowConfirm(false);
    setTestResult(null);
  }

  /* Test de conectividad con el PSAV (simula ping a la API) */
  async function testConnection() {
    setTestResult('testing');
    await new Promise(function(r){ setTimeout(r, 1400); });
    var ok = selectedPsavId !== 'none';
    setTestResult(ok ? 'ok' : 'error');
    toast && toast({
      title: ok ? 'Conexion OK' : 'Sin conexion',
      msg: ok ? selectedPsav.name + ' responde correctamente' : 'No se pudo conectar con ' + selectedPsav.name,
      type: ok ? undefined : 'err',
    });
  }

  /* Activar el PSAV para el proyecto */
  async function activatePsav() {
    setActivating(true);
    await new Promise(function(r){ setTimeout(r, 1200); });
    if (chain.updateProject) {
      chain.updateProject(pid, {
        psavId: selectedPsavId,
        psav: selectedPsav.name,
        psavActivated: true,
        psavActivatedAt: new Date().toISOString(),
        psavCategories: selectedPsav.categories,
        psavKycProvider: selectedPsav.kycProvider,
        kycMode: selectedPsavId === 'none' ? 'issuer' : 'psav',

function PaymentDetail({ method, onConfirm, toast }) {
  var m       = PAYMENT_METHODS.find(function(x){ return x.id === method; }) || PAYMENT_METHODS[0];
  var [tx, setTx]       = useState('');
  var [saving, setSaving] = useState(false);
  var [done, setDone]   = useState(false);
  var [copied, setCopied] = useState(false);

  function copy(t) { navigator.clipboard && navigator.clipboard.writeText(t); setCopied(true); setTimeout(function(){ setCopied(false); }, 1800); }

  async function confirm() {
    setSaving(true);
    var API = window.__API_URL__ || '';
    if (API) {
      try {
        var body = { method: m.id };
        if (tx && tx.trim()) body.reference = tx.trim();
        var res = await fetch(API + '/payments', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          setSaving(false);
          toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo notificar el pago. Intentá de nuevo.' });
          return;
        }
      } catch (e) {
        setSaving(false);
        toast && toast({ type: 'err', title: 'Error', msg: 'Sin conexión con el servidor.' });
        return;
      }
    } else {
      await new Promise(function(r){ setTimeout(r, 1200); });
    }
    setSaving(false);
    setDone(true);
    onConfirm && onConfirm({ method: m.id, ref: tx });
    toast && toast({ title: 'Pago notificado', msg: 'TOKAI verificará y confirmará el desbloqueo.' });
  }

  var inp = { width: '100%', padding: '9px 12px', borderRadius: 8, border: '1px solid ' + m.color + '40', background: 'var(--black)', color: 'var(--txt)', fontSize: 13, boxSizing: 'border-box' };

    h('div', { style: { display: 'flex', gap: 10, alignItems: 'center', marginBottom: 14 } },

      h('div', {},
        h('div', { style: { fontWeight: 700, fontSize: 14 } }, m.label),
        h('div', { style: { fontSize: 11, color: 'var(--txt-mute)' } }, m.sub))),
    h('div', { style: { marginBottom: 12 } },

          h('span', {}, s));

    /* Datos de destino */
    (m.id === 'usdc_polygon' || m.id === 'lemon') && h('div', { style: dataRow },
      h('span', {}, TOKAI_WALLET.polygon.slice(0, 22) + '…'),

    m.id === 'ripio' && h('div', { style: dataRow },
      h('span', {}, TOKAI_WALLET.email),
      h('button', { onClick: function(){ copy(TOKAI_WALLET.email); }, style: { background: 'none', border: 'none', color: copied ? 'var(--emerald)' : 'var(--txt-mute)', cursor: 'pointer', fontSize: 11 } }, copied ? '✓' : '📋')),
    m.id === 'binance' && h('div', { style: dataRow }, 'Pay ID: TOKAI_RWA',
      h('button', { onClick: function(){ copy('TOKAI_RWA'); }, style: { background: 'none', border: 'none', color: copied ? 'var(--emerald)' : 'var(--txt-mute)', cursor: 'pointer', fontSize: 11 } }, copied ? '✓' : '📋')),

    m.fields && m.fields.length > 0 && h('div', { style: { marginTop: 12 } },

      saving ? 'Verificando...' : m.auto ? '✓ Verificar pago' : '✓ Notificar pago a TOKAI'));

/* ════════════════════════════════════════════════════════════════════
   AdminAccesos — panel TOKAI para gestionar solicitudes y accesos
   Tab "Accesos" en TokaiView
   ════════════════════════════════════════════════════════════════════ */
function AdminAccesos({ chain, toast }) {
  var API = window.__API_URL__ || '';
  var [backendRows, setBackendRows] = useState(null); // null = sin datos del backend todavía
  var [pagos, setPagos] = useState([]);
  var [tab, setTab] = useState('pending');
  var [accessLoading, setAccessLoading] = useState(false);
  var [accessError, setAccessError] = useState('');

  function mapContactRow(r){
    return {
      id: r.id, email: r.email, nombre: r.nombre, empresa: r.empresa,
      pais: r.pais, projectType: r.project_type, regime: r.regime,
      valoracion: r.valoracion, how: r.how_found,
      createdAt: r.created_at, status: r.status,
      approved: r.status === 'approved',
    };
  }
  function loadSolicitudes(retry){
    if(!API) return;
    setAccessLoading(true);
    setAccessError('');
    fetch(API + '/admin/contact', { credentials: 'include' })
      .then(function(r){
        if(r.ok) return r.json();
        return Promise.reject({ status: r.status });
      })
      .then(function(d){
        setBackendRows((d.data || []).map(mapContactRow));
        setAccessLoading(false);
      })
      .catch(function(e){
        if(!retry){
          setTimeout(function(){ loadSolicitudes(true); }, 1400);
          return;
        }
        setAccessLoading(false);
        setBackendRows([]);
        setAccessError(e && e.status === 401 ? 'Tu sesion admin no llego al backend. Sali y volve a entrar con un email administrador.' : 'No se pudo cargar Accesos. El backend puede estar despertando; toca Reintentar.');
      });
  }
  function loadPagos(){
    if(!API) return;
    fetch(API + '/admin/payments', { credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){ setPagos(d.data || []); })
      .catch(function(){});
  }
  var [kycRows, setKycRows] = useState([]);
  var [investRows, setInvestRows] = useState([]);
  function loadKyc(){
    if(!API) return;
    fetch(API + '/admin/kyc', { credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){ setKycRows(d.data || []); })
      .catch(function(){});
  }
  function loadInvest(){
    if(!API) return;
    fetch(API + '/admin/invest', { credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){ setInvestRows(d.data || []); })
      .catch(function(){});
  }
  useEffect(function(){ loadSolicitudes(); loadPagos(); loadKyc(); loadInvest(); }, []);

  /* Con backend: solicitudes reales de contact_requests. Sin backend: fallback demo. */
  var solicitudes   = backendRows !== null ? backendRows : (chain.solicitudes || []);
  var pendientes    = solicitudes.filter(function(s){ return s.status ? s.status === 'pending' : !s.approved; });
  var habilitados   = solicitudes.filter(function(s){ return s.approved; });
  var pagosPendientes = pagos.filter(function(p){ return p.status === 'pending'; });

  var PROJECT_TYPE_LABELS = {};
  PROJECT_TYPES.forEach(function(p){ PROJECT_TYPE_LABELS[p.id] = p.label; });

  function habilitar(id) {
    var sol = solicitudes.find(function(s){ return s.id === id; });
    if (API) {
      fetch(API + '/admin/contact/' + id + '/approve', { method: 'POST', credentials: 'include' })
        .then(function(r){ return r.ok ? r.json() : r.json().then(function(e){ return Promise.reject(e); }); })
        .then(function(){ loadSolicitudes(); toast && toast({ title: 'Acceso habilitado', msg: (sol ? sol.email : 'Emisor') + ' aprobado. Email de bienvenida enviado.' }); })
        .catch(function(e){ toast && toast({ type: 'err', title: 'Error', msg: (e && e.error) || 'No se pudo aprobar la solicitud.' }); });
      return;
    }
    if (chain.approveAccess) chain.approveAccess(id);
    /* Persistir el email aprobado en localStorage para que el LoginGate lo detecte (demo) */
    if (sol && sol.email) {
      saveApprovedEmitter(sol.email, {
        nombre: sol.nombre || '', empresa: sol.empresa || '',
        projectType: sol.projectType || '', approvedBy: 'tokai',
      });
    }
    toast && toast({ title: 'Acceso habilitado', msg: (sol ? sol.email : 'Emisor') + ' puede ingresar y usar el wizard.' });
  }
  function rejectAccess(id) {
    var sol = solicitudes.find(function(s){ return s.id === id; });
    if (API) {
      fetch(API + '/admin/contact/' + id + '/reject', { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) })
        .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(){ loadSolicitudes(); toast && toast({ type: 'warn', title: 'Solicitud rechazada', msg: 'El emisor fue notificado por email.' }); })
        .catch(function(){ toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo rechazar la solicitud.' }); });
      return;
    }
    if (chain.rejectAccess) chain.rejectAccess(id);
    if (sol && sol.email) removeApprovedEmitter(sol.email);
    toast && toast({ type: 'warn', title: 'Solicitud rechazada', msg: 'El emisor fue notificado.' });
  }
  function revocarAcceso(email) {
    if (API) {
      fetch(API + '/admin/users?role=issuer', { credentials: 'include' })
        .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
        .then(function(d){
          var u = (d.data || []).find(function(x){ return x.email === email; });
          if(!u) return Promise.reject();
          return fetch(API + '/admin/users/' + u.id + '/revoke', { method: 'POST', credentials: 'include' });
        })
        .then(function(r){ return r && r.ok ? r.json() : Promise.reject(); })
        .then(function(){ loadSolicitudes(); toast && toast({ type: 'warn', title: 'Acceso revocado', msg: email + ' ya no puede ingresar.' }); })
        .catch(function(){ toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo revocar a ' + email + '.' }); });
      return;
    }
    if (chain.revokeAccess) chain.revokeAccess(email);
    removeApprovedEmitter(email);
    toast && toast({ type: 'warn', title: 'Acceso revocado', msg: email + ' ya no puede ingresar.' });
  }
  function confirmarPago(id) {
    if (!API) { toast && toast({ title: 'Pago confirmado', msg: 'Confirmación simulada (demo).' }); return; }
    fetch(API + '/admin/payments/' + id + '/confirm', { method: 'POST', credentials: 'include', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(){ loadPagos(); toast && toast({ title: 'Pago confirmado', msg: 'El pago quedó registrado como confirmado.' }); })
      .catch(function(){ toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo confirmar el pago.' }); });
  }
  function reviewKycEntry(id, action) {
    if (!API) return;
    var entry = kycRows.find(function(k){ return k.id === id; });
    fetch(API + '/admin/kyc/' + id + '/' + action, { method: 'POST', credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(){
        loadKyc();
        /* Automatización por la factory: aprobación off-chain → registro on-chain inmediato */
        if(action === 'approve' && entry && entry.wallet_address && (typeof window !== 'undefined') && window.__PREGAT__ && typeof preGATWhitelistOnChain === 'function'){
          toast && toast({ title: 'KYC aprobado', msg: 'Registrando la wallet on-chain — firmá la transacción en MetaMask…' });
          preGATWhitelistOnChain(entry.wallet_address)
            .then(function(hash){ toast && toast({ title: 'KYC on-chain ✓', msg: entry.wallet_address.slice(0,10) + '… habilitado en el contrato de la factory.', hash: hash }); })
            .catch(function(e){ toast && toast({ type: 'warn', title: 'Registro on-chain pendiente', msg: ((e && e.message) || 'No se pudo firmar.') + ' Podés completarlo desde Accesos → Whitelist on-chain o TOKAI → Instrumentos.' }); });
          return;
        }
        toast && toast({ title: action === 'approve' ? 'KYC aprobado' : 'KYC rechazado', msg: 'La verificación fue actualizada.' });
      })
      .catch(function(){ toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo actualizar la verificación.' }); });
  }
  function actInvestOrder(id, action) {
    if (!API) return;
    fetch(API + '/admin/invest/' + id + '/' + action, { method: 'POST', credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){
        loadInvest();
        if(action === 'confirm') toast && toast({ title: 'Fondos confirmados', msg: d.whitelisted ? 'Wallet dada de alta en la whitelist del proyecto.' : 'Orden confirmada (sin wallet para whitelist).' });
        else toast && toast({ type: 'warn', title: 'Orden rechazada', msg: 'La orden fue marcada como rechazada.' });
      })
      .catch(function(){ toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo procesar la orden.' }); });
  }
  function exportContactsCsv() {
    downloadCsv('tokai_contactos.csv',
      ['Email','Nombre','Empresa','País','Tipo de proyecto','Régimen','Valoración','Cómo llegó','Estado','Fecha'],
      solicitudes.map(function(s){ return [s.email, s.nombre, s.empresa, s.pais, s.projectType, s.regime, s.valoracion, s.how, s.status || (s.approved ? 'approved' : 'pending'), s.createdAt ? new Date(s.createdAt).toISOString() : '']; }));
    toast && toast({ title: 'CSV exportado', msg: solicitudes.length + ' contactos descargados.' });
  }

  var cell = { padding: '10px 12px', fontSize: 12.5, color: 'var(--txt-dim)', borderBottom: '1px solid rgba(255,255,255,.04)', verticalAlign: 'top' };

  return h('div', {},
    h('div', { className: 'eyebrow' }, 'Panel TOKAI · Administración de accesos'),
    h('h1', { className: 'page' }, 'Solicitudes y accesos'),
    h('p', { className: 'page-sub' }, 'Los emisores llegan a través del formulario de contacto. TOKAI evalúa, prepara la propuesta fuera de la plataforma, y habilita el acceso cuando hay acuerdo.'),

/* ════════════════════════════════════════════════════════════════════
   AdminWhitelist — gestión de whitelist on-chain por proyecto (v3.3.0)
   Vincula acreditación KYC+fondeo offline con addQualifiedInvestor on-chain.
   ════════════════════════════════════════════════════════════════════ */
function AdminWhitelist({ chain, toast }) {
  var projects = (chain.projects || []).filter(function(p){ return p.tokenStandard; });
  var [selProject, setSelProject] = useState(projects[0]?.id || null);
  var [walletInput, setWalletInput] = useState('');
  var [loading, setLoading] = useState(false);
  var [gasEst, setGasEst] = useState(null);
  var project = projects.find(function(p){ return p.id === selProject; });
  var API = window.__API_URL__ || '';
  var isRealProject = !!(project && typeof project.id === 'string' && project.id.length === 36);
  /* Con backend + proyecto real: entries desde GET /projects/:id/whitelist. Fallback: mock demo. */
  var [entries, setEntries] = useState([
    { id:'wl1', wallet_address: '0xabc1234…', user_email: 'inversor@ejemplo.com', status: 'pending', created_at: new Date().toISOString() },
  ]);
  function loadEntries(){
    if(!API || !isRealProject) return;
    fetch(API + '/projects/' + project.id + '/whitelist', { credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){ setEntries(d.whitelist || []); })
      .catch(function(){});
  }
  useEffect(function(){ loadEntries(); }, [selProject]);

  var isValidAddr = /^0x[0-9a-fA-F]{40}$/.test(walletInput);

  async function estimateAndShow() {
    if (!isValidAddr || !project) return;
    setLoading(true);
    var live = (typeof useChainWeb3==='function') ? null : null; // placeholder para live
    // Mock estimación: 0.000045 POL ≈ $0.018 USD
    setGasEst({ gasPOL: '0.000045', gasUSD: '0.018' });
    setLoading(false);
  }

  async function approveAndAdd(entry) {
    if (!project) return;
    setLoading(true);
    if (API && isRealProject) {
      try {
        var res = await fetch(API + '/projects/' + project.id + '/whitelist/' + entry.id + '/approve', { method: 'POST', credentials: 'include' });
        if (!res.ok) throw new Error('approve_failed');
        loadEntries();
        toast && toast({ title: 'Whitelist aprobada', msg: entry.wallet_address + ' aprobado. El operador ejecuta addQualifiedInvestor on-chain.' });
      } catch(e) {
        toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo aprobar la entrada de whitelist.' });
      }
      setLoading(false);
      return;
    }
    // Demo: simulación local (en live: chain.addQualifiedInvestor(project, entry.wallet_address))
    await new Promise(function(r){ setTimeout(r, 1200); });
    setEntries(function(prev){ return prev.map(function(e){ return e.id===entry.id ? {...e, status:'approved'} : e; }); });
    toast && toast({ title: 'Whitelist aprobada', msg: entry.wallet_address + ' habilitado on-chain.' });
    setLoading(false);
  }

  async function rejectEntry(entry) {
    if (API && isRealProject) {
      try {
        var res = await fetch(API + '/projects/' + project.id + '/whitelist/' + entry.id + '/reject', { method: 'POST', credentials: 'include' });
        if (!res.ok) throw new Error('reject_failed');
        loadEntries();
        toast && toast({ type: 'warn', title: 'Rechazada', msg: entry.wallet_address + ' no habilitado.' });
      } catch(e) {
        toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo rechazar la entrada.' });
      }
      return;
    }
    setEntries(function(prev){ return prev.map(function(x){ return x.id===entry.id ? {...x, status:'rejected'} : x; }); });
    toast && toast({ type: 'warn', title: 'Rechazada', msg: entry.wallet_address + ' no habilitado.' });
  }

  async function addNew() {
    if (!isValidAddr || !project) return;
    setLoading(true);
    if (API && isRealProject) {
      try {
        var res = await fetch(API + '/projects/' + project.id + '/whitelist', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet_address: walletInput }),
        });
        if (!res.ok) throw new Error('add_failed');
        loadEntries();
        setWalletInput('');
        setGasEst(null);
        toast && toast({ title: 'Wallet agregada', msg: 'Registrada en whitelist. Pendiente de aprobación.' });
      } catch(e) {
        toast && toast({ type: 'err', title: 'Error', msg: 'No se pudo agregar la wallet a la whitelist.' });
      }
      setLoading(false);
      return;
    }
    await new Promise(function(r){ setTimeout(r, 900); });
    var newEntry = { id: 'wl'+Date.now(), wallet_address: walletInput, user_email: '—', status: 'pending', created_at: new Date().toISOString() };
    setEntries(function(prev){ return [newEntry, ...prev]; });
    setWalletInput('');
    setGasEst(null);
    toast && toast({ title: 'Wallet agregada', msg: 'Pendiente de aprobación on-chain.' });
    setLoading(false);
  }

  var statusBadge = function(s) {
    var map = { pending:['#FFB23E','PENDIENTE'], approved:['var(--emerald)','APROBADA'], rejected:['#FF5C5C','RECHAZADA'] };
    var c = map[s] || ['var(--txt-mute)','—'];
    return h('span',{style:{padding:'2px 8px',borderRadius:20,background:c[0]+'22',color:c[0],fontSize:10,fontWeight:700}}, c[1]);
  };

  return h('div',{},
    h('div',{style:{marginBottom:16}},
      h('div',{style:{fontSize:12,color:'var(--txt-mute)',marginBottom:6}},'Proyecto'),

    project && h('div',{className:'card',style:{padding:'14px 16px',marginBottom:16,background:'rgba(255,255,255,.02)'}},
      h('div',{style:{display:'flex',gap:16,flexWrap:'wrap',fontSize:12}},
        h('div',{},h('span',{className:'muted'},'Estándar '),h('span',{style:{fontFamily:'var(--mono)',color:'var(--emerald)'}},project.tokenStandard)),
        h('div',{},h('span',{className:'muted'},'Admin: '),h('span',{style:{fontFamily:'var(--mono)',fontSize:10.5}},project.adminAddress||'no configurada')),
        h('div',{},h('span',{className:'muted'},'Compliance: '),h('span',{style:{fontFamily:'var(--mono)',fontSize:10.5}},project.complianceAddress||'no configurada')),
        project.isActivePhase2&&h('span',{style:{padding:'2px 8px',borderRadius:20,background:'rgba(0,214,126,.15)',color:'var(--emerald)',fontSize:10,fontWeight:700}},'FASE 2 ACTIVA'))),

    h('div',{className:'card',style:{padding:'14px 16px',marginBottom:16}},
      h('div',{style:{fontSize:13,fontWeight:700,marginBottom:10}},'Agregar wallet a whitelist'),

          style:{flex:1,background:'rgba(255,255,255,.03)',border:'1px solid '+(isValidAddr?'var(--emerald)':'rgba(255,255,255,.08)'),borderRadius:8,padding:'8px 10px',color:'var(--txt)',fontSize:12,fontFamily:'var(--mono)'}}),
        h('button',{className:'btn btn-ghost btn-sm',onClick:estimateAndShow,disabled:!isValidAddr||loading},'Gas'),
        h('button',{className:'btn btn-primary btn-sm',onClick:addNew,disabled:!isValidAddr||loading},loading?'…':'+ Agregar')),
      gasEst && h('div',{style:{marginTop:8,padding:'8px 10px',borderRadius:8,background:'rgba(0,214,126,.05)',border:'1px solid rgba(0,214,126,.15)',fontSize:11}},
        'Gas estimado: ',h('strong',{},gasEst.gasPOL+' POL'),' ≈ USD ',h('strong',{},gasEst.gasUSD),

/* ABI mínimo para leer el estado del instrumento sin depender de window.__ABIS__ */
var PREGAT_READ_ABI = [
  "function instrumentStatus() view returns (uint256,uint256,uint256,uint256,uint256,bool,uint256)",
  "function isQualifiedInvestor(address) view returns (bool)",
  "function investorBalance(address) view returns (uint256)",
  "function phase2Active() view returns (bool)",
  "function balanceOf(address) view returns (uint256)"
];

/* ── Automatización KYC por la factory TOKAI ──
   Al aprobar un KYC en el panel, la wallet se registra directamente en el
   contrato (GATCertificate.addQualifiedInvestor / IdentityRegistry) firmando
   con la wallet COMPLIANCE_ROLE del admin via MetaMask. Sin proveedor externo:
   la capa de enforcement es la propia factory de TOKAI. */
async function preGATWhitelistOnChain(addr){
  var cfg = (typeof window !== 'undefined') && window.__PREGAT__;
  if (!window.ethereum || !cfg || !window.__TOKAI_ENABLE_LIVE_MODE__) {
    // Fallback/mock de demo para operabilidad fluida sin MetaMask
    if (cfg && cfg.snapshot) {
      cfg.snapshot.totalInvestors = (cfg.snapshot.totalInvestors || 0) + 1;
      cfg.snapshot.remainingInvestorSlots = Math.max(0, (cfg.snapshot.remainingInvestorSlots || 50) - 1);
    }
    return '0x' + Array.from({length:32}, () => Math.floor(Math.random()*16).toString(16)).join('') + ' (demo)';
  }
  if(!cfg || !window.ethers) throw new Error('Config PRE-GAT o ethers no disponibles');
  var mm = Array.isArray(window.ethereum.providers)
    ? (window.ethereum.providers.find(function(p){ return p.isMetaMask; }) || null)
    : (window.ethereum.isMetaMask ? window.ethereum : null);
  if(!mm) throw new Error('MetaMask no encontrado');
  var currentChain = await mm.request({ method: 'eth_chainId' });
  if (parseInt(currentChain, 16) !== cfg.chainId) {
    try {
      await mm.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x89' }] });
    } catch(swErr) {
      if (swErr.code === 4902) {
        await mm.request({ method: 'wallet_addEthereumChain', params: [{ chainId: '0x89', chainName: 'Polygon PoS', nativeCurrency: { name: 'POL', symbol: 'POL', decimals: 18 }, rpcUrls: [cfg.rpc, cfg.rpcFallback || cfg.rpc], blockExplorerUrls: [cfg.explorer] }] });
      } else throw swErr;
    }
  }
  var provider = new ethers.BrowserProvider(mm);
  var signer = await provider.getSigner();
  var abi = (window.__ABIS__ && window.__ABIS__.GATCertificate) || PREGAT_READ_ABI;
  var contract = new ethers.Contract(cfg.address, abi, signer);
  var tx = await contract.addQualifiedInvestor(addr);
  await tx.wait();
  return tx.hash;
}

function usePreGAT(walletAddr) {
  var cfg = (typeof window !== 'undefined') && window.__PREGAT__;
  var [status, setStatus] = useState(null);
  var [loading, setLoading] = useState(false);
  var [error, setError] = useState(null);
  var [investorInfo, setInvestorInfo] = useState(null);

  function normalizeStatus(s) {
    return {
      totalMinted:            Number(s[0]),
      totalRedeemed:          Number(s[1]),
      totalInvestors:         Number(s[2]),
      remainingSupply:        Number(s[3]),
      remainingInvestorSlots: Number(s[4]),
      phase2Active:           s[5],
      capitalRaisedUSD:       Number(s[6]),
    };
  }

  function snapshotStatus() {
    if (!cfg || !cfg.snapshot) return null;
    return Object.assign({
      totalMinted: 0,
      totalRedeemed: 0,
      totalInvestors: 0,
      remainingSupply: 500,
      remainingInvestorSlots: 50,
      phase2Active: false,
      capitalRaisedUSD: 0,
    }, cfg.snapshot);
  }

  async function loadStatus() {
    if (!cfg || !window.ethers) {
      var snap = snapshotStatus();
      if (snap) setStatus(snap);
      return;
    }
    setLoading(true);
    setError(null);
    try {
      var provider = new ethers.JsonRpcProvider(cfg.rpc);
      var contract = new ethers.Contract(cfg.address, PREGAT_READ_ABI, provider);
      var s = await contract.instrumentStatus();
      setStatus(normalizeStatus(s));
    } catch(e) {
      // Intentar RPC fallback
      try {
        var p2 = new ethers.JsonRpcProvider(cfg.rpcFallback || cfg.rpc);
        var c2 = new ethers.Contract(cfg.address, PREGAT_READ_ABI, p2);
        var s2 = await c2.instrumentStatus();
        setStatus(normalizeStatus(s2));
      } catch(e2) {
        var snap2 = snapshotStatus();
        if (snap2) {
          setStatus(snap2);
          setError('Mostrando snapshot local; RPC Polygon no disponible');
        } else {
          setError('No se pudo conectar a Polygon PoS mainnet');
        }
      }
    } finally {
      setLoading(false);
    }
  }

  async function loadInvestorInfo(addr) {
    if (!window.ethereum || !cfg || !window.__TOKAI_ENABLE_LIVE_MODE__) {
      // Fallback/mock de demo para operabilidad local fluida sin MetaMask
      const isQualified = true;
      let balance = 0;
      if (addr && typeof addr === 'string' && DEMO_WALLETS[1] && addr.toLowerCase() === DEMO_WALLETS[1].addr.toLowerCase()) {
        balance = 2; // El inversor demo calificado · ARG arranca con 2 certificados
      }
      setInvestorInfo({ isQualified, balance });
      return;
    }
    if (!cfg || !window.ethers || !addr) return;
    try {
      var provider = new ethers.JsonRpcProvider(cfg.rpc);
      var contract = new ethers.Contract(cfg.address, PREGAT_READ_ABI, provider);
      var [isQual, balance] = await Promise.all([
        contract.isQualifiedInvestor(addr),
        contract.investorBalance(addr)
      ]);
      setInvestorInfo({ isQualified: isQual, balance: Number(balance) });
    } catch(e) {
      // Fallback si falla el RPC en caliente
      const isQualified = true;
      let balance = 0;
      if (addr && typeof addr === 'string' && DEMO_WALLETS[1] && addr.toLowerCase() === DEMO_WALLETS[1].addr.toLowerCase()) {
        balance = 2;
      }
      setInvestorInfo({ isQualified, balance });
    }
  }

  /* Cambia la red de MetaMask a Polygon PoS mainnet y devuelve el signer */
  async function getPreGATSigner() {
    if (!window.ethereum || !cfg) throw new Error('MetaMask no disponible');
    var mm = (function(){
      if (Array.isArray(window.ethereum.providers))
        return window.ethereum.providers.find(function(p){ return p.isMetaMask; }) || null;
      return window.ethereum.isMetaMask ? window.ethereum : null;
    })();
    if (!mm) throw new Error('MetaMask no encontrado');
    var currentChain = await mm.request({ method: 'eth_chainId' });
    if (parseInt(currentChain, 16) !== cfg.chainId) {
      try {
        await mm.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x89' }] });
      } catch(swErr) {
        if (swErr.code === 4902) {
          await mm.request({ method: 'wallet_addEthereumChain', params: [{ chainId: '0x89', chainName: 'Polygon PoS', nativeCurrency: { name: 'POL', symbol: 'POL', decimals: 18 }, rpcUrls: [cfg.rpc, cfg.rpcFallback || cfg.rpc], blockExplorerUrls: [cfg.explorer] }] });
        } else throw swErr;
      }
    }
    var provider = new ethers.BrowserProvider(mm);
    return provider.getSigner();
  }

  async function whitelistInvestor(addr) {
    if (!window.ethereum || !cfg || !window.__TOKAI_ENABLE_LIVE_MODE__) {
      if (cfg && cfg.snapshot) {
        cfg.snapshot.totalInvestors = (cfg.snapshot.totalInvestors || 0) + 1;
        cfg.snapshot.remainingInvestorSlots = Math.max(0, (cfg.snapshot.remainingInvestorSlots || 50) - 1);
      }
      return '0x' + Array.from({length:32}, () => Math.floor(Math.random()*16).toString(16)).join('') + ' (demo)';
    }
    var signer = await getPreGATSigner();
    var abi = (window.__ABIS__ && window.__ABIS__.GATCertificate) || PREGAT_READ_ABI;
    var contract = new ethers.Contract(cfg.address, abi, signer);
    var tx = await contract.addQualifiedInvestor(addr);
    await tx.wait();
    return tx.hash;
  }

  async function removeInvestor(addr) {
    if (!window.ethereum || !cfg || !window.__TOKAI_ENABLE_LIVE_MODE__) {
      if (cfg && cfg.snapshot) {
        cfg.snapshot.totalInvestors = Math.max(0, (cfg.snapshot.totalInvestors || 1) - 1);
        cfg.snapshot.remainingInvestorSlots = Math.min(50, (cfg.snapshot.remainingInvestorSlots || 49) + 1);
      }
      return '0x' + Array.from({length:32}, () => Math.floor(Math.random()*16).toString(16)).join('') + ' (demo)';
    }
    var signer = await getPreGATSigner();
    var abi = (window.__ABIS__ && window.__ABIS__.GATCertificate) || PREGAT_READ_ABI;
    var contract = new ethers.Contract(cfg.address, abi, signer);
    var tx = await contract.removeQualifiedInvestor(addr);
    await tx.wait();
    return tx.hash;
  }

  async function mintTo(addr, qty) {
    if (!window.ethereum || !cfg || !window.__TOKAI_ENABLE_LIVE_MODE__) {
      if (cfg && cfg.snapshot) {
        cfg.snapshot.totalMinted = (cfg.snapshot.totalMinted || 0) + qty;
        cfg.snapshot.remainingSupply = Math.max(0, (cfg.snapshot.remainingSupply || 500) - qty);
        cfg.snapshot.capitalRaisedUSD = (cfg.snapshot.capitalRaisedUSD || 0) + qty * 3000;
      }
      return '0x' + Array.from({length:32}, () => Math.floor(Math.random()*16).toString(16)).join('') + ' (demo)';
    }
    var signer = await getPreGATSigner();
    var abi = (window.__ABIS__ && window.__ABIS__.GATCertificate) || PREGAT_READ_ABI;
    var contract = new ethers.Contract(cfg.address, abi, signer);
    var tx = qty > 1 ? await contract.batchMint(addr, qty) : await contract.mint(addr);
    await tx.wait();
    return tx.hash;
  }

  async function togglePhase2(activate) {
    if (!window.ethereum || !cfg || !window.__TOKAI_ENABLE_LIVE_MODE__) {
      if (cfg && cfg.snapshot) {
        cfg.snapshot.phase2Active = activate;
      }
      return '0x' + Array.from({length:32}, () => Math.floor(Math.random()*16).toString(16)).join('') + ' (demo)';
    }
    var signer = await getPreGATSigner();
    var abi = (window.__ABIS__ && window.__ABIS__.GATCertificate) || PREGAT_READ_ABI;
    var contract = new ethers.Contract(cfg.address, abi, signer);
    var tx = activate ? await contract.activatePhase2() : await contract.deactivatePhase2();
    await tx.wait();
    return tx.hash;
  }

  useEffect(function(){ loadStatus(); }, []);
  useEffect(function(){ if (walletAddr) loadInvestorInfo(walletAddr); }, [walletAddr]);

  return { cfg, status, loading, error, investorInfo, loadStatus, loadInvestorInfo, whitelistInvestor, removeInvestor, mintTo, togglePhase2 };
}

/* ════════════════════════════════════════════════════════════════════
   APP SHELL v3 — login dual · modo simple/experto · router
   ════════════════════════════════════════════════════════════════════ */
function App(){
  const [auth,setAuth] = useState(null);
  const [paid,setPaid] = useState(false); // retainer de estructuración pagado
  const [uiMode,setUiMode] = useState('simple');
  const [view,setView] = useState('home');
  const [activeProject,setActiveProject] = useState(null);
  const [role,setRole] = useState('issuer');
  const [subView,setSubView] = useState('projects');
  const [walletIdx,setWalletIdx] = useState(1);
  const [sidebarOpen,setSidebarOpen] = useState(false);
  const [liveMode,setLiveMode] = useState(function(){
    if(typeof window === 'undefined' || window.__TOKAI_ENABLE_LIVE_MODE__ === false) return 'demo';
    /* Default 'demo' para que el panel del inversor sea plenamente operativo sin
       MetaMask. Antes arrancaba en 'real' → sin wallet caía en "REAL PREVENTA"
       con address 0x0000 y chain real vacío ("se traba / hay que reingresar").
       Real sigue a un click y se usa on-chain al conectar wallet. */
    return localStorage.getItem('tokai_live_mode') || 'demo';
  });

  const [deployment, setDeployment] = useState(function(){
    return (typeof window !== 'undefined') ? window.__DEPLOYMENT__ : null;
  });

  const apiUrl = window.__API_URL__ || '';

  useEffect(function() {
    if (apiUrl) {
      fetch(apiUrl + '/contracts')
        .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function(data) {
          if (data && data.configured && data.deployment) {
            window.__DEPLOYMENT__ = data.deployment;
            setDeployment(data.deployment);
          }
        })
        .catch(function() {});
    }
  }, [apiUrl]);

  const sim = useChain({apiUrl, loggedIn: !!auth});
  const web3 = (typeof useWeb3==='function') ? useWeb3() : { available:false };
  const live = (typeof useChainWeb3==='function') ? useChainWeb3(web3.account) : null;
  const liveModeEnabled = (typeof window !== 'undefined') && window.__TOKAI_ENABLE_LIVE_MODE__ !== false;
  const realRequested = liveModeEnabled && liveMode === 'real';
  const isLive = !!(realRequested && web3.account && web3.chainOk && (typeof window!=='undefined') && window.__DEPLOYMENT__ && live);
  const isReal = realRequested;
  const chain = isLive ? live : sim;
  const toast = useToast();

  const wallet = role==='investor' ? DEMO_WALLETS[walletIdx] : DEMO_WALLETS[0];
  const liveWalletAddr = web3.account || (role==='investor' ? wallet.addr : null);
  function setMode(nextMode){
    if(!liveModeEnabled) return;
    setLiveMode(nextMode);
    try{ localStorage.setItem('tokai_live_mode', nextMode); }catch(e){}
  }

  function go(v,pid,sub){
    let path = v;
    if(pid!=null) path += `/${pid}`;
    if(sub!=null) path += `/${sub}`;
    window.location.hash = `/${path}`;
    setSidebarOpen(false);
  }

  /* ── Guardas de rol: la wallet demo solo habilita el perfil Inversor ── */
  function canAccessRole(targetRole){
    if(targetRole==='investor') return true;
    if(!auth) return false;
    if(auth.isAdmin || auth.role==='tokai') return true;
    if(auth.method==='wallet') return false;
    if(targetRole==='issuer') return auth.role==='issuer' && (auth.approved || paid);
    return false;
  }

  function denyRole(targetRole){
    const label = targetRole==='tokai' ? 'TOKAI' : targetRole==='issuer' ? 'Emisor' : 'Inversor';
    toast&&toast({type:'warn',title:'Acceso restringido',msg:'La wallet demo solo habilita el perfil Inversor. El perfil '+label+' requiere una cuenta aprobada.'});
    setRole('investor');
    setUiMode('expert');
    go('dash');
  }

  function activateRole(targetRole){
    if(!canAccessRole(targetRole)){
      denyRole(targetRole);
      return false;
    }
    setRole(targetRole);
    return true;
  }

  /* Efecto para sincronizar el estado de React con el Hash de la URL */
  useEffect(() => {
    function handleHashChange() {
      const hash = window.location.hash.replace('#/', '').replace('#', '');
      if (!hash) {
        const defaultView = role === 'tokai' ? 'tokai' : (role === 'issuer' ? (uiMode === 'simple' ? 'home' : 'admin') : 'dash');
        const defaultSub = role === 'tokai' ? 'dashboard' : 'projects';
        setView(defaultView);
        setSubView(defaultSub);
        return;
      }
      const parts = hash.split('/');
      const v = parts[0];

      if((v==='tokai' && !canAccessRole('tokai')) || (v==='admin' && !canAccessRole('issuer'))){
        denyRole(v==='tokai'?'tokai':'issuer');
        return;
      }

      let pid = null;
      let sub = null;

      if (['admin', 'tokai'].includes(v)) {
        sub = parts[1] || (v === 'admin' ? 'projects' : 'dashboard');
      } else {
        /* Los proyectos reales usan UUID: solo castear a Number los ids demo numéricos */
        const rawPid = parts[1];
        pid = rawPid != null && rawPid !== '' ? (/^\d+$/.test(rawPid) ? Number(rawPid) : rawPid) : null;
        sub = parts[2] || null;
      }

      setView(v);
      if (pid !== null) {
        setActiveProject(pid);
      }
      if (sub !== null) {
        setSubView(sub);
      }
    }

    window.addEventListener('hashchange', handleHashChange);
    handleHashChange(); // Sincronización inicial

    return () => window.removeEventListener('hashchange', handleHashChange);
  }, [role, uiMode, auth, paid]);

  /* Guarda de redirección según el rol de experto */
  useEffect(()=>{
    if(uiMode!=='expert') return;
    let target = view;
    if(role==='tokai') {
      const allowedTokaiViews = ['tokai','report-gen','emission-engine','emission-checklist','thesis-editor','dash','market','guide'];
      target = allowedTokaiViews.includes(view) ? view : 'tokai';
    }
    else if(role==='issuer') target = view==='guide'?'guide':(['invest','portfolio','asset'].includes(view)?'admin':(view==='tokai'?'admin':view));
    else target = view==='guide'?'guide':(['admin','tokai','home','wizard','pagos','thesis-client','thesis-editor','emission-engine','emission-checklist','report-gen'].includes(view)?'dash':view);
    
    if (target !== view) {
      go(target, activeProject);
    }
  },[role,uiMode]);

  function switchMode(m){
    setUiMode(m);
    if(m==='simple'){
      if(!canAccessRole('issuer')){
        denyRole('issuer');
        return;
      }
      setRole('issuer');
      go('home');
    } else {
      go(role==='tokai'?'tokai':'dash');
    }
  }

  /* ── Restore de sesión desde cookie HttpOnly ── */
  useEffect(()=>{
    if(!window.__API_URL__) return;
    fetch(window.__API_URL__ + '/auth/me', { credentials: 'include' })
    .then(r => r.ok ? r.json() : Promise.reject()).then(data => {
      if(!data.id) return;
      const backendRole = data.role;
      const frontRole = backendRole === 'admin' ? 'tokai' : backendRole;
      const isAdmin = backendRole === 'admin';
      const approved = data.status === 'approved';
      setAuth({ method:'email', id:data.email, label: isAdmin ? 'TOKAI Admin' : data.email.split('@')[0], role:frontRole, isAdmin, approved });

            : h('span',{},'Polygon Amoy · 80002',h('br'),'ERC-3643 · 18/18 tests ✓');
        })(),
        h('br'),
        h('span',{style:{color:'var(--txt-mute)',opacity:.7}},'Auto-auditoria SDD activa'))
    ),
    sidebarOpen&&h('div',{onClick:()=>setSidebarOpen(false),style:{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:80}}),
    h('div',{className:'main'},
      (function(){
        const esSimulacionInversor = auth && (auth.isAdmin || (auth.approved && auth.method!=='wallet')) && role === 'investor';
        if (!esSimulacionInversor) return null;
        return h('div', {
          style: {
            background: 'linear-gradient(90deg, rgba(0,214,126,.15), rgba(0,0,0,0))',
            borderBottom: '1px solid rgba(0,214,126,.2)',
            padding: '10px 20px',
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            fontSize: '12.5px',
            color: 'var(--txt-dim)'
          }
        },
          h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' } },
            h('span', { style: { color: 'var(--emerald)', fontWeight: 800 } }, '✦ SIMULACIÓN'),
            'Estás viendo la plataforma con el rol de Inversor.'
          ),
          h('button', {
            onClick: () => {
              if (auth.isAdmin) {
                activateRole('tokai');
                go('tokai');
              } else {
                if(activateRole('issuer')) switchMode('simple');
              }
            },
            className: 'btn btn-primary btn-sm',
            style: { padding: '5px 12px', fontSize: '11.5px' }
          }, auth.isAdmin ? 'Volver a Supervisión TOKAI' : 'Volver a Administración Emisor')
        );
      })(),
      /* ── Barra de red incorrecta (si MetaMask conectada pero red equivocada) ── */
      web3.available&&web3.account&&!web3.chainOk&&h('div',{style:{background:'rgba(255,178,62,.07)',borderBottom:'1px solid rgba(255,178,62,.22)',padding:'8px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12.5}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('span',{style:{color:'var(--amber)',fontWeight:800}},'⚠ Red incorrecta'),
          h('span',{style:{color:'var(--txt-dim)'}},
            'Tu wallet está en una red incompatible. Se requiere ',h('strong',{},getActiveNetwork().label),'.')),
        h('button',{className:'btn btn-sm',style:{background:'var(--amber)',color:'#000',border:'none',fontWeight:700,padding:'6px 14px'},
          onClick:async function(){
            const ok=await web3.switchNetwork();
            if(ok) toast({title:'Red cambiada',msg:'Ahora estás en '+getActiveNetwork().label});
            else toast({type:'err',title:'No se pudo cambiar',msg:'Cambiá la red manualmente en MetaMask'});
          }},'Cambiar a '+getActiveNetwork().label)),
      h('div',{className:'topbar'},
        h('div',{style:{display:'flex',alignItems:'center',gap:14}},
          h('button',{className:'menu-btn',onClick:()=>setSidebarOpen(true)},h(Icon,{d:'M3 12h18M3 6h18M3 18h18',style:{width:18,height:18}})),
          h('span',{className:'topbar-title'},view==='tokai'?(tokaiSubTitles[subView]||'Panel TOKAI'):titles[view]),
          h('span',{className:'badge '+(isReal?'green':'gray'),style:{fontSize:9,marginLeft:4}},isReal?(isLive?'● REAL WEB3':'● REAL PREVENTA'):'DEMO')),
        h('div',{className:'topbar-right'},
          liveModeEnabled&&h('div',{className:'role-switch'},
            h('button',{className:'role-btn'+(!isReal?' active':''),onClick:()=>setMode('demo')},'Demo'),
            h('button',{className:'role-btn'+(isReal?' active':''),onClick:()=>setMode('real')},'Real')),
          h('div',{className:'role-switch'},
            h('button',{className:'role-btn'+(role==='investor'?' active':''),onClick:()=>activateRole('investor')},'Inversor'),
            canAccessRole('issuer')&&h('button',{className:'role-btn'+(role==='issuer'?' active':''),onClick:()=>{ if(activateRole('issuer')) switchMode('simple'); }},'Emisor'),
            canAccessRole('tokai')&&h('button',{className:'role-btn'+(role==='tokai'?' active':''),onClick:()=>activateRole('tokai')},'TOKAI')),
          role==='investor'&&h('select',{value:walletIdx,onChange:e=>setWalletIdx(+e.target.value),
            style:{background:'var(--panel)',border:'1px solid var(--line-solid)',borderRadius:9,padding:'7px 10px',color:'var(--txt)',fontSize:12,maxWidth:170}},
            DEMO_WALLETS.map((w,i)=>w.role!=='admin'&&h('option',{key:i,value:i},w.label))),
          h('div',{className:'wallet-chip'},h('span',{className:'dot'}),short(wallet.addr)),
          web3.available && h('button',{className:'btn '+(web3.account&&web3.chainOk?'btn-ghost':'btn-primary')+' btn-sm',
            onClick:async()=>{ if(!web3.account){ const dep=(typeof window!=='undefined')&&window.__DEPLOYMENT__; const netLabel=dep&&dep.chainId===137?'Polygon mainnet':'Polygon Amoy'; const ok=await web3.connect(); if(ok)toast({title:'Wallet conectada',msg:'Operando en '+netLabel}); else if(web3.error)toast({type:'err',title:'Error',msg:web3.error}); } },
            title: web3.account ? (web3.chainOk?'Conectado':'Red incorrecta') : 'Conectar MetaMask'},
            web3.connecting?'Conectando…':web3.account?(web3.chainOk?'● '+short(web3.account):'⚠ Red incorrecta'):'Conectar wallet'))
      ),
      h('div',{className:'content'},
        view==='dash'&&h(Dashboard,{chain,go,liveMode,liveWalletAddr}),
        view==='asset'&&h(AssetDetail,{chain,wallet,pid:activeProject==null?0:activeProject,toast,go}),
        view==='invest'&&h(InvestView,{chain,wallet,projectId:activeProject,toast}),
        // botón flotante inversor en modo experto cuando está en portal inversor
        view==='invest'&&h(InvestorAssistantFloat,{project:(chain.projects||[])[activeProject||0],chain}),
        view==='portfolio'&&h(PortfolioView,{chain,wallet,toast,go,liveMode,liveWalletAddr}),
        view==='market'&&h(MarketView,{chain,wallet,toast,initialPid:activeProject}),
        view==='tokai'&&canAccessRole('tokai')&&h(TokaiView,{chain,toast,subView,go}),
        view==='admin'&&canAccessRole('issuer')&&h(AdminView,{chain,wallet,toast,subView}),
        view==='guide'&&h(GuideView,{chain,role,go,setRole:activateRole}),
        view==='thesis-editor'&&h(ThesisFlexEditor,{chain,toast,go}),
        view==='thesis-client'&&h(ThesisClientView,{chain,toast}),
        view==='emission-engine'&&h(EmissionPreview,{chain,toast}),
        view==='emission-checklist'&&h(EmissionChecklist,{chain,toast}),
        view==='report-gen'&&h(ReportExporter,{chain,toast})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  h(ToastProvider,{},h(App))
);</script></body></html>
