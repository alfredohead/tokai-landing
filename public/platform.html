/* ─────────────────────── MODAL CANJE PRE-GAT → GAT ─────────────────────── */
/* Glassmorphism premium — reemplaza window.confirm en el flujo de redeem ERC-721  */
function RedeemModal({p, bal, onClose, onSuccess, chain, toast}){
  const [selectedId,setSelectedId]=useState(1);
  const [confirmed,setConfirmed]=useState(false);
  const [loading,setLoading]=useState(false);
  const [gasInfo,setGasInfo]=useState({gasPOL:'~0.00004',gasUSD:'~0.016'});

  useEffect(function(){
    if(!chain.estimateGas||!p.token) return;
    chain.estimateGas(p.token,'GATCertificate','redeem',[selectedId])
      .then(function(g){ setGasInfo(g); }).catch(function(){});
  },[selectedId]);

  async function doRedeem(){
    if(!confirmed||!selectedId||loading) return;
    setLoading(true);
    try{
      const r=chain.redeem ? await chain.redeem(p,selectedId) : {ok:false,reason:'Conectá MetaMask para operar on-chain'};
      if(r&&r.ok) onSuccess(selectedId,r.hash||null);
      else toast&&toast({type:'err',title:'Error en canje',msg:r?.reason||'Intentá de nuevo'});
    }finally{ setLoading(false); }
  }

  const finalSymbol = p.symbol ? p.symbol.replace(/PRE-?/i,'') : 'GAT';

  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',backdropFilter:'blur(10px)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
    h('div',{style:{maxWidth:490,width:'100%',background:'linear-gradient(145deg,rgba(16,20,32,.97),rgba(10,14,24,.99))',border:'1px solid rgba(0,214,126,.18)',boxShadow:'0 0 0 1px rgba(255,255,255,.04),0 32px 80px rgba(0,0,0,.7)',borderRadius:20,padding:28,position:'relative'}},
      h('button',{onClick:onClose,disabled:loading,style:{position:'absolute',top:16,right:18,background:'none',border:'none',color:'var(--txt-mute)',cursor:'pointer',fontSize:22,lineHeight:1}},'×'),
      h('div',{style:{fontWeight:800,fontSize:16,marginBottom:3}},'Canje de Certificado PRE-GAT'),
      h('div',{style:{fontSize:12,color:'var(--txt-mute)',marginBottom:18}},'Operación irreversible on-chain — leé atentamente antes de confirmar'),

      /* Flujo visual quema → recibe */
      h('div',{style:{display:'flex',alignItems:'stretch',borderRadius:14,overflow:'hidden',border:'1px solid rgba(255,255,255,.06)',marginBottom:18}},
        h('div',{style:{flex:1,padding:'14px 16px',background:'rgba(255,92,92,.05)',textAlign:'center'}},
          h('div',{style:{fontSize:9,color:'var(--txt-mute)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:5}},'Se quema'),
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:800,fontSize:17,color:'#FF5C5C'}},p.symbol||'PRE-GAT'),
          h('div',{style:{fontSize:10,color:'var(--txt-dim)',marginTop:3}},'Token ID #'+selectedId)),
        h('div',{style:{display:'flex',alignItems:'center',padding:'0 14px',color:'var(--txt-mute)',fontSize:20,background:'rgba(255,255,255,.02)'}},'→'),
        h('div',{style:{flex:1,padding:'14px 16px',background:'rgba(0,214,126,.04)',textAlign:'center'}},
          h('div',{style:{fontSize:9,color:'var(--txt-mute)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:5}},'Recibís'),
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:800,fontSize:17,color:'var(--emerald)'}},finalSymbol),
          h('div',{style:{fontSize:10,color:'var(--txt-dim)',marginTop:3}},'Token definitivo'))),

      /* Selector de NFT IDs (IDs 1..bal, máx 12 visibles) */
      h('div',{style:{marginBottom:16}},
        h('div',{style:{fontSize:12,fontWeight:600,color:'var(--txt)',marginBottom:8}},'Seleccioná el NFT a canjear'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          Array.from({length:Math.min(bal,12)},(_,i)=>i+1).map(function(id){
            const sel=id===selectedId;
            return h('button',{key:id,onClick:function(){ setSelectedId(id); setConfirmed(false); },
              style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontFamily:'var(--mono)',fontSize:12.5,fontWeight:sel?700:400,
                border:'1.5px solid '+(sel?'var(--emerald)':'rgba(255,255,255,.08)'),
                background:sel?'rgba(0,214,126,.1)':'rgba(255,255,255,.02)',
                color:sel?'var(--emerald)':'var(--txt)',transition:'all .12s'}},'#'+id);
          })),
        bal>12&&h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginTop:6}},'… y '+(bal-12)+' NFTs más. Ingresá el ID:')),

      /* Gas estimado */
      h('div',{style:{marginBottom:18,padding:'11px 14px',borderRadius:11,background:'rgba(0,214,126,.04)',border:'1px solid rgba(0,214,126,.12)',display:'flex',alignItems:'center',gap:12}},
        h('span',{style:{fontSize:20}},'⛽'),
        h('div',{},
          h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginBottom:2}},'Gas estimado para este canje'),
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:700,fontSize:13}},
            gasInfo.gasPOL,' POL',
            h('span',{style:{fontWeight:400,color:'var(--txt-mute)',marginLeft:8}},'≈ USD '+gasInfo.gasUSD),
            h('span',{style:{fontSize:10,color:'var(--txt-mute)',marginLeft:6}},'(POL demo ≈ $0.40)')))),

      /* Checkbox de confirmación irreversible */
      h('label',{style:{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer',marginBottom:20,padding:'12px 14px',borderRadius:10,background:'rgba(255,178,62,.04)',border:'1px solid rgba(255,178,62,.12)'}},
        h('input',{type:'checkbox',checked:confirmed,onChange:function(e){ setConfirmed(e.target.checked); },style:{width:15,height:15,marginTop:1,accentColor:'var(--emerald)',flexShrink:0}}),
        h('span',{style:{fontSize:12,color:'var(--txt-dim)',lineHeight:1.5}},
          'Entiendo que el NFT ',h('strong',{style:{fontFamily:'var(--mono)',color:'#FF5C5C'}},'#'+selectedId),
          ' será ',h('strong',{},'quemado permanentemente'),' y que esta operación no puede revertirse. Recibiré el token definitivo ',
          h('strong',{style:{color:'var(--emerald)'}},finalSymbol),' en 3–5 días hábiles.')),

      /* Botones */
      h('div',{style:{display:'flex',gap:10}},
        h('button',{className:'btn btn-ghost',style:{flex:1},onClick:onClose,disabled:loading},'Cancelar'),
        h('button',{className:'btn btn-primary',style:{flex:1,opacity:(!confirmed||loading)?0.45:1},disabled:!confirmed||loading,onClick:doRedeem},
          loading?'Procesando…':'Confirmar canje #'+selectedId)))
  );
}

/* Lo que Reental hace bien: vista consolidada de todas las posiciones,
   histórico de rentas, reinversión. Aquí con el balance real on-chain.  */
function PortfolioView({chain,wallet,toast,go,liveMode,liveWalletAddr}){
  const id = chain.identities[wallet.addr];
  const positions = chain.projects.map(p=>({p,bal:chain.bal(p.id,wallet.addr),claimable:chain.claimableYield(p.id,wallet.addr)})).filter(x=>x.bal>0);
  const totalValue = positions.reduce((s,x)=>s+x.bal*(x.p.priceUsdCents/100),0);
  const totalClaimable = positions.reduce((s,x)=>s+x.claimable,0);
  const [redeemModal,setRedeemModal]=useState(null);
  const [pendingRedemptions,setPendingRedemptions]=useState([]);

  function claimAll(){
    let total=0;
    positions.forEach(x=>{ if(x.claimable>0){ const r=chain.claimYield(x.p.id,wallet.addr); if(r.ok)total+=r.amount; } });
    if(total>0)toast({title:'Yield reclamado',msg:'USD '+fmt(total)+' acreditados de todos los proyectos'});
    else toast({type:'warn',title:'Nada para reclamar',msg:'No tenés yield pendiente'});
  }

  function downloadPortfolioReport(){
    if(positions.length===0){ toast&&toast({type:'warn',title:'Sin posiciones',msg:'No hay datos para exportar.'}); return; }
    downloadCsv('tokai_reporte_cartera.csv',
      ['Proyecto','Símbolo','Estándar','Tokens','Precio unitario USD','Valor USD','Yield anual %','Yield reclamable USD','Régimen','Wallet','Fecha de reporte'],
      positions.map(function(x){ return [x.p.name, x.p.symbol, x.p.tokenStandard||'ERC-3643', x.bal,
        (x.p.priceUsdCents/100).toFixed(2), (x.bal*(x.p.priceUsdCents/100)).toFixed(2),
        x.p.yieldAnnualPct||0, x.claimable.toFixed(2), x.p.regime, wallet.addr, new Date().toISOString()]; }));
    toast&&toast({title:'Reporte descargado',msg:positions.length+' posiciones exportadas a CSV.'});
  }

  return h('div',{},
    h('div',{className:'eyebrow'},'Mi cartera'),
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}},
      h('h1',{className:'page'},'Posición consolidada'),
      positions.length>0&&h('button',{className:'btn btn-ghost btn-sm',onClick:downloadPortfolioReport,title:'Descarga tu posición completa en CSV'},'⬇ Descargar reporte')),
    h('p',{className:'page-sub'},'Todas tus inversiones en un solo lugar: balance, renta acumulada y acciones rápidas. Como inversor verificado, operás en todos los proyectos compatibles con tu jurisdicción.'),
    liveMode==='real'&&h(PreGATLiveCard,{walletAddr:liveWalletAddr}),
    !id||!id.verified?h('div',{className:'card',style:{textAlign:'center',padding:'40px'}},
      h(Icon,{d:I.wallet,style:{width:36,height:36,margin:'0 auto 14px',opacity:.4}}),
      h('h3',{style:{fontSize:16,fontWeight:700,marginBottom:6}},'Verificá tu identidad para empezar'),
      h('p',{className:'muted',style:{fontSize:13,marginBottom:16}},'Necesitás KYC aprobado para invertir y ver tu cartera.'),
      h('button',{className:'btn btn-primary',onClick:()=>go('invest')},'Ir a verificación')
    ):h('div',{},

/* ─────────────────── DASHBOARD TOKAI (SUPERVISIÓN) ─────────────────── */
/* El cuarto rol que NINGÚN competidor tiene. TOKAI estructura y supervisa
   SIN custodiar ni ser PSAV. Pipeline de 6 rondas + compliance agregado.  */
const RONDAS = ['Clasificación','Análisis Financiero','Legal / Regulatorio','Destrucción del Caso','Pitch','Monitoreo'];
/* ════════════════════════════════════════════════════════════════════
   AdminInfraConfig — Deploy de infraestructura (TokenFactory + sub-factories)
   Firmado con MetaMask directamente desde el panel de control de TOKAI.
   ════════════════════════════════════════════════════════════════════ */
function AdminInfraConfig({toast, chain}) {
  var API = window.__API_URL__ || '';
  var [step, setStep] = useState(1); // 1: params, 2: deploying, 3: result
  var [network, setNetwork] = useState('polygonAmoy');
  var [chainId, setChainId] = useState(80002);
  var [usdcAddress, setUsdcAddress] = useState('0x41E94Eb019C0762f9Bfcf9Fb1E58725BfB0e7582');
  var [adminAddress, setAdminAddress] = useState('0x110a30061e86a0C99A7a9449Aa84174987633976');
  var [deployLogs, setDeployLogs] = useState([]);
  var [addresses, setAddresses] = useState(null);
  var [deployTxHash, setDeployTxHash] = useState(null);
  var [deployBlockNumber, setDeployBlockNumber] = useState(null);
  var [loading, setLoading] = useState(false);
  var [currentInfra, setCurrentInfra] = useState(null);
  var [checking, setChecking] = useState(false);

  function loadActiveInfra() {
    if (!API) return;
    setLoading(true);
    fetch(API + '/contracts/admin/config', { credentials: 'include' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function(data) {
        if (data && data.configured && data.deployment) {
          setCurrentInfra(data.deployment);
        } else {
          setCurrentInfra(null);
        }
      })
      .catch(function() {
        setCurrentInfra(null);
      })
      .finally(function() {
        setLoading(false);
      });
  }

  useEffect(function() {
    loadActiveInfra();
  }, []);

  function loadDefaults(net) {
    if (net === 'polygonAmoy') {
      setNetwork('polygonAmoy');
      setChainId(80002);
      setUsdcAddress('0x41E94Eb019C0762f9Bfcf9Fb1E58725BfB0e7582');
      setAdminAddress('0x110a30061e86a0C99A7a9449Aa84174987633976');
      toast && toast({ title: 'Defaults cargados', msg: 'Amoy (Testnet) configurado para deploy.' });
    } else if (net === 'polygon') {
      setNetwork('polygon');
      setChainId(137);
      setUsdcAddress('0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359');
      setAdminAddress('0x110a30061e86a0C99A7a9449Aa84174987633976');
      toast && toast({ title: 'Defaults cargados', msg: 'Polygon Mainnet configurado para deploy.' });
    }
  }

  async function handleVerify() {
    if (!currentInfra || !currentInfra.tokenFactory || !window.ethers) return;
    setChecking(true);
    try {
      var mm = window.ethereum;
      if (!mm) throw new Error('MetaMask no disponible');
      var provider = new ethers.BrowserProvider(mm);
      var factoryContract = new ethers.Contract(
        currentInfra.tokenFactory,
        ['function usdc() view returns (address)'],
        provider
      );
      var usdcOnChain = await factoryContract.usdc();
      toast && toast({ title: 'Infraestructura Online', msg: 'La fábrica respondió correctamente. USDC asociada: ' + usdcOnChain.slice(0, 10) + '…' });
    } catch (err) {
      console.error(err);
      toast && toast({ type: 'err', title: 'Fallo de verificación', msg: 'No se pudo conectar a la fábrica en la red actual.' });
    } finally {
      setChecking(false);
    }
  }

  async function startDeploy() {
    if (!window.TOKAI_WEB3) {
      toast && toast({ type: 'err', title: 'Capa Web3 faltante', msg: 'window.TOKAI_WEB3 no disponible.' });
      return;
    }
    if (!window.ethereum) {
      toast && toast({ type: 'err', title: 'MetaMask requerido', msg: 'Por favor conecta tu wallet MetaMask.' });
      return;
    }

    setLoading(true);
    setStep(2);
    setDeployLogs([]);

    // Custom logger listener for Web3 deploy console logs
    var originalLog = console.log;
    console.log = function(msg) {
      originalLog.apply(console, arguments);
      if (typeof msg === 'string' && msg.startsWith('[TOKAI_WEB3 deployInfra]')) {
        var logClean = msg.replace('[TOKAI_WEB3 deployInfra] ', '');
        setDeployLogs(function(prev) { return prev.concat([logClean]); });
      }
    };

    try {
      var mm = Array.isArray(window.ethereum.providers)
        ? (window.ethereum.providers.find(function(p){ return p.isMetaMask; }) || window.ethereum)
        : window.ethereum;
      var provider = new ethers.BrowserProvider(mm);
      var signer = await provider.getSigner();

      // Check ChainId match
      var netHex = '0x' + Number(chainId).toString(16);
      var currentChain = await mm.request({ method: 'eth_chainId' });
      if (parseInt(currentChain, 16) !== Number(chainId)) {
        try {
          await mm.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: netHex }] });
        } catch (swErr) {
          if (swErr.code === 4902) {
            var netName = network === 'polygon' ? 'Polygon PoS' : 'Polygon Amoy';
            var rpcs = network === 'polygon' ? ['https://polygon-rpc.com'] : ['https://rpc-amoy.polygon.technology'];
            var explorer = network === 'polygon' ? 'https://polygonscan.com/' : 'https://amoy.polygonscan.com/';
            await mm.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId: netHex,
                chainName: netName,
                nativeCurrency: { name: 'POL', symbol: 'POL', decimals: 18 },
                rpcUrls: rpcs,
                blockExplorerUrls: [explorer]
              }]
            });
          } else throw swErr;
        }
        // Re-instantiate provider after network switch
        provider = new ethers.BrowserProvider(mm);
        signer = await provider.getSigner();
      }

      var res = await TOKAI_WEB3.deployInfrastructure({
        usdcAddress: usdcAddress,
        adminAddress: adminAddress,
        network: network,
        chainId: Number(chainId)
      }, signer);

      if (res.ok) {
        setAddresses(res.addresses);
        setDeployTxHash(res.deployTxHash);
        setDeployBlockNumber(res.deployBlockNumber);
        setStep(3);
        toast && toast({ title: 'Deploy Completado', msg: 'Infraestructura desplegada exitosamente.' });
      } else {
        setStep(1);
        toast && toast({ type: 'err', title: 'Fallo en deploy', msg: res.reason || 'Ocurrió un error en MetaMask.' });
      }
    } catch (err) {
      console.error(err);
      setStep(1);
      toast && toast({ type: 'err', title: 'Error', msg: err.message || 'Error durante el deploy.' });
    } finally {
      console.log = originalLog; // Restore original console.log
      setLoading(false);
    }
  }

  async function handleActivate() {
    if (!API || !addresses) return;
    setLoading(true);
    try {
      var body = {
        network: network,
        chainId: Number(chainId),
        tokenFactory: addresses.tokenFactory,
        factories: {
          erc3643: addresses.erc3643,
          erc4626: addresses.erc4626,
          erc7540: addresses.erc7540,
          erc1155: addresses.erc1155,
          erc5192: addresses.erc5192
        },
        usdc: usdcAddress,
        deployTxHash: deployTxHash,
        deployBlockNumber: deployBlockNumber,
        deployedBy: adminAddress
      };

      var res = await fetch(API + '/contracts/admin/config', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        var errData = await res.json();
        throw new Error(errData.error || 'Error al persistir infraestructura.');
      }

      toast && toast({ title: 'Infraestructura Activada', msg: 'Fábrica e inyectores actualizados en el sistema.' });
      loadActiveInfra();
      setStep(1);
    } catch (err) {
      console.error(err);
      toast && toast({ type: 'err', title: 'Error', msg: err.message || 'Error de red.' });
    } finally {
      setLoading(false);
    }
  }

  var inp = { width: '100%', padding: '8px 10px', borderRadius: 8, border: '1px solid var(--line-solid)', background: 'var(--black)', color: 'var(--txt)', fontSize: 12, fontFamily: 'var(--mono)' };
  var labelStyle = { display: 'block', fontSize: 11, color: 'var(--txt-dim)', marginBottom: 4, fontWeight: 600 };
  var logStyle = { background: 'var(--black)', padding: '12px', borderRadius: 8, fontSize: 11.5, fontFamily: 'var(--mono)', color: '#10B981', maxHeight: '180px', overflowY: 'auto', border: '1px solid var(--line-solid)' };

  return h('div', { className: 'card' },
    h('div', { className: 'between', style: { marginBottom: 16 } },
      h('div', {},
        h('h3', { style: { fontSize: 15, fontWeight: 700, margin: 0 } }, 'Configuración de Infraestructura TOKAI'),
        h('div', { style: { fontSize: 12, color: 'var(--txt-mute)', marginTop: 3 } }, 'Despliega o vincula el TokenFactory y las fábricas de estándares RWA directamente desde la plataforma.')
      )
    ),

    // Active Infrastructure Card
    currentInfra && step === 1 && h('div', { style: { background: 'rgba(16,185,129,0.03)', border: '1px solid rgba(16,185,129,0.15)', padding: '16px', borderRadius: 10, marginBottom: 20 } },
      h('div', { className: 'between', style: { marginBottom: 12 } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: 6 } },
          h('span', { style: { width: 8, height: 8, borderRadius: '50%', background: '#10B981' } }),
          h('span', { style: { fontSize: 13, fontWeight: 700, color: 'var(--txt)' } }, 'Activa on-chain en ' + (currentInfra.network === 'polygon' ? 'Polygon Mainnet' : currentInfra.network === 'polygonAmoy' ? 'Polygon Amoy (Testnet)' : 'Hardhat Local'))
        ),
        h('div', { style: { display: 'flex', gap: 6 } },
          h('button', { className: 'btn btn-ghost btn-sm', style: { fontSize: 11 }, onClick: handleVerify, disabled: checking }, checking ? 'Verificando…' : '✓ Verificar On-Chain'),
          h('button', { className: 'btn btn-danger btn-sm', style: { fontSize: 11, background: 'rgba(255,92,92,0.1)', color: '#FF5C5C', border: 'none' }, onClick: function() { setCurrentInfra(null); } }, 'Reconfigurar')
        )
      ),
      h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, fontSize: 12 } },
        h('div', {},
          h('span', { style: { color: 'var(--txt-mute)' } }, 'TokenFactory (Orquestador): '),
          h('code', { style: { color: 'var(--emerald)' } }, currentInfra.tokenFactory)
        ),
        h('div', {},
          h('span', { style: { color: 'var(--txt-mute)' } }, 'USDC Token: '),
          h('code', {}, currentInfra.usdc)
        ),
        h('div', {},
          h('span', { style: { color: 'var(--txt-mute)' } }, 'ERC-3643 Factory: '),
          h('code', {}, (currentInfra.factories && currentInfra.factories.erc3643) || '—')
        ),
        h('div', {},
          h('span', { style: { color: 'var(--txt-mute)' } }, 'ERC-5192 Factory: '),
          h('code', {}, (currentInfra.factories && currentInfra.factories.erc5192) || '—')
        )
      )
    ),

    // Wizard Step 1: Params Form
    !currentInfra && step === 1 && h('div', {},
      h('div', { style: { background: 'rgba(255,178,62,0.04)', border: '1px solid rgba(255,178,62,0.15)', padding: '12px 14px', borderRadius: 8, marginBottom: 16, fontSize: 12.5, color: '#FFB23E', display: 'flex', gap: 8, alignItems: 'center' } },
        h('span', {}, '⚠️ No se detecta infraestructura activa en la plataforma. Configura los parámetros y firma con MetaMask para realizar el deploy.')
      ),
      h('div', { className: 'between', style: { marginBottom: 14 } },
        h('label', { style: { fontSize: 12, fontWeight: 700 } }, 'Preconfigurar Red'),
        h('div', { style: { display: 'flex', gap: 6 } },
          h('button', { className: 'btn btn-ghost btn-sm', onClick: function() { loadDefaults('polygonAmoy'); } }, 'Polygon Amoy (Testnet)'),
          h('button', { className: 'btn btn-ghost btn-sm', onClick: function() { loadDefaults('polygon'); } }, 'Polygon Mainnet (Circle USDC)')
        )
      ),
      h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 } },
        h('div', {},
          h('label', { style: labelStyle }, 'Identificador de Red'),
          h('select', { style: inp, value: network, onChange: function(e) { setNetwork(e.target.value); setChainId(e.target.value === 'polygon' ? 137 : e.target.value === 'polygonAmoy' ? 80002 : 31337); } },
            h('option', { value: 'polygonAmoy' }, 'Polygon Amoy (Testnet)'),
            h('option', { value: 'polygon' }, 'Polygon Mainnet'),
            h('option', { value: 'hardhat' }, 'Hardhat Local')
          )
        ),
        h('div', {},
          h('label', { style: labelStyle }, 'Chain ID (Número)'),
          h('input', { type: 'number', style: inp, value: chainId, readOnly: true })
        )
      ),
      h('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 20 } },
        h('div', {},
          h('label', { style: labelStyle }, 'Dirección USDC de la Red'),
          h('input', { style: inp, value: usdcAddress, onChange: function(e) { setUsdcAddress(e.target.value); } })
        ),
        h('div', {},
          h('label', { style: labelStyle }, 'Admin Address (Sujeta a DEFAULT_ADMIN_ROLE)'),
          h('input', { style: inp, value: adminAddress, onChange: function(e) { setAdminAddress(e.target.value); } })
        )
      ),
      h('button', { className: 'btn btn-primary', onClick: startDeploy, disabled: loading }, '🚀 Firmar Deploy con MetaMask')
    ),

    // Wizard Step 2: Deploying

function GuideView({chain, role, go, setRole}){
  const [guideRole, setGuideRole] = useState(role && GUIDES[role] ? role : 'investor');
  const [step, setStep] = useState(0);
  const g = GUIDES[guideRole];
  const steps = g.steps;
  const s = steps[step];
  const pct = Math.round(((step+1)/steps.length)*100);

  function pick(r){ setGuideRole(r); setStep(0); }
  function tryIt(){
    const v = s.action.view;
    // la vista real puede exigir un rol específico
    if(['invest','portfolio'].includes(v) && setRole) setRole('investor');
    else if(v==='admin' && setRole) setRole('issuer');
    else if(v==='tokai' && setRole) setRole('tokai');
    go(v);
  }

  return h('div',{},
    h('div',{className:'eyebrow'},'Manual interactivo'),
    h('h1',{className:'page'},'Guía de uso de la plataforma'),
    h('p',{className:'page-sub'},'Aprendé a usar TOKAI según tu rol. Elegí abajo y seguí los pasos — desde cada paso podés saltar a la vista real para probarlo.'),

    // selector de rol
    h('div',{style:{display:'flex',gap:10,marginBottom:22,flexWrap:'wrap'}},
      Object.entries(GUIDES).map(([k,v])=>h('button',{key:k,onClick:()=>pick(k),
        style:{flex:'1 1 180px',textAlign:'left',padding:'14px 16px',borderRadius:12,cursor:'pointer',

        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
          h('span',{style:{width:9,height:9,borderRadius:'50%',background:v.color,display:'inline-block'}}),
          h('span',{style:{fontWeight:700,fontSize:14,color:guideRole===k?v.color:'var(--txt)'}},v.label)),
        h('div',{style:{fontSize:11,color:'var(--txt-mute)',lineHeight:1.4}},v.intro.slice(0,72)+'…'))) ),

    // progreso
    h('div',{className:'between',style:{marginBottom:8,fontSize:12}},
      h('span',{className:'muted'},'Paso '+(step+1)+' de '+steps.length),
      h('span',{className:'mono',style:{color:g.color}},pct+'%')),
    h('div',{className:'proj-progress',style:{marginBottom:20}},
      h('div',{className:'proj-progress-fill',style:{width:pct+'%',background:g.color}})),

    // tarjeta del paso
    h('div',{className:'card',style:{borderColor:g.color+'40',marginBottom:16}},
      h('div',{style:{display:'flex',gap:14,alignItems:'flex-start'}},
        h('div',{style:{flexShrink:0,width:38,height:38,borderRadius:10,background:g.color+'18',color:g.color,
          display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:17}},step+1),
        h('div',{style:{flex:1}},
          h('h2',{style:{fontSize:18,fontWeight:700,marginBottom:8}},s.title),
          h('p',{style:{fontSize:13.5,lineHeight:1.6,color:'var(--txt-dim)',marginBottom:s.tip?12:0}},s.body),
          s.tip&&h('div',{style:{display:'flex',gap:8,padding:'10px 12px',borderRadius:9,background:'var(--black)',borderLeft:'2px solid '+g.color}},
            h('span',{style:{color:g.color,fontWeight:700,fontSize:11,flexShrink:0,marginTop:1}},'TIP'),
            h('span',{style:{fontSize:12,color:'var(--txt-mute)',lineHeight:1.5}},s.tip)),

    // navegación de pasos
    h('div',{className:'between',style:{marginBottom:24}},

      h('div',{style:{display:'flex',gap:6}},
        steps.map((_,i)=>h('button',{key:i,onClick:()=>setStep(i),'aria-label':'Paso '+(i+1),

            background:i===step?g.color:i<step?g.color+'80':'var(--line-solid)'}}))),
      step<steps.length-1
        ? h('button',{className:'btn btn-primary btn-sm',style:{background:g.color,borderColor:g.color},onClick:()=>setStep(step+1)},'Siguiente →')
        : h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setStep(0)},'Reiniciar')),

/* ════════════════════════════════════════════════════════════════════
   TOKAI Platform — Modo simple + login dual (views5)
   LoginGate (email o wallet) · HomeEmisor · WizardCrear
   Capa de presentación: reusa toda la lógica validada (useChain, compliance).
   ════════════════════════════════════════════════════════════════════ */

/* ---------- LoginGate: email (Web2) o wallet ---------- */
/* ── Admin role asignado por el backend según JWT (no hardcodeado en frontend) ── */
var TOKAI_ADMIN_EMAILS = [];

/* ── Emails de emisores aprobados (persistidos en localStorage por TOKAI) ── */
function getApprovedEmitters() {
  try {
    var raw = localStorage.getItem('tokai_approved_emitters');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function saveApprovedEmitter(email, data) {
  try {
    var list = getApprovedEmitters();
    var exists = list.find(function(e){ return e.email === email; });
    if (!exists) list.push(Object.assign({ email: email, approvedAt: Date.now() }, data || {}));
    localStorage.setItem('tokai_approved_emitters', JSON.stringify(list));
  } catch(e) {}
}
function removeApprovedEmitter(email) {
  try {
    var list = getApprovedEmitters().filter(function(e){ return e.email !== email; });
    localStorage.setItem('tokai_approved_emitters', JSON.stringify(list));
  } catch(e) {}
}

function LoginGate({onLogin, web3, toast}){
  const [email,setEmail]     = useState('');
  const [tab,setTab]         = useState('email');
  const [phase,setPhase]     = useState('input');   // input | otp | signing
  const [otp,setOtp]         = useState('');
  const [generatedOtp,setGeneratedOtp] = useState('');
  const [sending,setSending] = useState(false);
  const [error,setError]     = useState('');

  /* ── Generar OTP de 6 dígitos y "enviarlo" ──────────────────────
     En producción: POST /api/auth/send-otp → backend envía email real.
     En demo: el código aparece en pantalla (tooltip dorado) para testing.
     La lógica es idéntica — solo cambia si el código se muestra o se envía.   */
  async function sendOtp() {
    const v = email.trim().toLowerCase();
    if(!/^[^@]+@[^@]+\.[^@]+$/.test(v)){
      setError('Ingresá un email válido.'); return;
    }
    setError('');
    setSending(true);

    if(window.__API_URL__) {
      try {
        const res = await fetch(window.__API_URL__ + '/auth/otp/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: v }),
        });
        if(res.status === 429) {
          const errData = await res.json().catch(()=>({}));
          const msg = errData.error || 'Demasiados intentos.';
          setError(msg + ' Hacé clic en "Enviar código" de nuevo cuando estés listo.');
          setSending(false); return;
        }
        if(!res.ok) { setError('Error al enviar. Intentá de nuevo.'); setSending(false); return; }
        setSending(false);
        setPhase('otp');
        toast&&toast({ title: 'Código enviado', msg: 'Revisá tu bandeja de ' + v + '.' });
      } catch(e) {
        setError('No se pudo conectar con el servidor.'); setSending(false);
      }
      return;
    }

    /* Modo demo: mostrar código en pantalla */
    await new Promise(r=>setTimeout(r,900));
    const code = String(Math.floor(100000 + Math.random() * 900000));
    setGeneratedOtp(code);
    setSending(false);
    setPhase('otp');
    toast&&toast({
      title: 'Código enviado',
      msg: 'Demo: el código aparece en pantalla.',
    });
  }

  /* ── Verificar OTP ─────────────────────────────────────────────── */
  async function verifyOtp() {
    const v = email.trim().toLowerCase();

    if(window.__API_URL__) {
      setSending(true);
      try {
        const res = await fetch(window.__API_URL__ + '/auth/otp/verify', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Auth-Fallback': 'true'
          },
          body: JSON.stringify({ email: v, code: otp.trim() }),
        });
        const data = await res.json();
        if(!res.ok) { setError(data.message || 'Código incorrecto.'); setSending(false); return; }
        if (data.token) {
          localStorage.setItem('tokai_jwt', data.token);
        }
        setSending(false);
        setError('');
        const backendRole = data.user.role;
        const frontRole = backendRole === 'admin' ? 'tokai' : backendRole;
        onLogin({
          method: 'email', id: data.user.email,
          label: backendRole === 'admin' ? 'TOKAI Admin' : data.user.email.split('@')[0],
          role: frontRole,
          isAdmin: backendRole === 'admin',
          approved: data.user.status === 'approved',
        });
      } catch(e) {
        setError('Error de conexión. Intentá de nuevo.'); setSending(false);
      }
      return;
    }

    /* Modo demo */
    if(otp.trim() !== generatedOtp){
      setError('Código incorrecto. Revisá el email o solicitá uno nuevo.'); return;
    }
    setError('');
    if(TOKAI_ADMIN_EMAILS.indexOf(v) !== -1){
      onLogin({method:'email', id:v, label:'TOKAI Admin', role:'tokai', isAdmin:true});
      return;
    }
    const approved = getApprovedEmitters().find(function(e){ return e.email===v; });
    if(approved){
      onLogin({method:'email', id:v, label:v.split('@')[0], role:'issuer', approved:true, approvalData:approved});
      return;
    }
    onLogin({method:'email', id:v, label:v.split('@')[0], role:'issuer', approved:false});
  }

  function resetToInput() { setPhase('input'); setOtp(''); setGeneratedOtp(''); setError(''); }

  /* ── Login con wallet: pide firma del desafío ─────────────────── */
  async function loginWallet(){
    if(web3&&web3.available){
      setPhase('signing');
      setError('');
      const result = await Promise.race([
        web3.connect(),
        new Promise(resolve=>setTimeout(()=>resolve('__TOKAI_WALLET_TIMEOUT__'),15000))
      ]);
      if(result==='__TOKAI_WALLET_TIMEOUT__'){
        setPhase('input');
        toast&&toast({type:'warn',title:'MetaMask no respondió',msg:'Hacé clic en el ícono de MetaMask en la barra del navegador y aprobá la conexión, luego intentá de nuevo.'});
        return;
      }
      if(result && typeof result==='string'){
        setPhase('input');
        onLogin({method:'wallet', id:result, label:short(result), role:'investor', approved:true});
        return;
      }
      setPhase('input');
      const errMsg = (result && result.error) ? result.error : 'MetaMask rechazó o no completó la conexión.';
      setError(errMsg);
      toast&&toast({type:'err',title:'No se pudo conectar',msg:errMsg});
    } else {
      onLogin({method:'wallet', id:'0xDEMO', label:'Wallet demo', role:'investor', approved:true});
    }
  }

  const inp = {width:'100%',padding:'12px 14px',borderRadius:9,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:14,boxSizing:'border-box'};
  const inpOtp = Object.assign({},inp,{letterSpacing:'0.35em',fontSize:22,fontWeight:700,textAlign:'center',fontFamily:'var(--mono)'});

  return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'var(--black)'}},
    h('div',{style:{width:'100%',maxWidth:520}},

function HomeEmisor({chain, auth, go, wallet, connectWallet}){
  const mine = (chain.projects||[]);
  const mainProject = mine[0]||null;

  /* Próxima acción según etapa */
  function nextAction(p) {
    if(!p) return {label:'Crear tu primer proyecto', view:'wizard', color:'var(--emerald)', urgent:true};
    const s = getProjectStage(p);
    if(s===1) return {label:'TOKAI está analizando tu proyecto', view:null, color:'#FFB23E', urgent:false};
    if(s===2) return {label:'Revisá la tesis de valor que TOKAI te envió', view:'thesis-client', color:'#FFB23E', urgent:true};
    if(s===3) return {label:'Revisá el reporte del modelo de negocio', view:'thesis-client', color:'#FFB23E', urgent:!!p.reportSentToClient};
    if(s===4) return {label:'TOKAI está configurando el contrato', view:null, color:'#9AA0A6', urgent:false};
    if(s===5) {
      if(!wallet||!wallet.addr) return {label:'Conectá tu wallet MetaMask para recibir la habilitación', view:null, color:'#FFB23E', urgent:true, walletNeeded:true};
      return {label:'TOKAI va a habilitar tu emisión pronto', view:null, color:'#9AA0A6', urgent:false};
    }
    if(s===6) return {label:'¡Podés emitir tokens! Andá a Emisión', view:'admin', color:'var(--emerald)', urgent:true};
    if(s===7) return {label:'Tu proyecto está activo y distribuyendo', view:'admin', color:'var(--emerald)', urgent:false};
    return {label:'Crear tu primer proyecto', view:'wizard', color:'var(--emerald)', urgent:true};

  const next = nextAction(mainProject);

  return h('div',{},
    h('div',{className:'eyebrow'},'Hola'+(auth&&auth.label?', '+auth.label:'')),

      border:'1px solid '+(wallet&&wallet.addr?'rgba(0,214,126,.2)':'rgba(255,178,62,.2)')}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},

          : h('span',{style:{fontSize:12,color:'#FFB23E'}},'Wallet no conectada')),
      !wallet||!wallet.addr
        ? h('button',{className:'btn btn-ghost btn-sm',style:{borderColor:'rgba(255,178,62,.4)',color:'#FFB23E'},

        : mainProject && !mainProject.issuerWallet && h('button',{className:'btn btn-ghost btn-sm',

    /* Progress bar del proyecto principal */
    mainProject && h('div',{className:'card',style:{marginBottom:14}},

        h('div',{},
          h('div',{style:{fontWeight:700,fontSize:14}},mainProject.name),
          h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginTop:2}},mainProject.vertical+' · '+mainProject.symbol)),
        h('div',{style:{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,
          background:next.urgent?'rgba(0,214,126,.12)':'rgba(255,255,255,.05)',

        {k:'guide', label:'Cómo funciona', desc:'Guía del proceso', icon:'M12 17v.01M12 13a2 2 0 10-2-2', color:'#9AA0A6'},
      ].filter(Boolean).map(a=>h('button',{key:a.k,onClick:()=>go(a.k),

          h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:a.color,strokeWidth:2,style:{width:18,height:18}},h('path',{d:a.icon,strokeLinecap:'round',strokeLinejoin:'round'}))),
        h('div',{},
          h('div',{style:{fontSize:13,fontWeight:700,marginBottom:2}},a.label),
          h('div',{style:{fontSize:11,color:'var(--txt-mute)'}},a.desc))))),

    /* Proyectos adicionales */

/* ---------- WizardCrear: alta de proyecto en lenguaje llano ---------- */

function WizardCrear({chain, toast, go}){
  const [step,setStep] = useState(0);
  const [adv,setAdv] = useState(false);
  const [sealing, setSealing] = useState(false);
  const [sealingFile, setSealingFile] = useState('');
  const [f,setF] = useState({
    name:'', kind:'inmueble', valuationUsd:'', tokens:'',
    coverImage:null, gallery:[],
    photoSeals: [], // hashes BFA de las fotos (SHA-256)
    audience:'calificados', // simple default → RG 1088
    // v3.3.0 — multi-standard
    tokenStandard: 'ERC-3643',
    adminAddress: '', operatorAddress: '', complianceAddress: '',
    // v3.4.0 — emisor multijurisdiccional
    issuerJurisdiction: 'AR',
    kycProvider: 'sumsub',
    compositeEmission: false,
  });
  const set=(k,v)=>setF(s=>({...s,[k]:v}));
  function readFile(file,cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }

  useEffect(function(){
    if (f.issuerJurisdiction === 'AR' && f.audience === 'todos') {
      set('compositeEmission', true);
    } else {
      setF(function(s) {
        if (s.compositeEmission === undefined) {
          return Object.assign({}, s, { compositeEmission: false });
        }
        return s;
      });
    }
  }, [f.issuerJurisdiction, f.audience]);

  // Sellado BFA: calcula SHA-256 del ArrayBuffer de la imagen → hex → sello demo con delay dramático de carga
  async function sealPhoto(file, dataCb){
    setSealing(true);
    setSealingFile(file.name);
    
    const ab = await file.arrayBuffer();
    const hashBuf = await crypto.subtle.digest('SHA-256', ab);
    const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    const seal = { name:file.name, hash:hashHex, ts:Date.now(), bfaTx:'0x'+hashHex.slice(0,16)+'…(demo)' };
    
    // Feedback visual del hashing on-chain
    await new Promise(r => setTimeout(r, 1600));
    
    const reader = new FileReader();
    reader.onload = ()=>{
      dataCb(reader.result, seal);
      setSealing(false);
      setSealingFile('');
    };
    reader.readAsDataURL(file);
  }

  const KINDS=[
    {k:'inmueble', label:'Un inmueble', sub:'Departamentos, local, mall, desarrollo', vertical:'inmobiliario', mech:'A'},
    {k:'credito', label:'Un pool de crédito', sub:'Préstamos, leasing, financiación', vertical:'rodados', mech:'B'},
    {k:'club', label:'Mi club / comunidad', sub:'Fan tokens, beneficios cerrados', vertical:'utility', mech:'C'},
  ];
  const kind = KINDS.find(x=>x.k===f.kind)||KINDS[0];
  const price = (f.valuationUsd&&f.tokens) ? (Number(f.valuationUsd)/Number(f.tokens)) : 0;

  const steps = [
    {t:'¿Qué querés tokenizar?', valid:()=>f.name.trim().length>2},
    {t:'¿Cuánto vale y en cuántas partes?', valid:()=>f.kind==='club'||(Number(f.valuationUsd)>0&&Number(f.tokens)>0)},
    {t:'Fotos del activo', valid:()=>true},
    {t:'¿Quiénes pueden invertir?', valid:()=>true},
    {t:'Revisar y crear', valid:()=>true},
  ];
  const s = steps[step];
  const pct = Math.round(((step+1)/steps.length)*100);

  function crear(){
    const symbol = (f.name.replace(/[^A-Za-z]/g,'').slice(0,4).toUpperCase()||'TOK');
    const strategy = (window.TOKEN_STRATEGIES||{})[f.tokenStandard] || (window.TOKEN_STRATEGIES||{})['ERC-3643'] || {};
    const soulbound = f.kind==='club' || !!strategy.soulbound;
    const jurCfg = (ISSUER_JURISDICTIONS[f.issuerJurisdiction]||ISSUER_JURISDICTIONS['AR']);
    const regDerived = jurCfg.regimes[f.audience] || jurCfg.regimes['calificados'] || strategy.regime || 'Regimen regulado';
    // isComposite = cualquier jurisdiccion en oferta publica con flag compositeEmission
    // isRg1069   = especifico de Argentina (solo afecta naming y architecture key)
    const isRg1069 = f.issuerJurisdiction === 'AR' && f.audience === 'todos';
    const isComposite = !!f.compositeEmission;
    const emissionStack = isComposite ? [
      { stage: 1, key: isRg1069 ? 'pregat' : 'soulbound',
        symbol: 'PRE-' + symbol,
        standard: 'ERC-721',
        role: 'certificado_soulbound',
        label: isRg1069 ? 'Certificado soulbound de preventa' : 'Certificado soulbound · Etapa 1',
        status: 'operable', jurisdiction: f.issuerJurisdiction, regime: regDerived },
      { stage: 2, key: isRg1069 ? 'gat' : 'token',
        symbol: symbol,
        standard: 'ERC-3643',
        role: 'token_definitivo',
        label: isRg1069 ? 'Token definitivo regulado' : 'Token regulado · Etapa 2 (' + jurCfg.label + ')',
        status: 'pendiente_factory', jurisdiction: f.issuerJurisdiction, regime: regDerived }
    ] : [
      { stage: 1, key: 'primary', symbol: symbol, standard: f.tokenStandard || 'ERC-3643', role: 'emision_primaria', label: strategy.label || 'Instrumento primario', status: 'operable', jurisdiction: f.issuerJurisdiction, regime: regDerived }
    ];
    const cfg = {
      name:f.name.trim(), symbol, vertical:kind.vertical, assetType:kind.label,
      yieldMechanism:kind.mech,
      valuationUsd: Number(f.valuationUsd)||0,
      supplyMax: f.kind==='club'? 500 : (Number(f.tokens)||0),
      priceUsd: f.kind==='club'? 0 : Math.round(price),
      coverImage:f.coverImage, gallery:f.gallery, photoSeals:f.photoSeals||[],
      regime: (ISSUER_JURISDICTIONS[f.issuerJurisdiction]||ISSUER_JURISDICTIONS['AR']).regimes[f.audience] || strategy.regime || (f.audience==='todos' ? 'Oferta pública' : 'Oferta privada · calificados'),
      regimeLabel: (ISSUER_JURISDICTIONS[f.issuerJurisdiction]||ISSUER_JURISDICTIONS['AR']).regimes[f.audience] || (f.audience==='todos' ? 'Oferta pública' : 'Oferta privada · calificados'),
      issuerJurisdiction: f.issuerJurisdiction || 'AR',
      kycProvider: f.kycProvider || 'sumsub',
      jurisdictions:[jurCfg.iso], lockupDays: f.audience==='todos'?0:180, soulbound, maxHolders: f.audience==='todos'?0:50,
      status:'En estructuración', ronda:1, rondaLabel:'Ronda 1 · Clasificación',
      yieldAnnualPct: kind.mech==='C'?0:8, plusvaliaPct: kind.mech==='A'?15:0, payoutFreq:'trimestral',
      termMonths:48, yieldSource: kind.mech==='A'?'Renta del inmueble':kind.mech==='B'?'Cuotas del pool de crédito':'Sin flujo financiero (cerrado)',
      tranches:[], docs:[], tokenProfiles:[], proforma:{},
      // v3.3.0 — multi-standard
      tokenStandard: f.tokenStandard || 'ERC-3643',
      adminAddress:      f.adminAddress      || null,
      operatorAddress:   f.operatorAddress   || null,
      complianceAddress: f.complianceAddress || null,
      // v3.4.0 — JSONB universales (ADR-007)
      walletRoles: {
        admin:      f.adminAddress      || '',
        operator:   f.operatorAddress   || '',
        compliance: f.complianceAddress || '',
      },
      complianceRules: strategy.complianceRules || {},
      meta: { emissionStack: emissionStack, emissionArchitecture: isRg1069 ? 'composite_1069_pregat_to_gat' : isComposite ? 'composite_local_soulbound_to_token' : 'single_instrument' },
      phaseState: { phase: 1, phase2_active: false, emission_stack: emissionStack },
    };
    if(chain.createProject){ chain.createProject(cfg); toast&&toast({title:'¡Proyecto creado!',msg:f.name+' quedó listo para configurar y emitir.'}); go('admin'); }
    else { toast&&toast({type:'err',title:'No disponible',msg:'createProject no está disponible en este modo.'}); }
  }

  return h('div',{style:{maxWidth:640}},
    h('style', {}, `
      @keyframes scanLine {
        0% { transform: translateY(-5px); opacity: 0.4; }
        50% { transform: translateY(85px); opacity: 1; }
        100% { transform: translateY(-5px); opacity: 0.4; }
      }
    `),
    h('button',{className:'btn btn-ghost btn-sm',style:{marginBottom:14},onClick:()=>step===0?go('home'):setStep(step-1)},'← '+(step===0?'Volver al inicio':'Atrás')),
    
    /* Stepper por Nodos con transiciones */
    h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '8px', marginBottom: '24px' } },
      steps.map((st, idx) => {
        const isDone = idx < step;
        const isCur = idx === step;
        return h('div', { key: idx, style: { display: 'flex', alignItems: 'center', gap: '8px', flex: idx < steps.length - 1 ? 1 : 'none' } },
          h('div', {
            style: {
              width: 24, height: 24, borderRadius: '50%',
              background: isDone ? 'var(--emerald)' : isCur ? 'rgba(0,214,126,.15)' : 'rgba(255,255,255,.05)',

            h('span', { style: { fontSize: 9, fontWeight: 700, color: 'var(--emerald)', background: 'rgba(0,214,126,.1)', padding: '2px 8px', borderRadius: 20 } }, kind.vertical.toUpperCase()),
            h('span', { style: { fontSize: 9, color: 'var(--txt-mute)' } }, ((window.TOKEN_STRATEGIES||{})[f.tokenStandard]||{}).badge||f.tokenStandard)),
          h('h3', { style: { fontSize: 15, fontWeight: 800, margin: '0 0 4px', color: 'var(--txt)' } }, f.name || 'Proyecto RWA'),
          h('div', { style: { fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--txt-mute)', marginBottom: 12 } }, 'Ticker: ' + (f.name.replace(/[^A-Za-z]/g,'').slice(0,4).toUpperCase() || 'TOK')),
          
          h('div', { style: { display: 'flex', justifyContent: 'space-between', padding: '10px 0 0', borderTop: '1px solid rgba(255,255,255,.05)', fontSize: 11 } },
            h('div', {},
              h('div', { style: { color: 'var(--txt-mute)', fontSize: 8, textTransform: 'uppercase', marginBottom: 2 } }, 'Precio Estimado'),
              h('div', { style: { fontWeight: 700, color: 'var(--txt)' } }, f.kind==='club'? 'SBT (Acceso)' : 'USD ' + Math.round(price).toLocaleString())),
            h('div', { style: { textAlign: 'right' } },
              h('div', { style: { color: 'var(--txt-mute)', fontSize: 8, textTransform: 'uppercase', marginBottom: 2 } }, 'Regulación'),
              h('div', { style: { fontWeight: 700, color: 'var(--emerald)' } },
                (ISSUER_JURISDICTIONS[f.issuerJurisdiction]||ISSUER_JURISDICTIONS['AR']).regimes[f.audience]||(f.audience==='todos'?'Oferta pública':'Oferta privada'))))
        ))
    ),

    // navegación
    h('div',{style:{display:'flex',gap:10,marginTop:24}},
      step<steps.length-1
        ? h('button',{className:'btn btn-primary',style:{flex:1,opacity:s.valid()&&!sealing?1:.5},disabled:!s.valid()||sealing,onClick:()=>s.valid()&&setStep(step+1)},'Continuar →')
        : h('button',{className:'btn btn-primary',style:{flex:1},onClick:crear},'✓ Crear proyecto'))
  );
}

/* ─── Tipos de bloque disponibles ─── */
const BLOCK_TYPES = [
  {k:'texto',     label:'Texto libre',        icon:'≡'},
  {k:'lista_si',  label:'Lista ✓ (otorga)',   icon:'✓'},
  {k:'lista_no',  label:'Lista ✗ (no otorga)',icon:'✗'},
  {k:'kv',        label:'Datos estructurados', icon:'⊞'},
  {k:'mecanismo', label:'Mecanismo A/B/C',    icon:'⚡'},
  {k:'alerta',    label:'Advertencia / riesgo',icon:'⚠'},
];

/* ─── Template base de 7 bloques ─── */
function buildDefaultBlocks(p){
  const mech = p?.yieldMechanism||'A';
  const mechDesc = {A:'Renta periódica — push de yield (alquiler, cupones)',B:'Waterfall de crédito — cuota → cascada (pools, leasing)',C:'Ecosistema cerrado — sin flujo financiero (fan tokens, acceso)'}[mech]||'';
  return [
    {id:'b1', tipo:'texto',    titulo:'Finalidad del token',
     contenido: p?.desc||'', aiAssisted:false},
    {id:'b2', tipo:'lista_si', titulo:'El token OTORGA',
     items: p?.tokenProfiles?.map(t=>'Derecho económico sobre: '+t.right)||['Derecho económico sobre los flujos del activo'], aiAssisted:false},
    {id:'b3', tipo:'lista_no', titulo:'El token NO otorga',
     items:['Titularidad registral del activo subyacente','Derechos políticos o de voto societario','Acceso físico o usufructo del activo'], aiAssisted:false},
    {id:'b4', tipo:'texto',    titulo:'Modelo de negocio que avala el token',
     contenido: p?.yieldSource||'', aiAssisted:false},
    {id:'b5', tipo:'mecanismo',titulo:'Mecanismo de flujo al holder',
     mecanismo: mech, descripcion: mechDesc, aiAssisted:false},
    {id:'b6', tipo:'texto',    titulo:'Cómo fluye el dinero al holder',
     contenido:'', aiAssisted:false},
    {id:'b7', tipo:'kv',       titulo:'Estructura legal',
     pairs:[['Vehículo emisor','Fideicomiso Financiero (Ley 24.441)'],['Fiduciario','Allaria Ledesma'],['PSAV','Ripio (Cat. 1 y 4)'],['Régimen',p?.regime||'RG 1088']], aiAssisted:false},
  ];
}

/* ─── Badge estado tesis ─── */
function ThesisBadge({estado}){
  const cfg={borrador:{label:'Borrador',c:'#9AA0A6'},enviada:{label:'Enviada al cliente',c:'#FFB23E'},confirmada:{label:'Confirmada ✓',c:'var(--emerald)'},revision_solicitada:{label:'Revisión solicitada',c:'#FF5C5C'}}[estado]||{label:estado,c:'#9AA0A6'};
  return h('span',{style:{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:cfg.c+'20',color:cfg.c,border:'1px solid '+cfg.c+'50'}},cfg.label);
}

/* ─── Llamada al proxy de IA (backend protegido) ─── */
async function callTokaiAgent(userMsg, projectContext){
  const context = `PROYECTO: ${projectContext.name||''} | Vertical: ${projectContext.vertical||''} | Régimen: ${projectContext.regime||''} | Mecanismo: ${projectContext.yieldMechanism||''} | Valuación: USD ${(projectContext.valuationUsd||0).toLocaleString()} | Desc: ${(projectContext.desc||'').slice(0,200)}`;
  const res = await fetch((window.__API_URL__||'')+'/ai/chat',{
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mode:'tokai', messages:[{role:'user',content:userMsg}], context})
  });
  if(!res.ok) return 'Error al conectar con el agente.';
  const data = await res.json();
  return data.text || 'Sin respuesta.';
}

/* ═══════════════════════════════════════════════════════════════════
   ThesisFlexEditor — formulario flexible con IA
   ═══════════════════════════════════════════════════════════════════ */
function ThesisFlexEditor({chain, toast, go}){
  const projects = chain.projects||[];
  const [pid,setPid] = useState(0);
  const p = projects[pid]||projects[0]||{};

  /* estado de los bloques */
  const initBlocks = ()=> p.thesis?.blocks || buildDefaultBlocks(p);
  const [blocks,setBlocks] = useState(initBlocks);
  const [thesisState,setThesisState] = useState(p.thesis?.estado||'borrador');

  /* Gate de gobernanza */
  const emEnabled = p.emissionEnabled?.[0] === true;
  const emPaused  = p.emissionPaused === true;
  const [pauseReason,setPauseReason] = useState('');
  const [showPause,setShowPause] = useState(false);

  /* IA */
  const [aiLoading,setAiLoading] = useState(null); // blockId o 'chat' o 'auto'
  const [aiSuggestion,setAiSuggestion] = useState(null); // {blockId, text}
  const [chatOpen,setChatOpen] = useState(false);
  const [chatHistory,setChatHistory] = useState([]);
  const [chatInput,setChatInput] = useState('');
  const [showAddBlock,setShowAddBlock] = useState(false);
  const [showExport,setShowExport] = useState(false);

  /* sincronizar proyecto */
  function syncProject(pid){
    const pr = projects[pid]||{};
    setBlocks(pr.thesis?.blocks||buildDefaultBlocks(pr));
    setThesisState(pr.thesis?.estado||'borrador');
    setChatHistory([]);
    setAiSuggestion(null);
  }

  function save(newBlocks, newState){
    const b = newBlocks||blocks;
    const s = newState||thesisState;
    const thesisData = {blocks:b,estado:s,confirmedAt:null,confirmHash:null,revisionComment:''};
    if(chain.updateProject) chain.updateProject(pid, {thesis:thesisData});
    // Persistir tesis en backend
    const p2 = chain.projects&&chain.projects[pid];
    if(p2 && p2.id && typeof p2.id === 'string' && p2.id.length === 36){
      const apiUrl = window.__API_URL__ || '';
      if(apiUrl){
        const backendStatus = s === 'enviada' ? 'sent' : s === 'confirmada' ? 'confirmed' : 'draft';
        fetch(apiUrl + '/projects/' + p2.id + '/thesis', {
          method: 'PUT',
          credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({thesis: thesisData, status: backendStatus})
        }).catch(function(){});
      }
    }
  }

  /* ─── operaciones de bloque ─── */
  function updBlock(id,patch){ setBlocks(bs=>bs.map(b=>b.id===id?{...b,...patch}:b)); }
  function addItem(id,field){ updBlock(id,{[field]:[...(blocks.find(b=>b.id===id)?.[field]||[]),'']}); }
  function updItem(id,field,i,v){ const b=blocks.find(x=>x.id===id); if(!b)return; const arr=[...(b[field]||[])]; arr[i]=v; updBlock(id,{[field]:arr}); }
  function delItem(id,field,i){ const b=blocks.find(x=>x.id===id); if(!b)return; updBlock(id,{[field]:(b[field]||[]).filter((_,j)=>j!==i)}); }
  function moveBlock(id,dir){ setBlocks(bs=>{ const i=bs.findIndex(b=>b.id===id); if(i<0)return bs; const ni=i+dir; if(ni<0||ni>=bs.length)return bs; const nb=[...bs]; [nb[i],nb[ni]]=[nb[ni],nb[i]]; return nb; }); }
  function delBlock(id){ setBlocks(bs=>bs.filter(b=>b.id!==id)); }
  function addBlock(tipo){ const id='b'+Date.now(); const nb={id,tipo,titulo:'Bloque nuevo',aiAssisted:false}; if(tipo==='texto')nb.contenido=''; else if(tipo==='lista_si'||tipo==='lista_no')nb.items=['']; else if(tipo==='kv')nb.pairs=[['','']]; else if(tipo==='mecanismo'){nb.mecanismo='A';nb.descripcion='';} else if(tipo==='alerta')nb.contenido=''; setBlocks(bs=>[...bs,nb]); setShowAddBlock(false); }
  function addKvRow(id){ const b=blocks.find(x=>x.id===id); updBlock(id,{pairs:[...(b?.pairs||[]),['','']]}); }
  function updKv(id,i,col,v){ const b=blocks.find(x=>x.id===id); const p=[...(b?.pairs||[])]; p[i]=[col===0?v:p[i][0],col===1?v:p[i][1]]; updBlock(id,{pairs:p}); }

  /* ─── IA: pre-completado automático ─── */
  async function autoComplete(){
    setAiLoading('auto');
    try{
      const prompt = `Generá un borrador completo de la Tesis de Valor para este proyecto de tokenización. Para cada bloque, devolvé un JSON con este formato exacto:
{"finalidad":"...","otorga":["...","..."],"noOtorga":["...","..."],"modelo":"...","flujo":"...","vehiculo":"...","fiduciario":"...","psav":"..."}
Solo el JSON, sin texto adicional.`;
      const res = await callTokaiAgent(prompt, p);
      try{
        const data = JSON.parse(res.replace(/```json|```/g,'').trim());
        setBlocks(bs=>bs.map(b=>{
          if(b.id==='b1') return {...b,contenido:data.finalidad||b.contenido,aiAssisted:true};
          if(b.id==='b2') return {...b,items:data.otorga||b.items,aiAssisted:true};
          if(b.id==='b3') return {...b,items:data.noOtorga||b.items,aiAssisted:true};
          if(b.id==='b4') return {...b,contenido:data.modelo||b.contenido,aiAssisted:true};
          if(b.id==='b6') return {...b,contenido:data.flujo||b.contenido,aiAssisted:true};
          if(b.id==='b7') return {...b,pairs:[['Vehículo emisor',data.vehiculo||''],['Fiduciario',data.fiduciario||''],['PSAV',data.psav||''],['Régimen',p.regime||'RG 1088']],aiAssisted:true};
          return b;
        }));
        toast&&toast({title:'IA pre-completó la tesis',msg:'Revisá cada campo y editá lo que necesites.'});
      } catch(e){
        toast&&toast({type:'err',title:'Error al parsear respuesta IA',msg:'La IA respondió en formato inesperado. Usá el chat para ayuda.'});
      }
    } finally { setAiLoading(null); }
  }

  /* ─── IA: sugerencia por campo ─── */
  async function suggestField(block){
    setAiLoading(block.id);
    try{
      const tipo = block.tipo;
      let prompt = `Para el bloque "${block.titulo}" de la tesis de valor de ${p.name}, `;
      if(tipo==='texto'||tipo==='alerta') prompt+=`redactá un texto institucional conciso (máximo 80 palabras) que complete este campo. Solo el texto, sin encabezado.`;
      else if(tipo==='lista_si') prompt+=`generá una lista de 3 a 5 derechos concretos que otorga el token. Devolvé solo los items separados por |`;
      else if(tipo==='lista_no') prompt+=`generá una lista de 3 a 5 exclusiones explícitas. Devolvé solo los items separados por |`;
      else if(tipo==='kv') prompt+=`completá los valores de: Vehículo emisor, Fiduciario, PSAV, Régimen. Devolvé como vehículo|fiduciario|PSAV|régimen`;
      const res = await callTokaiAgent(prompt, p);
      setAiSuggestion({blockId:block.id, text:res.trim(), tipo});
    } finally { setAiLoading(null); }
  }

  function acceptSuggestion(){
    if(!aiSuggestion) return;
    const {blockId,text,tipo} = aiSuggestion;
    if(tipo==='texto'||tipo==='alerta') updBlock(blockId,{contenido:text,aiAssisted:true});
    else if(tipo==='lista_si'||tipo==='lista_no') updBlock(blockId,{items:text.split('|').map(s=>s.trim()).filter(Boolean),aiAssisted:true});
    else if(tipo==='kv'){ const parts=text.split('|'); updBlock(blockId,{pairs:[['Vehículo emisor',parts[0]||''],['Fiduciario',parts[1]||''],['PSAV',parts[2]||''],['Régimen',parts[3]||'']],aiAssisted:true}); }
    setAiSuggestion(null);
    toast&&toast({title:'Sugerencia aplicada',msg:'Podés editarla directamente en el campo.'});
  }

  /* ─── IA: chat lateral ─── */
  async function sendChat(){
    if(!chatInput.trim())return;
    const msg = chatInput.trim();
    setChatInput('');
    const newHistory = [...chatHistory,{role:'user',content:msg}];
    setChatHistory(newHistory);
    setAiLoading('chat');
    try{
      const tesisSummary = blocks.map(b=>`${b.titulo}: ${b.contenido||b.items?.join(', ')||b.pairs?.map(([k,v])=>k+': '+v).join(', ')||''}`).join('\n');
      const prompt = `Estado actual de la tesis:\n${tesisSummary}\n\nPregunta de TOKAI: ${msg}`;
      const res = await callTokaiAgent(prompt, p);
      setChatHistory(h=>[...h,{role:'assistant',content:res}]);
    } finally { setAiLoading(null); }
  }

  function insertChatResponse(text){ addBlock('texto'); const id='b'+Date.now(); setTimeout(()=>updBlock(blocks[blocks.length-1]?.id||id,{contenido:text,titulo:'Desde agente TOKAI',aiAssisted:true}),50); setChatOpen(false); }

  /* ─── Exportar como Markdown ─── */
  function toMarkdown(){
    const lines=['# Tesis de Valor — '+p.name,''];
    blocks.forEach(b=>{
      lines.push('## '+b.titulo);
      if(b.tipo==='texto'||b.tipo==='alerta') lines.push(b.contenido||'');
      else if(b.tipo==='lista_si') (b.items||[]).forEach(i=>lines.push('✓ '+i));
      else if(b.tipo==='lista_no') (b.items||[]).forEach(i=>lines.push('✗ '+i));
      else if(b.tipo==='kv') (b.pairs||[]).forEach(([k,v])=>lines.push('**'+k+':** '+v));
      else if(b.tipo==='mecanismo') lines.push('Mecanismo '+b.mecanismo+': '+b.descripcion);
      lines.push('');
    });
    return lines.join('\n');
  }

  const isLocked = thesisState==='confirmada';
  const canSend = thesisState==='borrador' && blocks.some(b=>b.contenido||b.items?.length||b.pairs?.length);
  const fs = {width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:12.5,boxSizing:'border-box',resize:'vertical',fontFamily:'inherit'};

  return h('div',{style:{position:'relative'}},
    /* header */
    h('div',{className:'eyebrow'},'Panel TOKAI · Laboratorio'),
    h('h1',{className:'page'},'Tesis de Valor'),
    h('p',{className:'page-sub'},'Template flexible: editá, reordenà y agregá bloques según el activo. Usá la IA para asistencia en cualquier momento.'),

    /* selector proyecto */
    h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      projects.map((pr,i)=>h('button',{key:i,onClick:()=>{setPid(i);syncProject(i);},
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,border:'1.5px solid '+(pid===i?'var(--emerald)':'var(--line-solid)'),background:pid===i?'rgba(0,214,126,.08)':'var(--panel)',color:pid===i?'var(--emerald)':'var(--txt)'}},pr.name))),

    /* barra de acciones globales */
    h('div',{className:'card',style:{marginBottom:14,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
      h('span',{style:{fontSize:12,color:'var(--txt-dim)',flex:1}},p.name+' · '+p.vertical+' · '+p.regime),
      h(ThesisBadge,{estado:thesisState}),
      !isLocked && h('button',{className:'btn btn-ghost btn-sm',disabled:aiLoading==='auto',
        onClick:autoComplete,title:'La IA lee los datos del proyecto y pre-completa todos los campos'},
        aiLoading==='auto'?'Generando…':'✦ Pre-completar con IA'),
      !isLocked && h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setChatOpen(!chatOpen)},'💬 Chat agente'),
      h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setShowExport(!showExport)},'↗ Exportar'),
      !isLocked && canSend && h('button',{className:'btn btn-primary btn-sm',onClick:()=>{setThesisState('enviada');save(blocks,'enviada');toast&&toast({title:'Tesis enviada al cliente',msg:'Puede revisarla y confirmar desde su panel.'});}},
        'Enviar al cliente →'),
      thesisState==='enviada' && h('span',{style:{fontSize:11,color:'#FFB23E',fontWeight:600}},'⏳ Esperando confirmación'),
      thesisState==='confirmada' && h('div',{style:{marginTop:4,padding:'14px 16px',borderRadius:12,background:'var(--black)',border:'1px solid var(--line-solid)'}},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10,color:'var(--txt)'}},'Gate de gobernanza · Llave 2'),
        h('div',{style:{display:'flex',gap:8,marginBottom:12}},
          h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700,
            background:emPaused?'rgba(255,92,92,.15)':emEnabled?'rgba(0,214,126,.15)':'rgba(154,160,166,.12)',
            color:emPaused?'#FF5C5C':emEnabled?'var(--emerald)':'#9AA0A6',border:'1px solid '+(emPaused?'rgba(255,92,92,.3)':emEnabled?'rgba(0,214,126,.3)':'rgba(154,160,166,.2)')}},
            h('span',{style:{width:7,height:7,borderRadius:'50%',background:'currentColor',display:'inline-block'}}),
            emPaused?'Serie 0 — Pausada':emEnabled?'Serie 0 — Habilitada':'Serie 0 — Pendiente')),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
          !emEnabled&&!emPaused&&h('button',{className:'btn btn-primary btn-sm',style:{background:'var(--emerald)',border:'none'},
            onClick:async()=>{const r=chain.enableEmission?await chain.enableEmission(pid,0):{ok:false};if(r&&r.ok)toast&&toast({title:'✅ Emisión habilitada',msg:'Serie 0 activa. El cliente puede mintear.'});else toast&&toast({type:'err',title:'Error',msg:(r&&r.reason)||'No se pudo habilitar'});}},'⚡ Habilitar serie 0'),
          emEnabled&&!emPaused&&h('button',{className:'btn btn-ghost btn-sm',style:{color:'#FF5C5C',borderColor:'rgba(255,92,92,.3)'},onClick:()=>setShowPause(!showPause)},'⏸ Pausar emisión'),
          emPaused&&h('button',{className:'btn btn-primary btn-sm',onClick:async()=>{const r=chain.unpauseEmission?await chain.unpauseEmission(pid):{ok:false};if(r&&r.ok)toast&&toast({title:'Emisión reanudada',msg:'El gate volvió a estar activo.'});}},'▶ Reanudar emisión'),
          emEnabled&&!emPaused&&h('button',{className:'btn btn-ghost btn-sm',style:{color:'#FF5C5C',borderColor:'rgba(255,92,92,.3)'},onClick:async()=>{const r=chain.disableEmission?await chain.disableEmission(pid,0):{ok:false};if(r&&r.ok)toast&&toast({title:'Serie revocada',msg:'Se deshabilitó la serie 0.'});}},'✕ Revocar serie 0')),
        showPause&&h('div',{style:{marginTop:10}},
          h('input',{value:pauseReason,onChange:e=>setPauseReason(e.target.value),placeholder:'Razón de la pausa (mora crítica, conflicto legal, etc.)…',style:{width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid rgba(255,92,92,.4)',background:'var(--black)',color:'var(--txt)',fontSize:12.5,boxSizing:'border-box'}}),
          h('div',{style:{display:'flex',gap:8,marginTop:8}},
            h('button',{className:'btn btn-ghost btn-sm',style:{color:'#FF5C5C',borderColor:'rgba(255,92,92,.3)'},onClick:async()=>{if(!pauseReason.trim()){toast&&toast({type:'err',title:'Requerido',msg:'Ingresá la razón de la pausa.'});return;}const r=chain.pauseEmission?await chain.pauseEmission(pid,pauseReason):{ok:false};if(r&&r.ok){setShowPause(false);setPauseReason('');toast&&toast({title:'Emisión pausada',msg:'Nuevas acuñaciones bloqueadas. Supply existente intacto.'}); }}},'Confirmar pausa'),
            h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setShowPause(false)},'Cancelar'))),
        emPaused&&p.emissionPauseReason&&h('div',{style:{marginTop:8,fontSize:11.5,color:'#FF5C5C',padding:'6px 10px',background:'rgba(255,92,92,.08)',borderRadius:6}},'⚠ Razón: '+p.emissionPauseReason))),

    /* exportar */
    showExport && h('div',{className:'card',style:{marginBottom:14}},
      h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'Exportar tesis'),
      h('textarea',{readOnly:true,rows:8,value:toMarkdown(),style:{...fs,fontFamily:'var(--mono)',fontSize:11,color:'var(--txt-dim)'}}),
      h('div',{style:{display:'flex',gap:8,marginTop:8}},
        h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{navigator.clipboard&&navigator.clipboard.writeText(toMarkdown());toast&&toast({title:'Copiado',msg:'Tesis copiada como Markdown'});}},
          'Copiar Markdown'),
        h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setShowExport(false)},'Cerrar'))),

    /* bloques */
    blocks.map((block,idx)=>h('div',{key:block.id,className:'card',style:{marginBottom:10,borderLeft:block.aiAssisted?'2px solid rgba(0,214,126,.4)':'2px solid transparent',position:'relative'}},

/* ────────────────────────────────────────────────────────────────
   Motor compartido de chat (usado por ambos asistentes)
   ─────────────────────────────────────────────────────────────── */
async function sendToAI(mode, history, context) {
  const res = await fetch((window.__API_URL__||'')+'/ai/chat', {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      mode: mode,
      messages: history.map(function(m){ return {role:m.role, content:String(m.content).slice(0,3000)}; }),
      context: (context||'').slice(0,1000)
    })
  });
  if(!res.ok) return 'Error al conectar con el asistente.';
  const data = await res.json();
  return data.text || 'Sin respuesta.';
}

/* ────────────────────────────────────────────────────────────────
   Componente base de chat (reutilizado por ambos asistentes)
   ─────────────────────────────────────────────────────────────── */
function AssistantChat({aiMode, projectCtx, greeting, quickReplies, headerLabel, headerSub, mode, onClose}) {
  const [msgs, setMsgs] = useState([{role:'assistant', content:greeting}]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = React.useRef(null);

  async function send(text) {
    const msg = (text||input).trim();
    if (!msg || loading) return;
    setInput('');
    const newMsgs = [...msgs, {role:'user', content:msg}];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const reply = await sendToAI(aiMode, newMsgs, projectCtx);
      setMsgs(function(m){ return [...m, {role:'assistant', content:reply}]; });
    } catch(e) {
      setMsgs(function(m){ return [...m, {role:'assistant', content:'Error de conexión. Intentá de nuevo.'}]; });
    } finally { setLoading(false); }
  }

  function renderMsg(text) {
    return text.split('\n').map(function(line,i){
      return h('p',{key:i,style:{margin:'2px 0',lineHeight:1.55}},
        line.split(/(\*\*[^*]+\*\*)/g).map(function(p,j){
          return p.startsWith('**') ? h('strong',{key:j,style:{color:'var(--txt)'}},p.slice(2,-2)) : h('span',{key:j},p);
        }));
    });
  }

  const isFloat = mode==='float';
  const containerStyle = isFloat
    ? {position:'fixed',bottom:80,right:20,width:'calc(100% - 40px)',maxWidth:370,height:'min(540px, calc(100vh - 120px))',background:'var(--panel)',borderRadius:16,border:'1px solid var(--line-solid)',boxShadow:'0 8px 40px rgba(0,0,0,.5)',zIndex:300,display:'flex',flexDirection:'column',overflow:'hidden'}
    : {display:'flex',flexDirection:'column',height:460,background:'var(--black)',borderRadius:12,border:'1px solid var(--line-solid)',marginTop:16};

  return h('div',{style:containerStyle},
    /* header */
    h('div',{style:{padding:'12px 14px',borderBottom:'1px solid var(--line-solid)',display:'flex',alignItems:'center',gap:10,background:'var(--panel)',flexShrink:0}},
      h('div',{style:{width:34,height:34,borderRadius:9,background:'rgba(0,214,126,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}},'🤖'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:700,fontSize:13}},headerLabel),
        h('div',{style:{fontSize:10,color:'var(--emerald)'}},
          h('span',{style:{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'var(--emerald)',marginRight:4}}),
          headerSub)),
      isFloat && onClose && h('button',{onClick:onClose,style:{background:'none',border:'none',color:'var(--txt-mute)',cursor:'pointer',fontSize:18,padding:0,flexShrink:0}},'×')),

    /* mensajes */
    h('div',{style:{flex:1,overflow:'auto',padding:'12px 10px',display:'flex',flexDirection:'column',gap:8}},
      msgs.map(function(m,i){
        return h('div',{key:i,style:{
          padding:'9px 11px',borderRadius:10,maxWidth:'90%',fontSize:12.5,
          alignSelf:m.role==='user'?'flex-end':'flex-start',
          background:m.role==='user'?'rgba(0,214,126,.12)':'var(--panel)',
          color:'var(--txt-dim)',
          border:m.role==='assistant'?'1px solid var(--line-solid)':'none'
        }}, renderMsg(m.content));
      }),
      loading && h('div',{style:{padding:'9px 11px',borderRadius:10,maxWidth:'60%',background:'var(--panel)',border:'1px solid var(--line-solid)',fontSize:12,color:'var(--txt-mute)'}},'✦ Pensando…'),
      h('div',{ref:endRef})),

    /* quick replies (solo al inicio) */
    msgs.length <= 1 && h('div',{style:{padding:'0 10px 8px',display:'flex',flexWrap:'wrap',gap:5,flexShrink:0}},
      quickReplies.map(function(q,i){
        return h('button',{key:i,onClick:function(){send(q);},
          style:{padding:'4px 9px',borderRadius:20,border:'1px solid var(--emerald)',background:'transparent',color:'var(--emerald)',fontSize:11,cursor:'pointer',fontWeight:500}},q);
      })),

    /* input */
    h('div',{style:{padding:'9px 10px',borderTop:'1px solid var(--line-solid)',display:'flex',gap:7,flexShrink:0}},
      h('input',{value:input,onChange:function(e){setInput(e.target.value);},
        onKeyDown:function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}},
        disabled:loading,
        placeholder:'Escribí tu consulta…',
        style:{flex:1,padding:'8px 11px',borderRadius:9,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:13}}),
      h('button',{onClick:function(){send();},disabled:loading||!input.trim(),
        className:'btn btn-primary btn-sm',
        style:{flexShrink:0,opacity:input.trim()&&!loading?1:.5}},loading?'…':'→'))
  );
}

/* ─── Contexto del proyecto para el backend (metadatos no sensibles) ─── */
function buildProjectContext(project, thesis) {
  var p = project || {};
  var thesisSummary = (thesis && thesis.blocks)
    ? thesis.blocks.map(function(b){ return b.titulo + ': ' + (b.contenido || (b.items&&b.items.join(', ')) || (b.pairs&&b.pairs.map(function(kv){return kv[0]+': '+kv[1];}).join(', ')) || b.descripcion || ''); }).join('\n')
    : '';
  var stage = typeof getProjectStage === 'function' ? getProjectStage(p) : 0;
  var stageLabels = ['','Alta del proyecto','Análisis TOKAI','Tesis de valor','Reporte del modelo','Configuración técnica','Emisión habilitada','En distribución'];
  return [
    'PROYECTO: ' + (p.name||'—') + ' (' + (p.symbol||'—') + ')',
    'Vertical: ' + (p.vertical||'—') + ' | Activo: ' + (p.assetType||'—'),
    'Régimen: ' + (p.regime||'—') + ' | Valuación: USD ' + ((p.valuationUsd||0).toLocaleString()),
    'Precio/token: USD ' + ((p.priceUsdCents||0)/100) + ' | Supply máx: ' + (p.maxSupply||'—'),
    'Mecanismo de yield: ' + (p.yieldMechanism||'—') + ' | Yield est: ' + (p.yieldAnnualPct||0) + '% anual',
    'Etapa actual del flujo: ' + stage + '/7 — ' + (stageLabels[stage]||'—'),
    thesisSummary ? 'TESIS DE VALOR:\n' + thesisSummary : 'Tesis: en estructuración.',
  ].join('\n');
}

/* ════════════════════════════════════════════════════════════════════
   TOKAI Platform — Corazón de Emisión (views7)
   EmissionEngine: IA que traduce decisiones de negocio a parámetros
   de contrato. EmissionPreview (TOKAI) + EmissionStatus (emisor).
   ════════════════════════════════════════════════════════════════════ */

/* ─── Mapa determinístico (no necesita IA para casos estándar) ─── */
function buildParamsFromProject(p) {
  const isPrivate = (p.regime||'').includes('1088');
  const isClub = /club|fan|acceso|soulbound|lepra|boca|pre.gat/i.test((p.vertical||'')+(p.name||'')+(p.assetType||''));
  const isCredit = /cr.dito|pool|leasing|rodado|auto|prendario/i.test((p.vertical||'')+(p.assetType||''));

  const params = {
    soulbound: isClub || p.soulbound || false,
    maxHolders: isPrivate ? 50 : 0,
    lockupSeconds: isPrivate ? 15552000 : 0,
    allowedJurisdictions: p.jurisdictions || [32],
    yieldMechanism: isClub ? 'C' : isCredit ? 'B' : 'A',
    waterfallDistributor: isCredit,
    tranches: isCredit ? [
      {name:'Senior', couponTargetPct: p.yieldAnnualPct || 7},
      {name:'Mezzanine', couponTargetPct: Math.round((p.yieldAnnualPct||7)*2)},
      {name:'FirstLoss', couponTargetPct: 0}
    ] : [],
  };

  const warnings = [];
  if (params.soulbound && params.yieldMechanism === 'A') warnings.push('⚠ Soulbound + yield A es inconsistente: el token no puede pagar renta si no se puede transferir al nuevo dueño.');
  if (params.allowedJurisdictions.includes(840)) warnings.push('⚠ Jurisdicción USA (840) requiere cobertura Reg D/S confirmada antes de habilitar.');
  if ((p.maxSupply||0) < 10 && (p.priceUsd||0) > 100000) warnings.push('⚠ Supply muy bajo para el precio unitario. Revisá la fraccionabilidad.');

  const mechLabel = {A:'Renta periódica push (yield al holder)',B:'Waterfall de crédito (cuota → cascada)',C:'Ecosistema cerrado, sin flujo financiero'}[params.yieldMechanism];
  const explanation = `El contrato ${params.soulbound ? 'emitirá certificados intransferibles (soulbound)' : 'emitirá tokens transferibles'} bajo ${p.regime || 'RG 1088'}. ${params.maxHolders > 0 ? `Máximo ${params.maxHolders} holders.` : ''} ${params.lockupSeconds > 0 ? 'Lock-up de 180 días desde la primera adquisición.' : ''} Mecanismo de flujo: ${mechLabel}.`;

  return { contractType: params.waterfallDistributor ? 'TOKAIToken+Waterfall' : params.soulbound ? 'TOKAIToken+Soulbound' : 'TOKAIToken', params, warnings, explanation };
}

/* ─── Llamada IA al proxy seguro ─── */
async function callEmissionAI(prompt, projectContext) {
  const context = `PROYECTO: ${projectContext.name||''} | ${projectContext.vertical||''} | ${projectContext.regime||''} | supply=${projectContext.maxSupply||''} | price=USD${(projectContext.priceUsdCents||0)/100}`;
  const res = await fetch((window.__API_URL__||'')+'/ai/chat', {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({mode:'emission', messages:[{role:'user',content:prompt}], context})
  });
  if(!res.ok) return {contractType:'TOKAIToken', params:{}, warnings:['Error al conectar con la IA'], explanation:''};
  const data = await res.json();
  const raw = data.text || '{}';
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch(e) { return {contractType:'TOKAIToken', params:{}, warnings:['Error al parsear respuesta IA'], explanation: raw.slice(0,200)}; }
}

  const p = projects[pid] || projects[0] || {};

  const [result, setResult] = useState(null);    // {contractType, params, warnings, explanation}
  const [loading, setLoading] = useState(false);

  const [aiQuestion, setAiQuestion] = useState('');

  function syncPid(i) { setPid(i); setResult(null); setDeployed(false); setEditing(false); }

  function generate() {
    const r = buildParamsFromProject(projects[pid] || {});
    setResult(r);
    setEditParams({...r.params});
  }

    if (!result) return;
    setAiLoading(true);
    try {
      const r = await callEmissionAI(
        `Validá estos parámetros para el proyecto: ${JSON.stringify(editParams||result.params)}. Devolvé el JSON con warnings actualizadas y explanation.`,
        p

      setResult(prev => ({...prev, warnings: r.warnings||[], explanation: r.explanation||prev.explanation}));
      toast&&toast({title:'IA validó los parámetros', msg: r.warnings.length ? r.warnings.length+' advertencias encontradas' : 'Sin problemas detectados ✓'});
    } finally { setAiLoading(false); }

    if (!aiQuestion.trim()) return;
    setAiLoading(true);
    try {
