/* ─── Tipos de bloque disponibles ─── */
const BLOCK_TYPES = [
  {k:'texto',     label:'Texto libre',        icon:'≡'},
  {k:'lista_si',  label:'Lista ✓ (otorga)',   icon:'✓'},
  {k:'lista_no',  label:'Lista ✗ (no otorga)',icon:'✗'},
  {k:'kv',        label:'Datos estructurados', icon:'⊞'},
  {k:'mecanismo', label:'Mecanismo A/B/C',    icon:'⚡'},
  {k:'alerta',    label:'Advertencia / riesgo',icon:'⚠'},
];

/* ─── Template base de 7 bloques ─── */
function buildDefaultBlocks(p){
  const mech = p?.yieldMechanism||'A';
  const mechDesc = {A:'Renta periódica — push de yield (alquiler, cupones)',B:'Waterfall de crédito — cuota → cascada (pools, leasing)',C:'Ecosistema cerrado — sin flujo financiero (fan tokens, acceso)'}[mech]||'';
  return [
    {id:'b1', tipo:'texto',    titulo:'Finalidad del token',
     contenido: p?.desc||'', aiAssisted:false},
    {id:'b2', tipo:'lista_si', titulo:'El token OTORGA',
     items: p?.tokenProfiles?.map(t=>'Derecho económico sobre: '+t.right)||['Derecho económico sobre los flujos del activo'], aiAssisted:false},
    {id:'b3', tipo:'lista_no', titulo:'El token NO otorga',
     items:['Titularidad registral del activo subyacente','Derechos políticos o de voto societario','Acceso físico o usufructo del activo'], aiAssisted:false},
    {id:'b4', tipo:'texto',    titulo:'Modelo de negocio que avala el token',
     contenido: p?.yieldSource||'', aiAssisted:false},
    {id:'b5', tipo:'mecanismo',titulo:'Mecanismo de flujo al holder',
     mecanismo: mech, descripcion: mechDesc, aiAssisted:false},
    {id:'b6', tipo:'texto',    titulo:'Cómo fluye el dinero al holder',
     contenido:'', aiAssisted:false},
    {id:'b7', tipo:'kv',       titulo:'Estructura legal',
     pairs:[['Vehículo emisor','Fideicomiso Financiero (Ley 24.441)'],['Fiduciario','Allaria Ledesma'],['PSAV','Ripio (Cat. 1 y 4)'],['Régimen',p?.regime||'RG 1088']], aiAssisted:false},
  ];
}

/* ─── Badge estado tesis ─── */
function ThesisBadge({estado}){
  const cfg={borrador:{label:'Borrador',c:'#9AA0A6'},enviada:{label:'Enviada al cliente',c:'#FFB23E'},confirmada:{label:'Confirmada ✓',c:'var(--emerald)'},revision_solicitada:{label:'Revisión solicitada',c:'#FF5C5C'}}[estado]||{label:estado,c:'#9AA0A6'};
  return h('span',{style:{display:'inline-block',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:cfg.c+'20',color:cfg.c,border:'1px solid '+cfg.c+'50'}},cfg.label);
}

/* ─── Llamada al proxy de IA (backend protegido) ─── */
async function callTokaiAgent(userMsg, projectContext){
  const context = `PROYECTO: ${projectContext.name||''} | Vertical: ${projectContext.vertical||''} | Régimen: ${projectContext.regime||''} | Mecanismo: ${projectContext.yieldMechanism||''} | Valuación: USD ${(projectContext.valuationUsd||0).toLocaleString()} | Desc: ${(projectContext.desc||'').slice(0,200)}`;
  const res = await fetch((window.__API_URL__||'')+'/api/v1/ai/chat',{
    method:'POST',
    credentials:'include',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({mode:'tokai', messages:[{role:'user',content:userMsg}], context})
  });
  if(!res.ok) return 'Error al conectar con el agente.';
  const data = await res.json();
  return data.text || 'Sin respuesta.';
}

/* ═══════════════════════════════════════════════════════════════════
   ThesisFlexEditor — formulario flexible con IA
   ═══════════════════════════════════════════════════════════════════ */
function ThesisFlexEditor({chain, toast, go}){
  const projects = chain.projects||[];
  const [pid,setPid] = useState(0);
  const p = projects[pid]||projects[0]||{};

  /* estado de los bloques */
  const initBlocks = ()=> p.thesis?.blocks || buildDefaultBlocks(p);
  const [blocks,setBlocks] = useState(initBlocks);
  const [thesisState,setThesisState] = useState(p.thesis?.estado||'borrador');

  /* Gate de gobernanza */
  const emEnabled = p.emissionEnabled?.[0] === true;
  const emPaused  = p.emissionPaused === true;
  const [pauseReason,setPauseReason] = useState('');
  const [showPause,setShowPause] = useState(false);

  /* IA */
  const [aiLoading,setAiLoading] = useState(null); // blockId o 'chat' o 'auto'
  const [aiSuggestion,setAiSuggestion] = useState(null); // {blockId, text}
  const [chatOpen,setChatOpen] = useState(false);
  const [chatHistory,setChatHistory] = useState([]);
  const [chatInput,setChatInput] = useState('');
  const [showAddBlock,setShowAddBlock] = useState(false);
  const [showExport,setShowExport] = useState(false);

  /* sincronizar proyecto */
  function syncProject(pid){
    const pr = projects[pid]||{};
    setBlocks(pr.thesis?.blocks||buildDefaultBlocks(pr));
    setThesisState(pr.thesis?.estado||'borrador');
    setChatHistory([]);
    setAiSuggestion(null);
  }

  function save(newBlocks, newState){
    const b = newBlocks||blocks;
    const s = newState||thesisState;
    const thesisData = {blocks:b,estado:s,confirmedAt:null,confirmHash:null,revisionComment:''};
    if(chain.updateProject) chain.updateProject(pid, {thesis:thesisData});
    // Persistir tesis en backend
    const p2 = chain.projects&&chain.projects[pid];
    if(p2 && p2.id && typeof p2.id === 'string' && p2.id.length === 36){
      const apiUrl = window.__API_URL__ || '';
      if(apiUrl){
        const backendStatus = s === 'enviada' ? 'sent' : s === 'confirmada' ? 'confirmed' : 'draft';
        fetch(apiUrl + '/api/v1/projects/' + p2.id + '/thesis', {
          method: 'PUT',
          credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({thesis: thesisData, status: backendStatus})
        }).catch(function(){});
      }
    }
  }

  /* ─── operaciones de bloque ─── */
  function updBlock(id,patch){ setBlocks(bs=>bs.map(b=>b.id===id?{...b,...patch}:b)); }
  function addItem(id,field){ updBlock(id,{[field]:[...(blocks.find(b=>b.id===id)?.[field]||[]),'']}); }
  function updItem(id,field,i,v){ const b=blocks.find(x=>x.id===id); if(!b)return; const arr=[...(b[field]||[])]; arr[i]=v; updBlock(id,{[field]:arr}); }
  function delItem(id,field,i){ const b=blocks.find(x=>x.id===id); if(!b)return; updBlock(id,{[field]:(b[field]||[]).filter((_,j)=>j!==i)}); }
  function moveBlock(id,dir){ setBlocks(bs=>{ const i=bs.findIndex(b=>b.id===id); if(i<0)return bs; const ni=i+dir; if(ni<0||ni>=bs.length)return bs; const nb=[...bs]; [nb[i],nb[ni]]=[nb[ni],nb[i]]; return nb; }); }
  function delBlock(id){ setBlocks(bs=>bs.filter(b=>b.id!==id)); }
  function addBlock(tipo){ const id='b'+Date.now(); const nb={id,tipo,titulo:'Bloque nuevo',aiAssisted:false}; if(tipo==='texto')nb.contenido=''; else if(tipo==='lista_si'||tipo==='lista_no')nb.items=['']; else if(tipo==='kv')nb.pairs=[['','']]; else if(tipo==='mecanismo'){nb.mecanismo='A';nb.descripcion='';} else if(tipo==='alerta')nb.contenido=''; setBlocks(bs=>[...bs,nb]); setShowAddBlock(false); }
  function addKvRow(id){ const b=blocks.find(x=>x.id===id); updBlock(id,{pairs:[...(b?.pairs||[]),['','']]}); }
  function updKv(id,i,col,v){ const b=blocks.find(x=>x.id===id); const p=[...(b?.pairs||[])]; p[i]=[col===0?v:p[i][0],col===1?v:p[i][1]]; updBlock(id,{pairs:p}); }

  /* ─── IA: pre-completado automático ─── */
  async function autoComplete(){
    setAiLoading('auto');
    try{
      const prompt = `Generá un borrador completo de la Tesis de Valor para este proyecto de tokenización. Para cada bloque, devolvé un JSON con este formato exacto:
{"finalidad":"...","otorga":["...","..."],"noOtorga":["...","..."],"modelo":"...","flujo":"...","vehiculo":"...","fiduciario":"...","psav":"..."}
Solo el JSON, sin texto adicional.`;
      const res = await callTokaiAgent(prompt, p);
      try{
        const data = JSON.parse(res.replace(/```json|```/g,'').trim());
        setBlocks(bs=>bs.map(b=>{
          if(b.id==='b1') return {...b,contenido:data.finalidad||b.contenido,aiAssisted:true};
          if(b.id==='b2') return {...b,items:data.otorga||b.items,aiAssisted:true};
          if(b.id==='b3') return {...b,items:data.noOtorga||b.items,aiAssisted:true};
          if(b.id==='b4') return {...b,contenido:data.modelo||b.contenido,aiAssisted:true};
          if(b.id==='b6') return {...b,contenido:data.flujo||b.contenido,aiAssisted:true};
          if(b.id==='b7') return {...b,pairs:[['Vehículo emisor',data.vehiculo||''],['Fiduciario',data.fiduciario||''],['PSAV',data.psav||''],['Régimen',p.regime||'RG 1088']],aiAssisted:true};
          return b;
        }));
        toast&&toast({title:'IA pre-completó la tesis',msg:'Revisá cada campo y editá lo que necesites.'});
      } catch(e){
        toast&&toast({type:'err',title:'Error al parsear respuesta IA',msg:'La IA respondió en formato inesperado. Usá el chat para ayuda.'});
      }
    } finally { setAiLoading(null); }
  }

  /* ─── IA: sugerencia por campo ─── */
  async function suggestField(block){
    setAiLoading(block.id);
    try{
      const tipo = block.tipo;
      let prompt = `Para el bloque "${block.titulo}" de la tesis de valor de ${p.name}, `;
      if(tipo==='texto'||tipo==='alerta') prompt+=`redactá un texto institucional conciso (máximo 80 palabras) que complete este campo. Solo el texto, sin encabezado.`;
      else if(tipo==='lista_si') prompt+=`generá una lista de 3 a 5 derechos concretos que otorga el token. Devolvé solo los items separados por |`;
      else if(tipo==='lista_no') prompt+=`generá una lista de 3 a 5 exclusiones explícitas. Devolvé solo los items separados por |`;
      else if(tipo==='kv') prompt+=`completá los valores de: Vehículo emisor, Fiduciario, PSAV, Régimen. Devolvé como vehículo|fiduciario|PSAV|régimen`;
      const res = await callTokaiAgent(prompt, p);
      setAiSuggestion({blockId:block.id, text:res.trim(), tipo});
    } finally { setAiLoading(null); }
  }

  function acceptSuggestion(){
    if(!aiSuggestion) return;
    const {blockId,text,tipo} = aiSuggestion;
    if(tipo==='texto'||tipo==='alerta') updBlock(blockId,{contenido:text,aiAssisted:true});
    else if(tipo==='lista_si'||tipo==='lista_no') updBlock(blockId,{items:text.split('|').map(s=>s.trim()).filter(Boolean),aiAssisted:true});
    else if(tipo==='kv'){ const parts=text.split('|'); updBlock(blockId,{pairs:[['Vehículo emisor',parts[0]||''],['Fiduciario',parts[1]||''],['PSAV',parts[2]||''],['Régimen',parts[3]||'']],aiAssisted:true}); }
    setAiSuggestion(null);
    toast&&toast({title:'Sugerencia aplicada',msg:'Podés editarla directamente en el campo.'});
  }

  /* ─── IA: chat lateral ─── */
  async function sendChat(){
    if(!chatInput.trim())return;
    const msg = chatInput.trim();
    setChatInput('');
    const newHistory = [...chatHistory,{role:'user',content:msg}];
    setChatHistory(newHistory);
    setAiLoading('chat');
    try{
      const tesisSummary = blocks.map(b=>`${b.titulo}: ${b.contenido||b.items?.join(', ')||b.pairs?.map(([k,v])=>k+': '+v).join(', ')||''}`).join('\n');
      const prompt = `Estado actual de la tesis:\n${tesisSummary}\n\nPregunta de TOKAI: ${msg}`;
      const res = await callTokaiAgent(prompt, p);
      setChatHistory(h=>[...h,{role:'assistant',content:res}]);
    } finally { setAiLoading(null); }
  }

  function insertChatResponse(text){ addBlock('texto'); const id='b'+Date.now(); setTimeout(()=>updBlock(blocks[blocks.length-1]?.id||id,{contenido:text,titulo:'Desde agente TOKAI',aiAssisted:true}),50); setChatOpen(false); }

  /* ─── Exportar como Markdown ─── */
  function toMarkdown(){
    const lines=['# Tesis de Valor — '+p.name,''];
    blocks.forEach(b=>{
      lines.push('## '+b.titulo);
      if(b.tipo==='texto'||b.tipo==='alerta') lines.push(b.contenido||'');
      else if(b.tipo==='lista_si') (b.items||[]).forEach(i=>lines.push('✓ '+i));
      else if(b.tipo==='lista_no') (b.items||[]).forEach(i=>lines.push('✗ '+i));
      else if(b.tipo==='kv') (b.pairs||[]).forEach(([k,v])=>lines.push('**'+k+':** '+v));
      else if(b.tipo==='mecanismo') lines.push('Mecanismo '+b.mecanismo+': '+b.descripcion);
      lines.push('');
    });
    return lines.join('\n');
  }

  const isLocked = thesisState==='confirmada';
  const canSend = thesisState==='borrador' && blocks.some(b=>b.contenido||b.items?.length||b.pairs?.length);
  const fs = {width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:12.5,boxSizing:'border-box',resize:'vertical',fontFamily:'inherit'};

  return h('div',{style:{position:'relative'}},
    /* header */
    h('div',{className:'eyebrow'},'Panel TOKAI · Laboratorio'),
    h('h1',{className:'page'},'Tesis de Valor'),
    h('p',{className:'page-sub'},'Template flexible: editá, reordenà y agregá bloques según el activo. Usá la IA para asistencia en cualquier momento.'),

    /* selector proyecto */
    h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      projects.map((pr,i)=>h('button',{key:i,onClick:()=>{setPid(i);syncProject(i);},
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,border:'1.5px solid '+(pid===i?'var(--emerald)':'var(--line-solid)'),background:pid===i?'rgba(0,214,126,.08)':'var(--panel)',color:pid===i?'var(--emerald)':'var(--txt)'}},pr.name))),

    /* barra de acciones globales */
    h('div',{className:'card',style:{marginBottom:14,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
      h('span',{style:{fontSize:12,color:'var(--txt-dim)',flex:1}},p.name+' · '+p.vertical+' · '+p.regime),
      h(ThesisBadge,{estado:thesisState}),
      !isLocked && h('button',{className:'btn btn-ghost btn-sm',disabled:aiLoading==='auto',
        onClick:autoComplete,title:'La IA lee los datos del proyecto y pre-completa todos los campos'},
        aiLoading==='auto'?'Generando…':'✦ Pre-completar con IA'),
      !isLocked && h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setChatOpen(!chatOpen)},'💬 Chat agente'),
      h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setShowExport(!showExport)},'↗ Exportar'),
      !isLocked && canSend && h('button',{className:'btn btn-primary btn-sm',onClick:()=>{setThesisState('enviada');save(blocks,'enviada');toast&&toast({title:'Tesis enviada al cliente',msg:'Puede revisarla y confirmar desde su panel.'});}},
        'Enviar al cliente →'),
      thesisState==='enviada' && h('span',{style:{fontSize:11,color:'#FFB23E',fontWeight:600}},'⏳ Esperando confirmación'),
      thesisState==='confirmada' && h('div',{style:{marginTop:4,padding:'14px 16px',borderRadius:12,background:'var(--black)',border:'1px solid var(--line-solid)'}},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10,color:'var(--txt)'}},'Gate de gobernanza · Llave 2'),
        h('div',{style:{display:'flex',gap:8,marginBottom:12}},
          h('div',{style:{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700,
            background:emPaused?'rgba(255,92,92,.15)':emEnabled?'rgba(0,214,126,.15)':'rgba(154,160,166,.12)',
            color:emPaused?'#FF5C5C':emEnabled?'var(--emerald)':'#9AA0A6',border:'1px solid '+(emPaused?'rgba(255,92,92,.3)':emEnabled?'rgba(0,214,126,.3)':'rgba(154,160,166,.2)')}},
            h('span',{style:{width:7,height:7,borderRadius:'50%',background:'currentColor',display:'inline-block'}}),
            emPaused?'Serie 0 — Pausada':emEnabled?'Serie 0 — Habilitada':'Serie 0 — Pendiente')),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
          !emEnabled&&!emPaused&&h('button',{className:'btn btn-primary btn-sm',style:{background:'var(--emerald)',border:'none'},
            onClick:async()=>{const r=chain.enableEmission?await chain.enableEmission(pid,0):{ok:false};if(r&&r.ok)toast&&toast({title:'✅ Emisión habilitada',msg:'Serie 0 activa. El cliente puede mintear.'});else toast&&toast({type:'err',title:'Error',msg:(r&&r.reason)||'No se pudo habilitar'});}},'⚡ Habilitar serie 0'),
          emEnabled&&!emPaused&&h('button',{className:'btn btn-ghost btn-sm',style:{color:'#FF5C5C',borderColor:'rgba(255,92,92,.3)'},onClick:()=>setShowPause(!showPause)},'⏸ Pausar emisión'),
          emPaused&&h('button',{className:'btn btn-primary btn-sm',onClick:async()=>{const r=chain.unpauseEmission?await chain.unpauseEmission(pid):{ok:false};if(r&&r.ok)toast&&toast({title:'Emisión reanudada',msg:'El gate volvió a estar activo.'});}},'▶ Reanudar emisión'),

/* ────────────────────────────────────────────────────────────────
   Motor compartido de chat (usado por ambos asistentes)
   ─────────────────────────────────────────────────────────────── */
async function sendToAI(mode, history, context) {
  const res = await fetch((window.__API_URL__||'')+'/api/v1/ai/chat', {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      mode: mode,
      messages: history.map(function(m){ return {role:m.role, content:String(m.content).slice(0,3000)}; }),
      context: (context||'').slice(0,1000)
    })
  });
  if(!res.ok) return 'Error al conectar con el asistente.';
  const data = await res.json();
  return data.text || 'Sin respuesta.';
}

/* ────────────────────────────────────────────────────────────────
   Componente base de chat (reutilizado por ambos asistentes)
   ─────────────────────────────────────────────────────────────── */
function AssistantChat({aiMode, projectCtx, greeting, quickReplies, headerLabel, headerSub, mode, onClose}) {
  const [msgs, setMsgs] = useState([{role:'assistant', content:greeting}]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = React.useRef(null);

  async function send(text) {
    const msg = (text||input).trim();
    if (!msg || loading) return;
    setInput('');
    const newMsgs = [...msgs, {role:'user', content:msg}];
    setMsgs(newMsgs);
    setLoading(true);
    try {
      const reply = await sendToAI(aiMode, newMsgs, projectCtx);
      setMsgs(function(m){ return [...m, {role:'assistant', content:reply}]; });
    } catch(e) {
      setMsgs(function(m){ return [...m, {role:'assistant', content:'Error de conexión. Intentá de nuevo.'}]; });
    } finally { setLoading(false); }
  }

  function renderMsg(text) {
    return text.split('\n').map(function(line,i){
      return h('p',{key:i,style:{margin:'2px 0',lineHeight:1.55}},
        line.split(/(\*\*[^*]+\*\*)/g).map(function(p,j){
          return p.startsWith('**') ? h('strong',{key:j,style:{color:'var(--txt)'}},p.slice(2,-2)) : h('span',{key:j},p);
        }));
    });
  }

  const isFloat = mode==='float';
  const containerStyle = isFloat
    ? {position:'fixed',bottom:80,right:20,width:'calc(100% - 40px)',maxWidth:370,height:'min(540px, calc(100vh - 120px))',background:'var(--panel)',borderRadius:16,border:'1px solid var(--line-solid)',boxShadow:'0 8px 40px rgba(0,0,0,.5)',zIndex:300,display:'flex',flexDirection:'column',overflow:'hidden'}
    : {display:'flex',flexDirection:'column',height:460,background:'var(--black)',borderRadius:12,border:'1px solid var(--line-solid)',marginTop:16};

  return h('div',{style:containerStyle},

/* ─── Contexto del proyecto para el backend (metadatos no sensibles) ─── */
function buildProjectContext(project, thesis) {
  var p = project || {};
  var thesisSummary = (thesis && thesis.blocks)
    ? thesis.blocks.map(function(b){ return b.titulo + ': ' + (b.contenido || (b.items&&b.items.join(', ')) || (b.pairs&&b.pairs.map(function(kv){return kv[0]+': '+kv[1];}).join(', ')) || b.descripcion || ''); }).join('\n')
    : '';
  var stage = typeof getProjectStage === 'function' ? getProjectStage(p) : 0;
  var stageLabels = ['','Alta del proyecto','Análisis TOKAI','Tesis de valor','Reporte del modelo','Configuración técnica','Emisión habilitada','En distribución'];
  return [
    'PROYECTO: ' + (p.name||'—') + ' (' + (p.symbol||'—') + ')',
    'Vertical: ' + (p.vertical||'—') + ' | Activo: ' + (p.assetType||'—'),
    'Régimen: ' + (p.regime||'—') + ' | Valuación: USD ' + ((p.valuationUsd||0).toLocaleString()),
    'Precio/token: USD ' + ((p.priceUsdCents||0)/100) + ' | Supply máx: ' + (p.maxSupply||'—'),
    'Mecanismo de yield: ' + (p.yieldMechanism||'—') + ' | Yield est: ' + (p.yieldAnnualPct||0) + '% anual',
    'Etapa actual del flujo: ' + stage + '/7 — ' + (stageLabels[stage]||'—'),
    thesisSummary ? 'TESIS DE VALOR:\n' + thesisSummary : 'Tesis: en estructuración.',
  ].join('\n');
}

/* ════════════════════════════════════════════════════════════════════
   TOKAI Platform — Corazón de Emisión (views7)
   EmissionEngine: IA que traduce decisiones de negocio a parámetros
   de contrato. EmissionPreview (TOKAI) + EmissionStatus (emisor).
   ════════════════════════════════════════════════════════════════════ */

/* ─── Mapa determinístico (no necesita IA para casos estándar) ─── */
function buildParamsFromProject(p) {
  const isPrivate = (p.regime||'').includes('1088');
  const isClub = /club|fan|acceso|soulbound|lepra|boca|pre.gat/i.test((p.vertical||'')+(p.name||'')+(p.assetType||''));
  const isCredit = /cr.dito|pool|leasing|rodado|auto|prendario/i.test((p.vertical||'')+(p.assetType||''));

  const params = {
    soulbound: isClub || p.soulbound || false,
    maxHolders: isPrivate ? 50 : 0,
    lockupSeconds: isPrivate ? 15552000 : 0,
    allowedJurisdictions: p.jurisdictions || [32],
    yieldMechanism: isClub ? 'C' : isCredit ? 'B' : 'A',
    waterfallDistributor: isCredit,
    tranches: isCredit ? [
      {name:'Senior', couponTargetPct: p.yieldAnnualPct || 7},
      {name:'Mezzanine', couponTargetPct: Math.round((p.yieldAnnualPct||7)*2)},
      {name:'FirstLoss', couponTargetPct: 0}
    ] : [],
  };

  const warnings = [];
  if (params.soulbound && params.yieldMechanism === 'A') warnings.push('⚠ Soulbound + yield A es inconsistente: el token no puede pagar renta si no se puede transferir al nuevo dueño.');
  if (params.allowedJurisdictions.includes(840)) warnings.push('⚠ Jurisdicción USA (840) requiere cobertura Reg D/S confirmada antes de habilitar.');
  if ((p.maxSupply||0) < 10 && (p.priceUsd||0) > 100000) warnings.push('⚠ Supply muy bajo para el precio unitario. Revisá la fraccionabilidad.');

  const mechLabel = {A:'Renta periódica push (yield al holder)',B:'Waterfall de crédito (cuota → cascada)',C:'Ecosistema cerrado, sin flujo financiero'}[params.yieldMechanism];
  const explanation = `El contrato ${params.soulbound ? 'emitirá certificados intransferibles (soulbound)' : 'emitirá tokens transferibles'} bajo ${p.regime || 'RG 1088'}. ${params.maxHolders > 0 ? `Máximo ${params.maxHolders} holders.` : ''} ${params.lockupSeconds > 0 ? 'Lock-up de 180 días desde la primera adquisición.' : ''} Mecanismo de flujo: ${mechLabel}.`;

  return { contractType: params.waterfallDistributor ? 'TOKAIToken+Waterfall' : params.soulbound ? 'TOKAIToken+Soulbound' : 'TOKAIToken', params, warnings, explanation };
}

/* ─── Llamada IA al proxy seguro ─── */
async function callEmissionAI(prompt, projectContext) {
  const context = `PROYECTO: ${projectContext.name||''} | ${projectContext.vertical||''} | ${projectContext.regime||''} | supply=${projectContext.maxSupply||''} | price=USD${(projectContext.priceUsdCents||0)/100}`;
  const res = await fetch((window.__API_URL__||'')+'/api/v1/ai/chat', {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({mode:'emission', messages:[{role:'user',content:prompt}], context})
  });
  if(!res.ok) return {contractType:'TOKAIToken', params:{}, warnings:['Error al conectar con la IA'], explanation:''};
  const data = await res.json();
  const raw = data.text || '{}';
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch(e) { return {contractType:'TOKAIToken', params:{}, warnings:['Error al parsear respuesta IA'], explanation: raw.slice(0,200)}; }
}

/* ════════════════════════════════════════════════════════════════════
   EmissionPreview — panel TOKAI: parámetros técnicos + aprobación
   ════════════════════════════════════════════════════════════════════ */
function EmissionPreview({chain, toast}) {
  const projects = chain.projects || [];
  const [pid, setPid] = useState(0);
  const p = projects[pid] || projects[0] || {};

  const [result, setResult] = useState(null);    // {contractType, params, warnings, explanation}
  const [loading, setLoading] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editParams, setEditParams] = useState(null);
  const [aiQuestion, setAiQuestion] = useState('');
  const [aiAnswer, setAiAnswer] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [deployed, setDeployed] = useState(false);

  function syncPid(i) { setPid(i); setResult(null); setDeployed(false); setEditing(false); }

  function generate() {
    const r = buildParamsFromProject(projects[pid] || {});
    setResult(r);
    setEditParams({...r.params});
  }

  async function aiValidate() {
    if (!result) return;
    setAiLoading(true);
    try {
      const r = await callEmissionAI(
        `Validá estos parámetros para el proyecto: ${JSON.stringify(editParams||result.params)}. Devolvé el JSON con warnings actualizadas y explanation.`,
        p
      );
      setResult(prev => ({...prev, warnings: r.warnings||[], explanation: r.explanation||prev.explanation}));
      toast&&toast({title:'IA validó los parámetros', msg: r.warnings.length ? r.warnings.length+' advertencias encontradas' : 'Sin problemas detectados ✓'});
    } finally { setAiLoading(false); }
  }

  async function askAI() {
    if (!aiQuestion.trim()) return;
    setAiLoading(true);
    try {
      const r = await callEmissionAI(aiQuestion + ' (contexto de parámetros actuales: ' + JSON.stringify(editParams||result?.params||{}) + ')', p);
      setAiAnswer(r.explanation || JSON.stringify(r));
    } catch(e) { setAiAnswer('Error al conectar.'); }
    finally { setAiLoading(false); }
  }

  function deployDemo() {
    const finalParams = editParams || result?.params || {};
    if (chain.updateProject) chain.updateProject(pid, {
      emissionParams: finalParams,
      contractType: result?.contractType,
      emissionStatus: 'configured',
      soulbound: finalParams.soulbound,
      maxHolders: finalParams.maxHolders,
      lockupDays: Math.round((finalParams.lockupSeconds||0)/86400),

    // selector

      projects.map((pr,i)=>h('button',{key:i,onClick:()=>syncPid(i),
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,
          border:'1.5px solid '+(i===pid?'var(--emerald)':'var(--line-solid)'),
          background:i===pid?'rgba(0,214,126,.08)':'var(--panel)',color:i===pid?'var(--emerald)':'var(--txt)'}},pr.name))),

    // header proyecto
    h('div',{className:'card',style:{marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}},
      h('div',{},
        h('div',{style:{fontWeight:700,fontSize:15}},p.name||'Proyecto'),

            h('label',{style:{fontSize:12,color:'var(--txt-dim)',width:160,flexShrink:0}},'Soulbound'),
            h('input',{type:'checkbox',checked:(editParams||{}).soulbound||false,style:{width:16,height:16,accentColor:'var(--emerald)'},onChange:e=>setEditParams(ep=>({...ep,soulbound:e.target.checked}))})),
          h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
            h('label',{style:{fontSize:12,color:'var(--txt-dim)',width:160,flexShrink:0}},'Max holders (0=sin límite)'),
            h('input',{type:'number',value:(editParams||{}).maxHolders||0,style:{...fs,width:100},onChange:e=>setEditParams(ep=>({...ep,maxHolders:+e.target.value}))})),
          h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
            h('label',{style:{fontSize:12,color:'var(--txt-dim)',width:160,flexShrink:0}},'Lock-up (días)'),
            h('input',{type:'number',value:Math.round(((editParams||{}).lockupSeconds||0)/86400),style:{...fs,width:100},onChange:e=>setEditParams(ep=>({...ep,lockupSeconds:+e.target.value*86400}))})),
          h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
            h('label',{style:{fontSize:12,color:'var(--txt-dim)',width:160,flexShrink:0}},'Mecanismo'),
            h('select',{value:(editParams||{}).yieldMechanism||'A',style:fs,onChange:e=>setEditParams(ep=>({...ep,yieldMechanism:e.target.value}))},
              h('option',{value:'A'},'A — Renta periódica'),h('option',{value:'B'},'B — Waterfall'),h('option',{value:'C'},'C — Cerrado'))),
          h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
            h('label',{style:{fontSize:12,color:'var(--txt-dim)',width:160,flexShrink:0}},'Jurisdicciones (ISO, separadas por coma)'),
            h('input',{type:'text',value:((editParams||{}).allowedJurisdictions||[32]).join(','),style:{...fs,flex:1},onChange:e=>setEditParams(ep=>({...ep,allowedJurisdictions:e.target.value.split(',').map(Number).filter(Boolean)}))}))),

        // tramos waterfall
        (editParams||result.params).waterfallDistributor && result.params.tranches && result.params.tranches.length > 0 && h('div',{style:{marginTop:12,paddingTop:12,borderTop:'1px solid var(--line-solid)'}},
          h('div',{style:{fontSize:12,fontWeight:700,color:'var(--txt-mute)',marginBottom:8}},'Tramos del waterfall'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
            result.params.tranches.map((t,i)=>h('div',{key:i,style:{padding:'10px 12px',borderRadius:8,background:'rgba(255,255,255,.04)',border:'1px solid var(--line-solid)'}},
              h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginBottom:3}},['Senior','Mezzanine','First Loss'][i]),
              h('div',{style:{fontSize:16,fontWeight:800,color:['var(--emerald)','#FFB23E','#A78BFA'][i]}},t.couponTargetPct > 0 ? t.couponTargetPct+'%' : 'Residual'),
              h('div',{style:{fontSize:10,color:'var(--txt-mute)',marginTop:2}},i===0?'Cobra primero':i===1?'Cobra segundo':'Absorbe la mora')))))),

      // pregunta a la IA
      h('div',{className:'card',style:{marginBottom:14}},
        h('div',{style:{fontSize:12,fontWeight:700,color:'var(--txt-mute)',marginBottom:8}},'💬 Preguntar a la IA sobre los parámetros'),
        h('div',{style:{display:'flex',gap:8}},
          h('input',{value:aiQuestion,onChange:e=>setAiQuestion(e.target.value),onKeyDown:e=>{if(e.key==='Enter')askAI();},placeholder:'¿Por qué soulbound=true? ¿Qué pasa si habilitamos USA?',style:{...fs,flex:1}}),
          h('button',{className:'btn btn-ghost btn-sm',onClick:askAI,disabled:aiLoading||!aiQuestion.trim()},aiLoading?'…':'Preguntar')),
        aiAnswer && h('div',{style:{marginTop:10,fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,padding:'10px 12px',borderRadius:8,background:'rgba(0,0,0,.3)'}},aiAnswer)),

      // acciones
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}},
        h('button',{className:'btn btn-ghost btn-sm',onClick:aiValidate,disabled:aiLoading},'✦ IA: validar parámetros'),
        !deployed
          ? h('button',{className:'btn btn-primary',onClick:deployDemo},'⚡ Configurar contrato (demo)')
          : h('div',{style:{display:'flex',alignItems:'center',gap:8}},
              h('span',{style:{fontSize:12,color:'var(--emerald)',fontWeight:700}},'✓ Contrato configurado'),
              h('span',{style:{fontSize:11,color:'var(--txt-mute)'}},'Activá enableEmission en el gate de gobernanza para habilitar la emisión.'))
      )
    )
  );
}

/* ════════════════════════════════════════════════════════════════════
   EmissionStatus — panel del emisor: estado del contrato en su panel
   ════════════════════════════════════════════════════════════════════ */
function EmissionStatus({chain, project}) {
  const p = project || (chain.projects && chain.projects[0]) || {};
  const status = p.emissionStatus;
  const enabled = p.emissionEnabled && p.emissionEnabled[0];
  const paused  = p.emissionPaused;
  const params  = p.emissionParams;

  if (!status && !params) return h('div',{style:{padding:'14px 16px',borderRadius:10,background:'rgba(255,255,255,.03)',border:'1px solid var(--line-solid)',fontSize:12.5,color:'var(--txt-mute)'}},
    '📋 TOKAI está preparando los parámetros del contrato para tu proyecto. Te notificaremos cuando estés listo para emitir.');

  const MECH = {A:'Renta periódica',B:'Waterfall de crédito',C:'Sin yield (acceso/certificado)'};

  return h('div',{className:'card'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      h('div',{style:{fontWeight:700,fontSize:13}},'Estado de emisión'),
      h('span',{style:{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,
        background:paused?'rgba(255,92,92,.15)':enabled?'rgba(0,214,126,.15)':'rgba(154,160,166,.12)',
        color:paused?'#FF5C5C':enabled?'var(--emerald)':'#9AA0A6'}},
        paused?'⏸ Pausada':enabled?'⚡ Habilitada':'⏳ Configurada — esperando habilitación')),

    params && h('div',{style:{display:'grid',gap:6}},
      [
        ['Tipo de contrato', p.contractType || 'TOKAIToken'],
        ['Certificados/tokens', p.soulbound ? 'Soulbound (intransferibles)' : 'Transferibles (mercado OTC)'],
        ['Inversores máx.', p.maxHolders || 'Sin límite'],
        ['Lock-up', p.lockupDays ? p.lockupDays+' días' : 'Sin lock-up'],
        ['Mecanismo de flujo', MECH[p.yieldMechanism] || '—'],
      ].map(([k,v],i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderBottom:i<4?'1px solid rgba(255,255,255,.04)':'none'}},
        h('span',{style:{color:'var(--txt-mute)'}},k),h('span',{style:{fontWeight:600,color:'var(--txt)'}},String(v))))),

    !enabled && !paused && h('div',{style:{marginTop:10,fontSize:12,color:'var(--txt-mute)',lineHeight:1.5}},
      'Cuando TOKAI active la emisión, podrás emitir tokens directamente desde tu panel. Los inversores con KYC aprobado podrán suscribir.'),

    enabled && !paused && h('div',{style:{marginTop:10,padding:'10px 12px',borderRadius:8,background:'rgba(0,214,126,.06)',border:'1px solid rgba(0,214,126,.2)',fontSize:12,color:'var(--txt-dim)'}},
      '✓ Podés emitir. Andá a la pestaña "Emisión" en el panel de administración para mintear tokens a inversores verificados.')
  );
}


/* ════════════════════════════════════════════════════════════════════
   MÓDULO E · ReportExporter
   Genera el Reporte del Modelo de Negocio e importa desde Claude.ai
   ════════════════════════════════════════════════════════════════════ */
function ReportExporter({chain, toast}) {
  const projects = chain.projects||[];
  const [pid, setPid] = useState(0);
  const p = projects[pid]||projects[0]||{};
  const [mode, setMode] = useState('export'); // 'export' | 'import' | 'preview'
  const [generating, setGenerating] = useState(false);
  const [reportMd, setReportMd] = useState(p.businessReport||'');
  const [importText, setImportText] = useState('');
  const [copied, setCopied] = useState(false);

  /* Genera el reporte via IA */
  async function generateReport() {
    setGenerating(true);
    try {
      const ctx = [
        `Proyecto: ${p.name} (${p.symbol})`,
        `Vertical: ${p.vertical} | Activo: ${p.assetType||'—'}`,
        `Valuación: USD ${(p.valuationUsd||0).toLocaleString()} | Precio token: USD ${(p.priceUsdCents||0)/100}`,
        `Supply máx: ${p.maxSupply||'—'} tokens | Régimen: ${p.regime||'—'}`,
        `Mecanismo: ${p.yieldMechanism||'A'} | Yield est: ${p.yieldAnnualPct||0}% anual`,
        `Descripción: ${p.desc||'—'}`,
        p.pitch?.porque ? `Pitch del emisor: ${p.pitch.porque.slice(0,300)}` : '',
        p.thesis?.blocks ? `Tesis de valor: ${p.thesis.blocks.map(b=>b.titulo+': '+(b.contenido||b.items?.join(', ')||'')).join(' | ').slice(0,400)}` : '',
      ].filter(Boolean).join('\n');

      const prompt = `Generá el Reporte del Modelo de Negocio del Token para este proyecto.

El reporte debe cubrir:
1. RESUMEN EJECUTIVO — qué es el token, qué problema resuelve, por qué tokenizar vs. instrumentos tradicionales
2. NATURALEZA JURÍDICA DEL TOKEN — clasificación (security/utility/híbrido), Howey Test, régimen aplicable (CNV RG 1069/1088), encuadre legal
3. MODELO DE NEGOCIO — activo subyacente, cómo genera valor, quién opera, cuál es la cadena de valor
4. ESTRUCTURA FINANCIERA — proyección de flujos (3 escenarios: pesimista/base/optimista), yield estimado, métricas clave (NOI/cap rate si inmobiliario, LTV/mora si crédito), waterfall si aplica
5. MECANISMO DE DISTRIBUCIÓN — cómo y cuándo cobra el holder (Mecanismo A/B/C), frecuencia, moneda, canal de pago
6. ESTRUCTURA TÉCNICA — estándar de token (ERC-3643), compliance (soulbound, lock-up, geo-blocking), vehículo legal (fideicomiso/SPV)
7. RIESGOS Y MITIGACIONES — mínimo 4 riesgos concretos del proyecto con su mitigación propuesta
8. HOJA DE RUTA — próximos hitos hasta la emisión

Formato: Markdown con encabezados claros. Usá tablas para datos financieros. Tono institucional, rioplatense. Las proyecciones van con supuestos explícitos — nunca garantizás retornos.`;

      const res = await fetch((window.__API_URL__||'')+'/api/v1/ai/chat', {
        method:'POST',
        credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({mode:'report', messages:[{role:'user',content:ctx}], context:ctx.slice(0,800)})
      });
      if(!res.ok){ toast&&toast({type:'err',title:'Error',msg:'No se pudo conectar con la IA.'}); setGenerating(false); return; }
      const data = await res.json();
      const report = data.text||'Error al generar el reporte.';
      setReportMd(report);
      setMode('preview');
      if(chain.updateProject) chain.updateProject(pid, {businessReport: report});
      toast&&toast({title:'Reporte generado', msg:'Revisá, editá si necesitás, y enviá al cliente.'});
    } catch(e) {
      toast&&toast({type:'err', title:'Error', msg:'No se pudo conectar con la IA.'});
    } finally { setGenerating(false); }
  }

  /* Importar reporte generado en Claude.ai (pegado manual) */
  function importReport() {
    if(!importText.trim()) return;
    setReportMd(importText.trim());
    if(chain.updateProject) chain.updateProject(pid, {businessReport: importText.trim()});
    setMode('preview');
    setImportText('');
    toast&&toast({title:'Reporte importado', msg:'El reporte quedó vinculado al proyecto.'});
  }

  /* Copiar prompt listo para pegar en Claude.ai */
  function copyClaudePrompt() {
    const ctx = `Proyecto: ${p.name} | ${p.vertical} | USD ${(p.valuationUsd||0).toLocaleString()} | ${p.regime||''} | ${p.desc||''}`;
    const prompt = `Actuá como TOKAI RWA. Generá el Reporte del Modelo de Negocio del Token para este proyecto:\n\n${ctx}\n\nCubrí: naturaleza jurídica, modelo de negocio, estructura financiera (3 escenarios), mecanismo de distribución, estructura técnica, riesgos y hoja de ruta. Formato Markdown con tablas. Rioplatense institucional.`;
    navigator.clipboard&&navigator.clipboard.writeText(prompt);
    setCopied(true);
    setTimeout(()=>setCopied(false), 2500);
  }

  const ta = {width:'100%', padding:'11px 13px', borderRadius:10, border:'1px solid var(--line-solid)',
    background:'var(--black)', color:'var(--txt)', fontSize:12, fontFamily:'var(--mono)',
    resize:'vertical', boxSizing:'border-box', lineHeight:1.6};

  return h('div',{},
    h('div',{className:'eyebrow'},'Panel TOKAI · Reporte'),
    h('h1',{className:'page'},'Reporte del Modelo de Negocio'),
    h('p',{className:'page-sub'},'Generá o importá el reporte de análisis. Este documento se vincula al proyecto y sustenta la Tesis de Valor que el cliente confirma.'),

    /* selector proyecto */
    projects.length>1 && h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      projects.map((pr,i)=>h('button',{key:i,onClick:()=>{setPid(i);setReportMd(pr.businessReport||'');setMode('export');},
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,
          border:'1.5px solid '+(i===pid?'var(--emerald)':'var(--line-solid)'),
          background:i===pid?'rgba(0,214,126,.08)':'var(--panel)',
          color:i===pid?'var(--emerald)':'var(--txt)'}},pr.name))),

    /* tabs */
    h('div',{className:'role-switch',style:{marginBottom:16,width:'fit-content'}},
      [['export','Generar con IA'],['import','Importar desde Claude.ai'],['preview','Ver reporte']].map(([k,l])=>
        h('button',{key:k,className:'role-btn '+(mode===k?'active':''),onClick:()=>setMode(k)},l))),

    /* TAB: Generar con IA embebida */
    mode==='export' && h('div',{},
      h('div',{className:'card',style:{marginBottom:14}},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'Generación automática (IA embebida)'),
        h('p',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:14}},'La IA de la plataforma genera el reporte usando el knowledge base completo de TOKAI + los datos del proyecto. Revisá y editá el resultado antes de enviarlo al cliente.'),
        h('div',{style:{padding:'10px 13px',borderRadius:8,background:'rgba(0,214,126,.06)',border:'1px solid rgba(0,214,126,.15)',fontSize:12,color:'var(--txt-dim)',marginBottom:14}},
          '✦ Usa el knowledge base actualizado: metodología 6 rondas, regulatorio ARG/USA/EU, verticales, métricas de crédito, casos de referencia.'),
        h('button',{className:'btn btn-primary',disabled:generating,onClick:generateReport},
          generating?'Generando reporte…':'✦ Generar reporte con IA')),

      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'O generalo en Claude.ai y pegalo acá'),
        h('p',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:12}},'Para análisis más profundos (stress test completo, waterfall detallado, casos edge), generá el reporte en tu chat de Claude.ai con el contexto completo del proyecto y pegalo en la pestaña "Importar".'),
        h('button',{className:'btn btn-ghost btn-sm',onClick:copyClaudePrompt},
          copied?'✓ Copiado':'Copiar prompt para Claude.ai →'))),

    /* TAB: Importar */
    mode==='import' && h('div',{className:'card'},
      h('div',{style:{fontWeight:700,fontSize:13,marginBottom:10}},'Pegar reporte desde Claude.ai'),
      h('p',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:12}},'Generá el reporte en claude.ai/chat con el prompt completo del proyecto, copiá el resultado en Markdown y pegalo acá.'),
      h('textarea',{value:importText,rows:14,onChange:e=>setImportText(e.target.value),
        placeholder:'# Reporte del Modelo de Negocio — [Nombre del Proyecto]\n\n## 1. Resumen ejecutivo\n...',
        style:ta}),
      h('div',{style:{display:'flex',gap:10,marginTop:12}},
        h('button',{className:'btn btn-primary',disabled:!importText.trim(),onClick:importReport},'Importar reporte'),
        h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setMode('export')},'Cancelar'))),

    /* TAB: Preview del reporte */
    mode==='preview' && h('div',{},
      reportMd ? h('div',{},
        h('div',{className:'card',style:{marginBottom:12}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
            h('div',{style:{fontWeight:700,fontSize:13}},p.name+' · Reporte del Modelo de Negocio'),
            h('div',{style:{display:'flex',gap:8}},
              h('button',{className:'btn btn-ghost btn-sm',onClick:()=>{navigator.clipboard&&navigator.clipboard.writeText(reportMd);toast&&toast({title:'Copiado',msg:'Reporte copiado como Markdown'});}},
                'Copiar MD'),
              h('button',{className:'btn btn-primary btn-sm',
                onClick:()=>{if(chain.updateProject)chain.updateProject(pid,{businessReport:reportMd,reportSentToClient:true});toast&&toast({title:'Reporte enviado al cliente',msg:'El cliente puede revisarlo en su panel.'});},
              },'Enviar al cliente →')))),
        h('div',{style:{padding:'20px',borderRadius:12,background:'var(--black)',border:'1px solid var(--line-solid)',whiteSpace:'pre-wrap',fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.7,fontFamily:'inherit',maxHeight:600,overflow:'auto'}},
          reportMd),
        h('textarea',{value:reportMd,rows:3,onChange:e=>{setReportMd(e.target.value);if(chain.updateProject)chain.updateProject(pid,{businessReport:e.target.value});},
          placeholder:'Editá el reporte si necesitás ajustes…',
          style:{...ta,marginTop:10}}))
      : h('div',{style:{textAlign:'center',padding:'32px',color:'var(--txt-mute)',fontSize:13}},
        'Todavía no hay reporte para este proyecto. Generalo con IA o importalo desde Claude.ai.')
    )
  );
}


/* ════════════════════════════════════════════════════════════════════
   MÓDULO B · EmissionChecklist — 7 requisitos bloqueantes pre-emisión
   Req 6 (PSAV): lee isPsavActive(project) en lugar de input manual.
   Para soulbound/issuer-mode: el req 6 se cumple automáticamente.
   ════════════════════════════════════════════════════════════════════ */
function EmissionChecklist({chain, toast, pid:pidProp}) {
  const projects = chain.projects||[];
  const [pid, setPid] = useState(pidProp||0);
  const p = projects[pid]||projects[0]||{};

  /* Único campo manual restante: fiduciario */
  const [fiduciario, setFiduciario] = useState(p.fiduciario||'');
  const [docLegal, setDocLegal]     = useState(p.docLegalConfirmado||false);
  const [saved, setSaved]           = useState(false);

  /* Helpers del módulo KYC — disponibles globalmente desde views_kyc.js */
  const kycMode      = typeof resolveKycMode !== 'undefined' ? resolveKycMode(p) : 'psav';
  const psavOk       = typeof isPsavActive   !== 'undefined' ? isPsavActive(p)   : !!(p.psav && p.psavActivated);
  const activePsav   = typeof getActivePsav  !== 'undefined' ? getActivePsav(p)  : null;
  const psavLabel    = psavOk
    ? '✓ ' + (activePsav ? activePsav.name : p.psav||'PSAV') + ' activo · ' + (activePsav ? activePsav.categoryLabel : '')
    : kycMode === 'issuer'
      ? '✓ Modo emisor (soulbound sin régimen CNV) — no requiere PSAV'
      : '⚠ Sin PSAV activo — ir a Panel TOKAI → PSAV';
  const psavReqOk    = psavOk || kycMode === 'issuer';

  /* Evaluación automática de los 7 requisitos */
  const checks = [
    {
      id:'wizard',
      label:'Proyecto creado (wizard completado)',
      ok: !!(p.name && p.valuationUsd && p.maxSupply),
      auto: true,
      detail: p.name ? p.name+' · '+p.symbol+' · USD '+(p.valuationUsd||0).toLocaleString() : 'Pendiente',
    },
    {
      id:'tesis',
      label:'Tesis de valor confirmada por el cliente',
      ok: p.thesis?.estado === 'confirmada',
      auto: true,
      detail: p.thesis?.estado === 'confirmada' ? '✓ Confirmada el '+new Date(p.thesis.confirmedAt||0).toLocaleDateString('es-AR')
            : p.thesis?.estado === 'enviada'    ? '⏳ Enviada — esperando confirmación del cliente'
            : 'Pendiente',
    },
    {
      id:'reporte',
      label:'Reporte del modelo de negocio generado',
      ok: !!(p.businessReport),
      auto: true,
      detail: p.reportSentToClient ? '✓ Enviado al cliente' : p.businessReport ? '✓ Generado' : 'Pendiente',
    },
    {
      id:'params',
      label:'Parámetros técnicos del contrato configurados',
      ok: !!(p.emissionParams || p.emissionStatus === 'configured'),
      auto: true,
      detail: p.contractType ? p.contractType+(p.emissionParams?.yieldMechanism ? ' · Mec '+p.emissionParams.yieldMechanism : '') : 'Pendiente',
    },
    {
      id:'wallet',
      label:'Wallet del emisor vinculada (MetaMask)',
      ok: !!(p.issuerWallet),
      auto: true,
      detail: p.issuerWallet ? '0x…'+p.issuerWallet.slice(-6) : 'Pendiente — el emisor debe conectar MetaMask',
    },
    {
      id:'psav',
      label: kycMode === 'issuer' ? 'KYC: modo emisor (soulbound · sin PSAV)' : 'PSAV activado por TOKAI',
      ok:   psavReqOk,
      auto: true,
      detail: psavLabel,
      link: !psavReqOk ? 'psav' : null,  // sugiere ir al tab PSAV
    },
    {
      id:'docs',
      label:'Documentación legal cargada y aprobada',
      ok: docLegal || !!(p.pitch?.docs?.length > 0),
      auto: false,
      detail: p.pitch?.docs?.length > 0 ? p.pitch.docs.length+' documento(s) cargado(s)'
            : docLegal ? '✓ Aprobada manualmente por TOKAI'
            : 'Pendiente — cargar en Pitch del proyecto',
    },
  ];

  const allOk    = checks.every(c=>c.ok);
  const okCount  = checks.filter(c=>c.ok).length;
  const psavCheck = checks.find(c=>c.id==='psav');

  function saveManual() {
    if(chain.updateProject) chain.updateProject(pid, {fiduciario, docLegalConfirmado:docLegal});
    setSaved(true); setTimeout(()=>setSaved(false), 2000);
    toast&&toast({title:'Guardado', msg:'Checklist actualizado.'});
  }

  const fs = {width:'100%',padding:'8px 11px',borderRadius:8,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:12.5,boxSizing:'border-box'};

  return h('div',{},
    h('div',{className:'eyebrow'},'Panel TOKAI · Pre-emisión'),

/* Calcula la etapa actual de un proyecto */
function getProjectStage(p) {
  if (!p) return 0;
  // Etapa 7: en distribución activa
  if (p.emissionEnabled?.[0] && (p.totalSupply||0) > 0) return 7;
  // Etapa 6: gate habilitado
  if (p.emissionEnabled?.[0]) return 6;
  // Etapa 5: contrato configurado
  if (p.emissionStatus === 'configured' || p.emissionParams) return 5;
  // Etapa 4: reporte del modelo generado
  if (p.businessReport || p.reportSentToClient) return 4;
  // Etapa 3: tesis confirmada o en proceso
  if (p.thesis?.estado === 'confirmada') return 3;
  if (p.thesis?.estado === 'enviada' || p.thesis?.estado === 'borrador') return 3;
  // Etapa 2: TOKAI tomó el proyecto (ronda >= 2)
  if (p.ronda >= 2) return 2;
  // Etapa 1: proyecto creado
  if (p.name) return 1;
  return 0;
}

/* ════════════════════════════════════════════════════════════════════

   DOS MODOS POR PROYECTO:

   MODO C (demo):   desarrollo y testing

var KYC_MODES = {
  psav:   { label: 'PSAV', color: '#4DA8FF', desc: 'Verificacion por PSAV registrado UIF' },
  issuer: { label: 'Emisor', color: '#00D67E', desc: 'Verificacion directa del emisor · Solo soulbound sin CNV' },
  demo:   { label: 'Demo',  color: '#888',    desc: 'Modo simulado · Sin verificacion real' },
};
/* Devuelve el label del modo con el nombre del PSAV activo si aplica */
function kycModeLabel(project) {
  var mode = resolveKycMode(project);
  if (mode === 'psav') {
    var psav = getActivePsav ? getActivePsav(project) : null;
    return psav && psav.id !== 'none' ? 'PSAV · ' + psav.name : 'PSAV';
  }
  return KYC_MODES[mode] ? KYC_MODES[mode].label : mode;
}

function resolveKycMode(project) {
  if (!project) return 'demo';
  if (project.kycMode) return project.kycMode;
  if (project.soulbound && !/RG 106[89]|RG 1088/i.test(project.regime||'')) return 'issuer';
  if (/RG 106[89]|RG 1088/i.test(project.regime||'')) return 'psav';
  return 'psav';
}

function buildClaimHash(walletAddr, legalName, docNumber, kycMode) {
  const data = walletAddr + '|' + legalName + '|' + docNumber + '|' + kycMode + '|' + Date.now();
  var hash = 0;
  for (var i = 0; i < data.length; i++) { hash = ((hash << 5) - hash + data.charCodeAt(i)) | 0; }
  return '0x' + Math.abs(hash).toString(16).padStart(64, '0');
}

/* ─── KycIssuerFlow: self-KYC gestionado por el emisor ────────────── */
function KycIssuerFlow({ project, walletAddr, chain, onComplete, onError }) {
  var [form, setForm] = useState({ nombre: '', apellido: '', docTipo: 'DNI', docNum: '', email: '', nota: '' });
  var [saving, setSaving] = useState(false);
  var [saved, setSaved] = useState(false);
  var inp = { width: '100%', padding: '8px 11px', borderRadius: 8, border: '1px solid var(--line-solid)', background: 'var(--black)', color: 'var(--txt)', fontSize: 13, boxSizing: 'border-box' };

  async function confirmKyc() {
    if (!form.nombre.trim() || !form.docNum.trim()) { onError && onError('Nombre y DNI son obligatorios.'); return; }
    setSaving(true);

/* ─── KycGate: router principal ───────────────────────────────────── */
function KycGate({ project, walletAddr, chain, toast, onComplete }) {
  var mode = resolveKycMode(project);
  var modeInfo = KYC_MODES[mode];
  var already = chain && chain.identities && chain.identities[walletAddr];
  var [error, setError] = useState(null);

  async function handleComplete(kycData) {
    try {
      var r = await chain.registerIdentity(walletAddr, kycData.jurisdiction, kycData.category, kycData.claimHash);
      if (r && r.ok) {
        toast && toast({ title: 'KYC registrado on-chain', msg: '0x..' + walletAddr.slice(-6) + ' via ' + modeInfo.label });
        onComplete && onComplete(kycData);
      } else { setError((r && r.reason) || 'Error al registrar on-chain.'); }
    } catch (e) { setError(e.message); }
  }

  function handleError(msg) { setError(msg); toast && toast({ type: 'err', title: 'Error KYC', msg: msg }); }

  if (already && already.verified) return h('div', { style: { padding: '12px 16px', borderRadius: 10, background: 'rgba(0,214,126,.06)', border: '1px solid rgba(0,214,126,.2)', display: 'flex', gap: 10, alignItems: 'center' } },
    h('div', { style: { fontSize: 18 } }, '✅'),
    h('div', {},
      h('div', { style: { fontWeight: 700, fontSize: 13, color: 'var(--emerald)' } }, 'Identidad verificada'),
      h('div', { style: { fontSize: 11, color: 'var(--txt-mute)', marginTop: 2 } }, 'Via ' + modeInfo.label + ' · 0x..' + walletAddr.slice(-6))));

  return h('div', {},
    h('div', { style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 14 } },
      h('span', { style: { padding: '3px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700, background: modeInfo.color+'18', color: modeInfo.color, border: '1px solid '+modeInfo.color+'40' } }, modeInfo.label),
      h('span', { style: { fontSize: 11, color: 'var(--txt-mute)' } }, modeInfo.desc)),
    error ? h('div', { style: { padding: '10px 12px', borderRadius: 8, background: 'rgba(255,92,92,.08)', border: '1px solid rgba(255,92,92,.25)', color: '#FF5C5C', fontSize: 12, marginBottom: 12 } }, error) : null,
    mode === 'psav'   ? h(KycPsavFlow,   { project: project, walletAddr: walletAddr, onComplete: handleComplete, onError: handleError }) : null,
    mode === 'issuer' ? h(KycIssuerFlow, { project: project, walletAddr: walletAddr, chain: chain, onComplete: handleComplete, onError: handleError }) : null,
    mode === 'demo'   ? h(KycDemoFlow,   { project: project, walletAddr: walletAddr, chain: chain, onComplete: handleComplete }) : null);
}

/* ─── Helpers del catálogo ─────────────────────────────────────────── */
function getPsavById(id) {
  return PSAV_CATALOG.find(function(p){ return p.id === id; }) || null;
}

function getActivePsav(project) {
  if (!project) return null;
  var id = project.psavId || (project.psav === 'Ripio' ? 'ripio' : null);
  if (id) return getPsavById(id);
  if (resolveKycMode(project) === 'issuer') return getPsavById('none');
  return getPsavById('ripio'); // default
}

function isPsavActive(project) {
  var psav = getActivePsav(project);
  return !!(psav && psav.id !== 'none' && project.psavActivated === true);
}

/* ════════════════════════════════════════════════════════════════════
   PsavSelector — panel TOKAI para discriminar y activar el PSAV
   ════════════════════════════════════════════════════════════════════ */
function PsavSelector({ chain, toast }) {
  var projects = chain.projects || [];
  var [pid, setPid] = useState(0);
  var p = projects[pid] || {};
  var kycMode = resolveKycMode(p);
  var [selectedPsavId, setSelectedPsavId] = useState(p.psavId || 'ripio');
  var [activating, setActivating] = useState(false);
  var [showConfirm, setShowConfirm] = useState(false);
  var [testResult, setTestResult] = useState(null);

  var selectedPsav = getPsavById(selectedPsavId) || PSAV_CATALOG[0];
  var currentPsav  = getActivePsav(p);
  var isActivated  = isPsavActive(p);

  var canActivate = kycMode === 'psav' && selectedPsavId !== 'none' && !activating;

  /* Cambio de proyecto */
  function switchProject(i) {
    var pr = projects[i] || {};
    setPid(i);
    setSelectedPsavId(pr.psavId || 'ripio');
    setShowConfirm(false);
    setTestResult(null);
  }

  /* Test de conectividad con el PSAV (simula ping a la API) */
  async function testConnection() {
    setTestResult('testing');
    await new Promise(function(r){ setTimeout(r, 1400); });
    var ok = selectedPsavId !== 'none';
    setTestResult(ok ? 'ok' : 'error');
    toast && toast({
      title: ok ? 'Conexion OK' : 'Sin conexion',
      msg: ok ? selectedPsav.name + ' responde correctamente' : 'No se pudo conectar con ' + selectedPsav.name,
      type: ok ? undefined : 'err',
    });
  }

  /* Activar el PSAV para el proyecto */
  async function activatePsav() {
    setActivating(true);
    await new Promise(function(r){ setTimeout(r, 1200); });
    if (chain.updateProject) {
      chain.updateProject(pid, {
        psavId: selectedPsavId,
        psav: selectedPsav.name,
        psavActivated: true,
        psavActivatedAt: new Date().toISOString(),
        psavCategories: selectedPsav.categories,
        psavKycProvider: selectedPsav.kycProvider,
        kycMode: selectedPsavId === 'none' ? 'issuer' : 'psav',
      });
    }
    setActivating(false);
    setShowConfirm(false);
    toast && toast({ title: 'PSAV activado', msg: selectedPsav.name + ' habilitado para ' + (p.name || 'el proyecto') });
  }

  /* Desactivar el PSAV */
  function deactivatePsav() {
    if (chain.updateProject) {
      chain.updateProject(pid, { psavActivated: false, psavDeactivatedAt: new Date().toISOString() });
    }
    toast && toast({ type: 'warn', title: 'PSAV desactivado', msg: 'El gate de emision requiere un PSAV activo para tokens con regimen CNV.' });

function AdminAccesos({ chain, toast }) {
  var solicitudes   = chain.solicitudes || [];
  var pendientes    = solicitudes.filter(function(s){ return !s.approved; });
  var habilitados   = solicitudes.filter(function(s){ return s.approved; });
  var [tab, setTab] = useState('pending');

  var PROJECT_TYPE_LABELS = {};
  PROJECT_TYPES.forEach(function(p){ PROJECT_TYPE_LABELS[p.id] = p.label; });

  function habilitar(id) {
    var sol = solicitudes.find(function(s){ return s.id === id; });
    if (chain.approveAccess) chain.approveAccess(id);
    /* Persistir el email aprobado en localStorage para que el LoginGate lo detecte */
    if (sol && sol.email) {
      saveApprovedEmitter(sol.email, {
        nombre: sol.nombre || '', empresa: sol.empresa || '',
        projectType: sol.projectType || '', approvedBy: 'tokai',
      });
    }
    toast && toast({ title: 'Acceso habilitado', msg: (sol ? sol.email : 'Emisor') + ' puede ingresar y usar el wizard.' });
  }
  function rejectAccess(id) {
    var sol = solicitudes.find(function(s){ return s.id === id; });
    if (chain.rejectAccess) chain.rejectAccess(id);
    if (sol && sol.email) removeApprovedEmitter(sol.email);
    toast && toast({ type: 'warn', title: 'Solicitud rechazada', msg: 'El emisor fue notificado.' });
  }
  function revocarAcceso(email) {
    if (chain.revokeAccess) chain.revokeAccess(email);
    removeApprovedEmitter(email);
    toast && toast({ type: 'warn', title: 'Acceso revocado', msg: email + ' ya no puede ingresar.' });
  }

  var cell = { padding: '10px 12px', fontSize: 12.5, color: 'var(--txt-dim)', borderBottom: '1px solid rgba(255,255,255,.04)', verticalAlign: 'top' };

  return h('div', {},
    h('div', { className: 'eyebrow' }, 'Panel TOKAI · Administración de accesos'),
    h('h1', { className: 'page' }, 'Solicitudes y accesos'),
    h('p', { className: 'page-sub' }, 'Los emisores llegan a través del formulario de contacto. TOKAI evalúa, prepara la propuesta fuera de la plataforma, y habilita el acceso cuando hay acuerdo.'),

    /* KPIs */
    h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 12, marginBottom: 20 } },
      h('div', { className: 'card stat-card' },
        h('div', { className: 'stat-label' }, 'Solicitudes pendientes'),
        h('div', { className: 'stat-val', style: { color: pendientes.length > 0 ? '#FFB23E' : 'var(--txt)' } }, pendientes.length),
        h('div', { className: 'stat-delta muted' }, 'para evaluar')),
      h('div', { className: 'card stat-card' },
        h('div', { className: 'stat-label' }, 'Emisores habilitados'),
        h('div', { className: 'stat-val emerald' }, habilitados.length),
        h('div', { className: 'stat-delta up' }, 'wizards activos')),
      h('div', { className: 'card stat-card' },
        h('div', { className: 'stat-label' }, 'Pipeline total'),
        h('div', { className: 'stat-val' }, solicitudes.length),
        h('div', { className: 'stat-delta muted' }, 'formularios recibidos'))),

    /* Tabs */
    h('div', { className: 'role-switch', style: { marginBottom: 16, width: 'fit-content' } },
      h('button', { className: 'role-btn ' + (tab === 'pending' ? 'active' : ''), onClick: function(){ setTab('pending'); } },
        'Pendientes' + (pendientes.length > 0 ? ' (' + pendientes.length + ')' : '')),
      h('button', { className: 'role-btn ' + (tab === 'approved' ? 'active' : ''), onClick: function(){ setTab('approved'); } },
        'Habilitados (' + habilitados.length + ')'),
      h('button', { className: 'role-btn ' + (tab === 'whitelist' ? 'active' : ''), onClick: function(){ setTab('whitelist'); } },
        'Whitelist on-chain')),

    /* ── Tab Solicitudes de emisores ── */
    tab !== 'whitelist' && (function() {
      var rows = tab === 'pending' ? pendientes : habilitados;
      if (rows.length === 0) return h('div', { className: 'card', style: { padding: '40px', textAlign: 'center', color: 'var(--txt-mute)' } },
        h('div', { style: { fontSize: 28, marginBottom: 12 } }, tab === 'pending' ? '📬' : '✅'),
        h('div', { style: { fontSize: 14 } }, tab === 'pending' ? 'No hay solicitudes pendientes.' : 'No hay emisores habilitados todavía.'));

      return h('div', { className: 'card', style: { padding: 0, overflowX: 'auto' } },
        h('table', { style: { width: '100%', borderCollapse: 'collapse' } },
          h('thead', {},
            h('tr', {}, ['Contacto', 'Proyecto', 'Régimen', 'Valoración', 'Fecha', 'Cómo llegó', tab === 'pending' ? 'Acción' : 'Estado'].map(function(col) {
              return h('th', { key: col, style: { padding: '10px 12px', textAlign: 'left', fontSize: 11, color: 'var(--txt-mute)', textTransform: 'uppercase', letterSpacing: '.05em', borderBottom: '1px solid var(--line-solid)', background: 'rgba(255,255,255,.02)' } }, col);

                h('div', { style: { fontSize: 11, color: 'var(--emerald)' } }, s.email || '')),

              h('td', { style: { ...cell, fontSize: 11 } }, s.valoracion || '—'),
              h('td', { style: { ...cell, fontSize: 11 } }, s.createdAt ? new Date(s.createdAt).toLocaleDateString('es-AR') : '—'),
              h('td', { style: { ...cell, fontSize: 11 } }, s.how || '—'),
              tab === 'pending'

                      h('button', { className: 'btn btn-ghost btn-sm', style: { fontSize: 11, color: '#FF5C5C', borderColor: 'rgba(255,92,92,.3)' }, onClick: function(){ rejectAccess(s.id); } }, 'Rechazar')))
                : h('td', { style: cell },
                    h('div', { style: { display: 'flex', gap: 6 } },
                      h('span', { style: { padding: '3px 8px', borderRadius: 7, background: 'rgba(0,214,126,.15)', color: 'var(--emerald)', fontSize: 11, fontWeight: 700 } }, 'HABILITADO'),
                      h('button', { className: 'btn btn-ghost btn-sm', style: { fontSize: 10, color: '#FF5C5C', borderColor: 'rgba(255,92,92,.3)' }, onClick: function(){ revocarAcceso(s.email); } }, 'Revocar'))));
          }))));
    })(),

    /* ── Tab Whitelist on-chain (v3.3.0) ── */
    tab === 'whitelist' && h(AdminWhitelist, { chain: chain, toast: toast }));
}

/* ════════════════════════════════════════════════════════════════════
   AdminWhitelist — gestión de whitelist on-chain por proyecto (v3.3.0)
   Vincula acreditación KYC+fondeo offline con addQualifiedInvestor on-chain.
   ════════════════════════════════════════════════════════════════════ */
function AdminWhitelist({ chain, toast }) {
  var projects = (chain.projects || []).filter(function(p){ return p.tokenStandard; });
  var [selProject, setSelProject] = useState(projects[0]?.id || null);
  var [walletInput, setWalletInput] = useState('');
  var [loading, setLoading] = useState(false);
  var [gasEst, setGasEst] = useState(null);
  var project = projects.find(function(p){ return p.id === selProject; });
  // Mock whitelist entries (en producción cargar desde GET /api/v1/projects/:id/whitelist)
  var [entries, setEntries] = useState([
    { id:'wl1', wallet_address: '0xabc1234…', user_email: 'inversor@ejemplo.com', status: 'pending', created_at: new Date().toISOString() },
  ]);

  var isValidAddr = /^0x[0-9a-fA-F]{40}$/.test(walletInput);

  async function estimateAndShow() {
    if (!isValidAddr || !project) return;
    setLoading(true);
    var live = (typeof useChainWeb3==='function') ? null : null; // placeholder para live
    // Mock estimación: 0.000045 POL ≈ $0.018 USD
    setGasEst({ gasPOL: '0.000045', gasUSD: '0.018' });
    setLoading(false);
  }

  async function approveAndAdd(entry) {
    if (!project) return;
    setLoading(true);
    // En live: chain.addQualifiedInvestor(project, entry.wallet_address)
    await new Promise(function(r){ setTimeout(r, 1200); });
    setEntries(function(prev){ return prev.map(function(e){ return e.id===entry.id ? {...e, status:'approved'} : e; }); });
    toast && toast({ title: 'Whitelist aprobada', msg: entry.wallet_address + ' habilitado on-chain.' });
    setLoading(false);
  }

  async function addNew() {
    if (!isValidAddr || !project) return;
    setLoading(true);
    await new Promise(function(r){ setTimeout(r, 900); });
    var newEntry = { id: 'wl'+Date.now(), wallet_address: walletInput, user_email: '—', status: 'pending', created_at: new Date().toISOString() };
    setEntries(function(prev){ return [newEntry, ...prev]; });
    setWalletInput('');
    setGasEst(null);
    toast && toast({ title: 'Wallet agregada', msg: 'Pendiente de aprobación on-chain.' });
    setLoading(false);
  }

  var statusBadge = function(s) {
    var map = { pending:['#FFB23E','PENDIENTE'], approved:['var(--emerald)','APROBADA'], rejected:['#FF5C5C','RECHAZADA'] };
    var c = map[s] || ['var(--txt-mute)','—'];
    return h('span',{style:{padding:'2px 8px',borderRadius:20,background:c[0]+'22',color:c[0],fontSize:10,fontWeight:700}}, c[1]);
  };

  return h('div',{},
    h('div',{style:{marginBottom:16}},
      h('div',{style:{fontSize:12,color:'var(--txt-mute)',marginBottom:6}},'Proyecto'),
      h('select',{value:selProject||'',onChange:function(e){setSelProject(e.target.value);setGasEst(null);},
        style:{background:'var(--panel2)',border:'1px solid var(--line-solid)',borderRadius:8,padding:'8px 12px',color:'var(--txt)',fontSize:12,width:'100%'}},
        projects.length===0
          ? h('option',{value:''},'Sin proyectos (crea uno primero)')
          : projects.map(function(p){ return h('option',{key:p.id,value:p.id},p.name+' ('+p.tokenStandard+')'); }))),

    project && h('div',{className:'card',style:{padding:'14px 16px',marginBottom:16,background:'rgba(255,255,255,.02)'}},
      h('div',{style:{display:'flex',gap:16,flexWrap:'wrap',fontSize:12}},
        h('div',{},h('span',{className:'muted'},'Estándar '),h('span',{style:{fontFamily:'var(--mono)',color:'var(--emerald)'}},project.tokenStandard)),
        h('div',{},h('span',{className:'muted'},'Admin: '),h('span',{style:{fontFamily:'var(--mono)',fontSize:10.5}},project.adminAddress||'no configurada')),
        h('div',{},h('span',{className:'muted'},'Compliance: '),h('span',{style:{fontFamily:'var(--mono)',fontSize:10.5}},project.complianceAddress||'no configurada')),
        project.isActivePhase2&&h('span',{style:{padding:'2px 8px',borderRadius:20,background:'rgba(0,214,126,.15)',color:'var(--emerald)',fontSize:10,fontWeight:700}},'FASE 2 ACTIVA'))),

    h('div',{className:'card',style:{padding:'14px 16px',marginBottom:16}},
      h('div',{style:{fontSize:13,fontWeight:700,marginBottom:10}},'Agregar wallet a whitelist'),
      h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        h('input',{type:'text',placeholder:'0x1234…abcd (40 hex)',value:walletInput,onChange:function(e){setWalletInput(e.target.value);setGasEst(null);},
          style:{flex:1,background:'rgba(255,255,255,.03)',border:'1px solid '+(isValidAddr?'var(--emerald)':'rgba(255,255,255,.08)'),borderRadius:8,padding:'8px 10px',color:'var(--txt)',fontSize:12,fontFamily:'var(--mono)'}}),
        h('button',{className:'btn btn-ghost btn-sm',onClick:estimateAndShow,disabled:!isValidAddr||loading},'Gas'),
        h('button',{className:'btn btn-primary btn-sm',onClick:addNew,disabled:!isValidAddr||loading},loading?'…':'+ Agregar')),
      gasEst && h('div',{style:{marginTop:8,padding:'8px 10px',borderRadius:8,background:'rgba(0,214,126,.05)',border:'1px solid rgba(0,214,126,.15)',fontSize:11}},
        'Gas estimado: ',h('strong',{},gasEst.gasPOL+' POL'),' ≈ USD ',h('strong',{},gasEst.gasUSD),
        h('span',{style:{color:'var(--txt-mute)',marginLeft:8}},'(precio POL demo ≈ $0.40)'))),

    h('div',{className:'card',style:{padding:0,overflowX:'auto'}},
      h('table',{style:{width:'100%',borderCollapse:'collapse'}},
        h('thead',{},h('tr',{},[' Wallet','Email','Estado','Acción'].map(function(c){
          return h('th',{key:c,style:{padding:'8px 12px',textAlign:'left',fontSize:11,color:'var(--txt-mute)',textTransform:'uppercase',letterSpacing:'.05em',borderBottom:'1px solid var(--line-solid)',background:'rgba(255,255,255,.02)'}},c);
        }))),
        h('tbody',{},entries.map(function(e){
          return h('tr',{key:e.id},
            h('td',{style:{...cell,fontFamily:'var(--mono)',fontSize:11}},e.wallet_address),
            h('td',{style:{...cell,fontSize:11}},e.user_email||'—'),
            h('td',{style:cell},statusBadge(e.status)),
            h('td',{style:cell},
              e.status==='pending'
                ? h('div',{style:{display:'flex',gap:6}},
                    h('button',{className:'btn btn-primary btn-sm',style:{fontSize:10},onClick:function(){approveAndAdd(e);}},
                      loading?'…':'✓ Aprobar on-chain'),
                    h('button',{className:'btn btn-ghost btn-sm',style:{fontSize:10,color:'#FF5C5C',borderColor:'rgba(255,92,92,.3)'},onClick:function(){
                      setEntries(function(prev){return prev.map(function(x){return x.id===e.id?{...x,status:'rejected'}:x;});});
                      toast&&toast({type:'warn',title:'Rechazada',msg:e.wallet_address+' no habilitado.'});
                    }},'Rechazar'))
                : h('span',{style:{fontSize:10,color:'var(--txt-mute)'}},e.status==='approved'?'On-chain ✓':'—')));
        })))));
}

/* ════════════════════════════════════════════════════════════════════
   APP SHELL v3 — login dual · modo simple/experto · router
   ════════════════════════════════════════════════════════════════════ */
function App(){
  const [auth,setAuth] = useState(null);
  const [paid,setPaid] = useState(false); // retainer de estructuración pagado
  const [uiMode,setUiMode] = useState('simple');
  const [view,setView] = useState('home');
  const [activeProject,setActiveProject] = useState(null);
  const [role,setRole] = useState('issuer');
  const [subView,setSubView] = useState('projects');
  const [walletIdx,setWalletIdx] = useState(1);
  const [sidebarOpen,setSidebarOpen] = useState(false);

  const apiUrl = window.__API_URL__ || '';
  const sim = useChain({apiUrl, loggedIn: !!auth});
  const web3 = (typeof useWeb3==='function') ? useWeb3() : { available:false };
  const live = (typeof useChainWeb3==='function') ? useChainWeb3(web3.account) : null;
  const isLive = !!(web3.account && web3.chainOk && (typeof window!=='undefined') && window.__DEPLOYMENT__ && live);
  const chain = isLive ? live : sim;
  const toast = useToast();

  const wallet = role==='investor' ? DEMO_WALLETS[walletIdx] : DEMO_WALLETS[0];

  function go(v,pid,sub){
    let path = v;
    if(pid!=null) path += `/${pid}`;
    if(sub!=null) path += `/${sub}`;
    window.location.hash = `/${path}`;
    setSidebarOpen(false);
  }

  /* Efecto para sincronizar el estado de React con el Hash de la URL */
  useEffect(() => {
    function handleHashChange() {
      const hash = window.location.hash.replace('#/', '').replace('#', '');
      if (!hash) {
        const defaultView = role === 'tokai' ? 'tokai' : (role === 'issuer' ? (uiMode === 'simple' ? 'home' : 'admin') : 'dash');
        const defaultSub = role === 'tokai' ? 'dashboard' : 'projects';
        setView(defaultView);
        setSubView(defaultSub);
        return;
      }
      const parts = hash.split('/');
      const v = parts[0];
      
      let pid = null;
      let sub = null;
      
      if (['admin', 'tokai'].includes(v)) {
        sub = parts[1] || (v === 'admin' ? 'projects' : 'dashboard');
      } else {
        pid = parts[1] != null && parts[1] !== '' ? Number(parts[1]) : null;
        sub = parts[2] || null;
      }

      setView(v);
      if (pid !== null) {
        setActiveProject(pid);
      }
      if (sub !== null) {
        setSubView(sub);
      }
    }

    handleHashChange(); // Sincronización inicial

    return () => window.removeEventListener('hashchange', handleHashChange);
