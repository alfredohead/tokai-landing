/* Interceptor global de fetch para inyectar token JWT */
(function() {
  const originalFetch = window.fetch;
  window.fetch = function(input, init) {
    const token = localStorage.getItem('tokai_jwt');
    const isStringUrl = typeof input === 'string';
    const isRequestObjUrl = input && typeof input === 'object' && typeof input.url === 'string';
    const urlStr = isStringUrl ? input : (isRequestObjUrl ? input.url : '');
    
    if (token && urlStr && (urlStr.includes('/api/v1') || (window.__API_URL__ && urlStr.includes(window.__API_URL__)))) {
      init = init || {};
      init.headers = init.headers || {};
      if (init.headers instanceof Headers) {
        if (!init.headers.has('Authorization')) {
          init.headers.set('Authorization', 'Bearer ' + token);
        }
      } else if (Array.isArray(init.headers)) {
        const hasAuth = init.headers.some(function(h) { return h[0].toLowerCase() === 'authorization'; });
        if (!hasAuth) {
          init.headers.push(['Authorization', 'Bearer ' + token]);
        }
      } else {
        if (!init.headers['Authorization'] && !init.headers['authorization']) {
          init.headers['Authorization'] = 'Bearer ' + token;
        }
      }
    }
    return originalFetch(input, init);
  };

/* Genera una address determinística y bien distribuida a partir de un seed.
   IMPORTANTE: usa Math.imul + mulberry32. La versión previa hacía s*1103515245
   con multiplicación en punto flotante: al superar 2^53 los bits bajos se
   perdían y s%16 daba 0 casi siempre → TODAS las wallets colapsaban a
   0x0000…0000 (admin e inversores compartían identidad). Como el inversor se

function genAddr(seed){
  seed = String(seed);
  let h = 1779033703 ^ seed.length;
  for(let i=0;i<seed.length;i++){ h = Math.imul(h ^ seed.charCodeAt(i), 3432918353); h = (h<<13)|(h>>>19); }
  let a = h>>>0;
  function rnd(){ a|=0; a=(a+0x6D2B79F5)|0; let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0); }
  let hex=''; for(let i=0;i<40;i++){ hex += (rnd()&15).toString(16); }
  return '0x'+hex;
}

/* ════════════════════════════════════════════════════════════════════
   MOTOR DE CADENA SIMULADO — refleja exactamente IdentityRegistry +
   ModularCompliance + TOKAIToken (verificado contra 9 tests EVM).
   ════════════════════════════════════════════════════════════════════ */
function useChain(opts){
  const [identities, setIdentities] = useState({});       // addr -> {verified,jur,cat,verifiedAt,hash}
  const [projects, setProjects] = useState(INITIAL_PROJECTS);
  const [balances, setBalances] = useState({});           // `${pid}:${addr}` -> amount
  const [holders, setHolders] = useState({});             // pid -> Set(addr)
  const [firstAcq, setFirstAcq] = useState({});           // `${pid}:${addr}` -> ts
  const [yieldPool, setYieldPool] = useState({});         // pid -> {perToken, claimed:{addr:n}}
  const [orders, setOrders] = useState([]);               // {id,pid,seller,amount,price,active}
  const [events, setEvents] = useState([]);               // event log
  const [now, setNow] = useState(Date.now());
  const [blockedJurisdictions, setBlockedJurisdictions] = useState([840]); // EE.UU. (840) por defecto
  
  /* ── Carga proyectos del backend al iniciar sesión ── */
  function syncProjects(){
    if(!opts || !opts.apiUrl || !opts.loggedIn) return;
    /* opts.apiUrl ya incluye /api/v1 (window.__API_URL__) */
    fetch(opts.apiUrl + '/projects', { credentials: 'include' })
    .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
    .then(function(data){
      if(Array.isArray(data.projects) && data.projects.length > 0){
        var mapped = data.projects.map(mapBackendProject);
        setProjects(mapped);
      }
    })
    .catch(function(){}); // silencioso — mantiene INITIAL_PROJECTS como fallback
  }
  useEffect(function(){
    syncProjects();
  }, [opts && opts.loggedIn]);

  /* ── Retry automático si el backend estaba caído al cargar ── */
  useEffect(function(){
    if(!opts || !opts.apiUrl || !opts.loggedIn) return;
    // Si projects sigue siendo los INITIAL (id numérico), reintenta cada 30s
    var timer = setInterval(function(){
      var hasRealProjects = projects.some(function(p){ return typeof p.id === 'string' && p.id.length === 36; });
      if(hasRealProjects){ clearInterval(timer); return; }
      syncProjects();
    }, 30000);
    return function(){ clearInterval(timer); };
  }, [opts && opts.loggedIn]);

  function toggleJurisdictionBlock(jurCode){
    setBlockedJurisdictions(s => s.includes(jurCode) ? s.filter(c => c !== jurCode) : [...s, jurCode]);
    log('GeofencingUpdate', `Jurisdicción ${JUR[jurCode]} ${blockedJurisdictions.includes(jurCode) ? 'HABILITADA' : 'RESTRINGIDA'}`);
  }

  const log = (ev, detail) => setEvents(e=>[{ev,detail,t:Date.now(),hash:txHash()},...e].slice(0,200));

  /* ── IdentityRegistry.registerIdentity ── */
  function registerIdentity(addr, jur, cat, claimHash, provider){
    setIdentities(s=>({...s,[addr]:{verified:true,jur,cat,verifiedAt:Date.now(),hash:(claimHash||txHash()).slice(0,18),provider:provider||null}}));
    log('IdentityRegistered', `${short(addr)} · ${JUR[jur]} · ${CAT[cat]}`);
    /* KycGate espera {ok:true} para avanzar; sin este return el flujo demo se
       quedaba en "Error al registrar on-chain" y el KYC no llevaba a ningún lado. */
    return {ok:true, hash:claimHash||null};
  }
  function revokeIdentity(addr){
    setIdentities(s=>({...s,[addr]:{...s[addr],verified:false}}));
    log('IdentityRevoked', short(addr));
  }

  /* ── ModularCompliance.canTransfer — lógica idéntica al contrato ── */
  function canTransfer(pid, from, to, amount){
    const p = projects.find(x=>x.id===pid);
    const checks = [];
    // destino KYC
    const idTo = identities[to];
    checks.push({rule:'KYC del destinatario', detail:'IdentityRegistry.isVerified(to)', pass:!!(idTo&&idTo.verified)});
    // Geofencing global TOKAI (Gobernanza)
    const geofenceOk = !idTo || !blockedJurisdictions.includes(idTo.jur);
    checks.push({rule:'Cumplimiento Geofencing TOKAI', detail:idTo?`${JUR[idTo.jur]} ${geofenceOk?'autorizado':'bloqueado por geofence'}`:'sin identidad', pass:geofenceOk});
    // geo-blocking
    const jurOk = idTo && idTo.verified && p.jurisdictions.includes(idTo.jur);
    checks.push({rule:'Jurisdicción habilitada', detail:idTo&&idTo.verified?`${JUR[idTo.jur]} ${jurOk?'∈':'∉'} allowlist`:'sin identidad', pass:!!jurOk});
    if(from){ // transferencia secundaria
      checks.push({rule:'No es soulbound', detail:p.soulbound?'token intransferible':'transferible', pass:!p.soulbound});
      const idFrom = identities[from];
      checks.push({rule:'KYC del origen', detail:'IdentityRegistry.isVerified(from)', pass:!!(idFrom&&idFrom.verified)});
      if(p.lockupDays>0){
        const acq = firstAcq[`${pid}:${from}`]||0;
        const elapsed = (now-acq)/(86400000);
        const lockOk = acq>0 && elapsed>=p.lockupDays;
        checks.push({rule:`Lock-up cumplido (${p.lockupDays}d)`, detail:acq?`${Math.floor(elapsed)}d / ${p.lockupDays}d`:'sin adquisición', pass:lockOk});
      }
    }
    if(p.maxHolders>0){
      const hs = holders[pid]||new Set();
      const isNew = !hs.has(to);
      const ok = !isNew || hs.size < p.maxHolders;
      checks.push({rule:`Tope de holders (${p.maxHolders})`, detail:`${hs.size}/${p.maxHolders} holders`, pass:ok});
    }
    const allPass = checks.every(c=>c.pass);
    const reason = checks.find(c=>!c.pass);
    return {allowed:allPass, checks, reason:reason?reason.rule:null};
  }

  /* ── TOKAIToken.mint ── */
  function mint(pid, to, amount){
    const v = canTransfer(pid, null, to, amount);
    if(!v.allowed) return {ok:false, reason:v.reason, checks:v.checks};
    setBalances(b=>({...b,[`${pid}:${to}`]:(b[`${pid}:${to}`]||0)+amount}));
    setHolders(hh=>{ const s=new Set(hh[pid]||[]); s.add(to); return {...hh,[pid]:s}; });
    setFirstAcq(fa=>{ const k=`${pid}:${to}`; return fa[k]?fa:{...fa,[k]:Date.now()}; });
    setProjects(ps=>ps.map(p=>p.id===pid?{...p,totalSupply:p.totalSupply+amount,raised:p.raised+amount*(p.priceUsdCents/100)}:p));
    const p = projects.find(x=>x.id===pid);
    log('Mint', `${amount} ${p.symbol} → ${short(to)}`);
    return {ok:true, checks:v.checks};
  }

  /* ── TOKAIToken.transfer (secundario directo) ── */
  function transfer(pid, from, to, amount){
    const v = canTransfer(pid, from, to, amount);
    if(!v.allowed) return {ok:false, reason:v.reason, checks:v.checks};
    if((balances[`${pid}:${from}`]||0)<amount) return {ok:false, reason:'Saldo insuficiente', checks:v.checks};
    setBalances(b=>({...b,[`${pid}:${from}`]:b[`${pid}:${from}`]-amount,[`${pid}:${to}`]:(b[`${pid}:${to}`]||0)+amount}));
    setHolders(hh=>{ const s=new Set(hh[pid]||[]); s.add(to); if((balances[`${pid}:${from}`]||0)-amount<=0) s.delete(from); return {...hh,[pid]:s}; });
    setFirstAcq(fa=>{ const k=`${pid}:${to}`; return fa[k]?fa:{...fa,[k]:Date.now()}; });
    const p = projects.find(x=>x.id===pid);
    log('Transfer', `${amount} ${p.symbol}: ${short(from)} → ${short(to)}`);
    return {ok:true, checks:v.checks};
  }

  /* ── distributeYield ── */
  function distributeYield(pid, totalUsd){
    const p = projects.find(x=>x.id===pid);
    if(p.totalSupply===0) return {ok:false,reason:'Sin holders'};
    setYieldPool(y=>{ const cur=y[pid]||{perToken:0,claimed:{},history:[]}; return {...y,[pid]:{...cur,perToken:cur.perToken+totalUsd/p.totalSupply,history:[{t:Date.now(),total:totalUsd,perToken:totalUsd/p.totalSupply},...(cur.history||[])]}}; });
    log('YieldDistributed', `USD ${fmt(totalUsd)} · ${p.symbol} (${fmt(totalUsd/p.totalSupply)}/token)`);
    return {ok:true};
  }
  function claimableYield(pid, addr){
    const yp = yieldPool[pid]; if(!yp) return 0;
    const bal = balances[`${pid}:${addr}`]||0;
    const claimed = yp.claimed[addr]||0;
    return bal*yp.perToken - claimed;
  }
  function claimYield(pid, addr){
    const amt = claimableYield(pid,addr);
    if(amt<=0) return {ok:false,reason:'Nada para reclamar'};
    setYieldPool(y=>{ const yp=y[pid]; return {...y,[pid]:{...yp,claimed:{...yp.claimed,[addr]:(yp.claimed[addr]||0)+amt}}}; });
    const p=projects.find(x=>x.id===pid);
    log('YieldClaimed', `USD ${fmt(amt)} · ${p.symbol} → ${short(addr)}`);
    return {ok:true, amount:amt};
  }

  /* ── Mercado secundario permisionado ── */
  function createOrder(pid, seller, amount, priceUsd){
    if((balances[`${pid}:${seller}`]||0)<amount) return {ok:false,reason:'Saldo insuficiente'};
    const id = orders.length;
    setOrders(o=>[...o,{id,pid,seller,amount,price:priceUsd,active:true,t:Date.now()}]);
    const p=projects.find(x=>x.id===pid);
    log('OrderCreated', `#${id} · ${amount} ${p.symbol} @ USD ${fmt(priceUsd)}`);
    return {ok:true};
  }
  function fillOrder(orderId, buyer){
    const o = orders.find(x=>x.id===orderId);
    if(!o||!o.active) return {ok:false,reason:'Orden inactiva'};
    if(o.seller===buyer) return {ok:false,reason:'No podés comprar tu propia orden'};
    const v = canTransfer(o.pid, o.seller, buyer, o.amount);
    if(!v.allowed) return {ok:false, reason:v.reason, checks:v.checks};
    setBalances(b=>({...b,[`${o.pid}:${o.seller}`]:b[`${o.pid}:${o.seller}`]-o.amount,[`${o.pid}:${buyer}`]:(b[`${o.pid}:${buyer}`]||0)+o.amount}));
    setHolders(hh=>{ const s=new Set(hh[o.pid]||[]); s.add(buyer); return {...hh,[o.pid]:s}; });
    setFirstAcq(fa=>{ const k=`${o.pid}:${buyer}`; return fa[k]?fa:{...fa,[k]:Date.now()}; });
    setOrders(os=>os.map(x=>x.id===orderId?{...x,active:false}:x));
    const p=projects.find(x=>x.id===o.pid);
    log('OrderFilled', `#${orderId} · ${o.amount} ${p.symbol} → ${short(buyer)}`);
    return {ok:true, checks:v.checks};
  }
  function cancelOrder(orderId, who){
    const o=orders.find(x=>x.id===orderId);
    if(!o||o.seller!==who) return {ok:false,reason:'No sos el vendedor'};
    setOrders(os=>os.map(x=>x.id===orderId?{...x,active:false}:x));
    log('OrderCancelled', `#${orderId}`);
    return {ok:true};
  }

  async function createProject(cfg){
    // actualización optimista inmediata
    const id = projects.length;
    const p = {id,...cfg,token:genAddr(cfg.symbol+id),compliance:genAddr(cfg.symbol+'c'+id),totalSupply:0,raised:0,
      banner:`linear-gradient(135deg,${cfg.color||'#1a4d8f'}33,${cfg.color||'#1a4d8f'})` };
    setProjects(ps=>[...ps,p]);
    log('ProjectCreated', `${cfg.name} (${cfg.symbol})`);

    // persistir en backend si hay sesión (auth via cookie HttpOnly)
    if(opts && opts.loggedIn && opts.apiUrl){
      try{
        const res = await fetch(opts.apiUrl + '/projects', {
          method: 'POST',
          credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            name: cfg.name, symbol: cfg.symbol, vertical: cfg.vertical,
            regime: cfg.regime || 'Oferta privada · calificados', maxSupply: cfg.supplyMax || cfg.maxSupply || 0,
            priceUsdCents: cfg.priceUsd ? Math.round(cfg.priceUsd * 100) : (cfg.priceUsdCents || 0),
            assetType: cfg.assetType, yieldMechanism: cfg.yieldMechanism,
            yieldAnnualPct: cfg.yieldAnnualPct || 0, valuationUsd: cfg.valuationUsd || 0,
            description: cfg.desc || '', isSoulbound: cfg.soulbound || false,
            lockupDays: cfg.lockupDays || 0, maxHolders: cfg.maxHolders || 0,
            jurisdictions: cfg.jurisdictions || [32], color: cfg.color || '#1a4d8f',
            // v3.5.0 — emissionStack completo desde el primer POST
            tokenStandard: cfg.tokenStandard || 'ERC-3643',
            walletRoles: cfg.walletRoles || {},
            complianceRules: cfg.complianceRules || {},
            phaseState: cfg.phaseState || {},
            meta: cfg.meta || {},
          })
        });
        if(res.ok){
          const data = await res.json();
          // reemplazar el item optimista con el del backend (tiene UUID real)
          setProjects(ps => ps.map(x => x.id === id ? {...mapBackendProject(data.project), totalSupply:0, raised:0} : x));
        }
      } catch(e){ /* mantiene el estado optimista */ }
    }
    return id;
  }

  /* Campos que el PATCH /projects/:id del backend acepta directamente (fieldMap del router).
     El resto del estado operativo del laboratorio (businessReport, pitch, emissionParams,
     psav*, fiduciario, issuerWallet, etc.) se pliega en meta JSONB para no perderse al recargar. */
  const BACKEND_PATCH_FIELDS = ['name','symbol','vertical','priceUsdCents','maxSupply','isSoulbound',
    'lockupDays','maxHolders','regime','description','jurisdictions','yieldMechanism','yieldAnnualPct',
    'valuationUsd','assetType','color','ronda','checklist','emissionEnabled','emissionPaused',
    'totalSupply','raised','meta','tokenStandard','adminAddress','operatorAddress','complianceAddress',
    'ipfsCid','isActivePhase2','walletRoles','complianceRules','phaseState','tokenAddress','tokenDeployed'];
  const PATCH_ALIASES = { soulbound:'isSoulbound', desc:'description' };

  /* Varios componentes legacy pasan el índice del array en lugar del id del proyecto.
     Con proyectos demo (id numérico secuencial) coincidían; con UUIDs del backend no. */
  function resolveProjectId(id){
    if(projects.some(function(p){ return p.id===id; })) return id;
    if(typeof id === 'number' && projects[id]) return projects[id].id;
    return id;
  }

  function persistPatch(realId, patch, current){
    if(!(opts && opts.loggedIn && opts.apiUrl && typeof realId === 'string' && realId.length === 36)) return;
    const body = {};
    const metaExtra = {};
    Object.keys(patch).forEach(function(k){
      if(k === 'meta') return; // se mergea abajo
      const key = PATCH_ALIASES[k] || k;
      if(BACKEND_PATCH_FIELDS.indexOf(key) !== -1) body[key] = patch[k];
      else metaExtra[k] = patch[k];
    });
    /* emission_enabled es BOOLEAN en DB; el front modela {serie:bool} */
    if(body.emissionEnabled && typeof body.emissionEnabled === 'object'){
      body.emissionEnabled = Object.values(body.emissionEnabled).some(Boolean);
    }
    const metaPatch = Object.assign({}, patch.meta || {}, metaExtra);
    if(Object.keys(metaPatch).length > 0){
      body.meta = Object.assign({}, (current && current.meta) || {}, metaPatch);
    }
    if(Object.keys(body).length === 0) return;
    fetch(opts.apiUrl + '/projects/' + realId, {
      method: 'PATCH',
      credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    }).catch(function(){});
  }

  async function updateProject(id, patch){
    const realId = resolveProjectId(id);
    const current = projects.find(function(p){ return p.id===realId; });
    setProjects(ps=>ps.map(p=>p.id===realId?{...p,...patch}:p));
    log('ProjectUpdated', `Proyecto ${realId} actualizado`);
    persistPatch(realId, patch, current);
  }

  async function deleteProject(id){
    const realId = resolveProjectId(id);
    setProjects(ps=>ps.filter(p=>p.id!==realId));
    log('ProjectDeleted', `Proyecto ${realId} eliminado`);
    if(opts && opts.loggedIn && opts.apiUrl && typeof realId === 'string' && realId.length === 36){
      try{
        await fetch(opts.apiUrl + '/projects/' + realId, {
          method: 'DELETE',
          credentials: 'include',
        });
      } catch(e){}
    }
  }

  // Gate de gobernanza de emisión — estado local + persistencia backend (Llave 2 de TOKAI)
  function enableEmission(pid, serieId=0){
    const realId = resolveProjectId(pid);
    const current = projects.find(function(p){ return p.id===realId; });
    const merged = {...((current&&current.emissionEnabled)||{}),[serieId]:true};
    setProjects(ps=>ps.map(p=>p.id===realId?{...p,emissionEnabled:merged,emissionPaused:false}:p));
    log('EmissionEnabled',`pid ${realId} serie ${serieId}`);
    persistPatch(realId, {emissionEnabled:merged, emissionPaused:false}, current);
    return {ok:true};
  }
  function disableEmission(pid, serieId=0){
    const realId = resolveProjectId(pid);
    const current = projects.find(function(p){ return p.id===realId; });
    const merged = {...((current&&current.emissionEnabled)||{}),[serieId]:false};
    setProjects(ps=>ps.map(p=>p.id===realId?{...p,emissionEnabled:merged}:p));
    log('EmissionDisabled',`pid ${realId} serie ${serieId}`);
    persistPatch(realId, {emissionEnabled:merged}, current);
    return {ok:true};
  }
  function pauseEmission(pid, reason=''){
    const realId = resolveProjectId(pid);
    const current = projects.find(function(p){ return p.id===realId; });
    setProjects(ps=>ps.map(p=>p.id===realId?{...p,emissionPaused:true,emissionPauseReason:reason}:p));
    log('EmissionPaused',`pid ${realId}: ${reason}`);
    persistPatch(realId, {emissionPaused:true, emissionPauseReason:reason}, current);
    return {ok:true};
  }
  function unpauseEmission(pid){
    const realId = resolveProjectId(pid);
    const current = projects.find(function(p){ return p.id===realId; });
    setProjects(ps=>ps.map(p=>p.id===realId?{...p,emissionPaused:false,emissionPauseReason:''}:p));
    log('EmissionUnpaused',`pid ${realId}`);
    persistPatch(realId, {emissionPaused:false, emissionPauseReason:''}, current);
    return {ok:true};
  }

  /* time-travel para demostrar lock-up */
  function advanceTime(days){ setNow(n=>n+days*86400000); log('TimeAdvanced', `+${days} días (solo demo)`); }

  /* Estrategia A — stub demo: simula deploy y avanza a Ronda 6 */
  function deployToken(project){
    const fakeAddr = genAddr(project.symbol + 'token' + project.id);
    setProjects(ps=>ps.map(p=>p.id===project.id?{...p,tokenAddress:fakeAddr,tokenDeployed:true,ronda:6,token:fakeAddr}:p));
    log('TokenDeployed', `${project.symbol} → ${fakeAddr} (demo)`);
    return Promise.resolve({ok:true, tokenAddr:fakeAddr, gasPOL:'0.00120', hash:'0x'+fakeAddr.slice(2).padEnd(64,'0')});
  }

  return {identities,projects,balances,holders,yieldPool,orders,events,now,blockedJurisdictions,toggleJurisdictionBlock,
    registerIdentity,revokeIdentity,canTransfer,mint,transfer,distributeYield,
    claimableYield,claimYield,createOrder,fillOrder,cancelOrder,createProject,updateProject,deleteProject,
    enableEmission,disableEmission,pauseEmission,unpauseEmission,advanceTime,
    // v3.5.0 — Estrategia A (deploy de token)
    deployToken,
    bal:(pid,a)=>balances[`${pid}:${a}`]||0};
}

// Red activa: se lee desde el deployment inyectado, default = Amoy
function getActiveNetwork() {
  const dep = (typeof window !== 'undefined') ? window.__DEPLOYMENT__ : null;
  const chainId = dep && dep.chainId ? dep.chainId : 80002;
  return NETWORKS[chainId] || NETWORKS[80002];
}

// Compatibilidad: AMOY sigue funcionando como alias
const AMOY = NETWORKS[80002];

/* Detecta si el entorno puede operar en vivo (MetaMask + ethers + deployment) */
function web3Available(){
  return typeof window !== 'undefined' && !!window.ethereum && !!window.ethers && !!window.__DEPLOYMENT__;
}

/* Obtiene el provider de MetaMask directamente, evitando agregadores de wallets */
function getMetaMaskProvider(){
  if(!window.ethereum) return null;
  // Escenario multi-wallet: providers[] se puebla cuando hay varias extensiones instaladas
  if(Array.isArray(window.ethereum.providers)){
    return window.ethereum.providers.find(p=>p.isMetaMask) || null;
  }
  // Wallet única — verificar que sea MetaMask
  if(window.ethereum.isMetaMask) return window.ethereum;
  return null;
}

/* Hook de conexión Web3. Devuelve estado de wallet y helpers. */
function useWeb3(){
  const [account,setAccount] = useState(null);
  const [chainOk,setChainOk] = useState(false);
  const [connecting,setConnecting] = useState(false);
  const [error,setError] = useState(null);

  async function connect(){
    const provider = getMetaMaskProvider();
    if(!provider){ setError('No se detectó MetaMask. Instalalo para operar en vivo.'); return false; }
    setConnecting(true); setError(null);
    try{
      // Primero intentar eth_accounts (sin prompt): si ya hay permisos los devuelve directo
      let accs = await provider.request({ method:'eth_accounts' });
      if(!accs || !accs[0]){
        // No hay permisos previos: pedir conexión
        accs = await provider.request({ method:'eth_requestAccounts' });
      }
      const activeAccount = accs && accs[0];
      if(!activeAccount) throw new Error('MetaMask no devolvio una cuenta activa.');
      setAccount(activeAccount);
      // verificar red
      const cid = await provider.request({ method:'eth_chainId' });
      if(cid !== getActiveNetwork().chainIdHex){
        try{
          await provider.request({ method:'wallet_switchEthereumChain', params:[{chainId:getActiveNetwork().chainIdHex}] });
        }catch(switchErr){
          if(switchErr.code === 4902){
            await provider.request({ method:'wallet_addEthereumChain', params:[getActiveNetwork().params] });
          } else throw switchErr;
        }
      }
      setChainOk(true);
      return activeAccount;
    }catch(e){
      if(e.code===-32002){
        // Solicitud pendiente atrapada internamente — intentar eth_accounts como fallback
        try{
          const fallbackAccs = await provider.request({ method:'eth_accounts' });
          if(fallbackAccs && fallbackAccs[0]){
            setAccount(fallbackAccs[0]);
            const cid = await provider.request({ method:'eth_chainId' });
            setChainOk(cid === getActiveNetwork().chainIdHex);
            return fallbackAccs[0];
          }
        }catch(_){}
        const msg = 'MetaMask tiene una solicitud bloqueada. Cerrá y volvé a abrir MetaMask, luego intentá de nuevo.';
        setError(msg); return { error: msg };
      }
      const msg = e.code===4001
        ? 'Conexión rechazada. Aprobá la solicitud en MetaMask para continuar.'
        : (e.message || 'Error de conexión');
      setError(msg);
      return { error: msg };
    }
    finally{ setConnecting(false); }
  }

  useEffect(()=>{
    const provider = getMetaMaskProvider();
    if(!provider) return;
    const onAcc = (accs)=> setAccount(accs[0]||null);
    const onChain = (cid)=> setChainOk(cid===getActiveNetwork().chainIdHex);
    provider.on && provider.on('accountsChanged', onAcc);
    provider.on && provider.on('chainChanged', onChain);
    return ()=>{ if(provider.removeListener){ provider.removeListener('accountsChanged',onAcc); provider.removeListener('chainChanged',onChain); } };
  },[]);

  async function switchNetwork(){
    const provider = getMetaMaskProvider();
    if(!provider) return false;
    const net = getActiveNetwork();
    try{
      await provider.request({ method:'wallet_switchEthereumChain', params:[{chainId:net.chainIdHex}] });
      setChainOk(true); return true;
    }catch(e){
      if(e.code===4902){
        try{
          await provider.request({ method:'wallet_addEthereumChain', params:[net.params] });
          setChainOk(true); return true;
        }catch(_){ return false; }
      }
      return false;
    }
  }

  return { account, chainOk, connecting, error, connect, switchNetwork, available: !!(getMetaMaskProvider()) };
}

/* ─── Capa de contratos en vivo (ethers v6) ───
   Implementa la MISMA interfaz que useChain() pero contra contratos reales.
   Se usa solo cuando web3Available() === true.                              */
function useChainWeb3(account){
  const dep = window.__DEPLOYMENT__;
  const abis = window.__ABIS__;
  const [projects,setProjects] = useState([]);
  const [tick,setTick] = useState(0);
  const refresh = ()=> setTick(t=>t+1);

  function provider(){ return new window.ethers.BrowserProvider(window.ethereum); }
  async function signer(){ return await provider().getSigner(); }
  async function contract(addr, abiName, withSigner){
    const p = provider();
    const c = new window.ethers.Contract(addr, abis[abiName], withSigner ? await p.getSigner() : p);
    return c;
  }

  // cargar proyectos desde la factory
  const [balancesCache,setBalancesCache] = useState({});
  useEffect(()=>{ (async()=>{
    if(!dep) return;
    try{
      const factory = await contract(dep.tokenFactory, 'TokenFactory', false);
      const n = Number(await factory.projectCount());
      
      // Cargar todos los proyectos y sus datos en paralelo
      const projectPromises = Array.from({ length: n }, async (_, i) => {
        try {
          const pr = await factory.projects(i);
          const tok = await contract(pr.token, 'TOKAIToken', false);
          
          const [symbol, totalSupply, maxSupply, priceUsdCents, balance] = await Promise.all([
            tok.symbol().catch(() => 'TOK'),
            tok.totalSupply().then(Number).catch(() => 0),
            tok.maxSupply().then(Number).catch(() => 0),
            tok.priceUsdCents().then(Number).catch(() => 0),
            account ? tok.balanceOf(account).then(Number).catch(() => 0) : Promise.resolve(0)
          ]);

          return {
            id: i,
            name: pr.name,
            token: pr.token,
            compliance: pr.compliance,
            symbol,
            totalSupply,
            maxSupply,
            priceUsdCents,
            balance
          };
        } catch (itemErr) {
          console.error(`Error cargando proyecto en indice ${i}:`, itemErr);
          return null;
        }
      });

      const ps = (await Promise.all(projectPromises)).filter(Boolean);
      const bcache = {};
      ps.forEach(p => {
        if (account) {
          bcache[`${p.id}:${account}`] = p.balance;
        }
      });

      setProjects(ps);
      setBalancesCache(bcache);
    }catch(e){ console.error('load projects',e); }
  })(); },[tick, account]);

  async function registerIdentity(addr, jur, cat){
    const reg = await contract(dep.identityRegistry,'IdentityRegistry',true);
    const tx = await reg.registerIdentity(addr, jur, cat);
    await tx.wait(); refresh(); return { ok:true, hash:tx.hash };
  }
  async function mint(pid, to, amount){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.mint(to, amount); await tx.wait(); refresh(); return {ok:true, hash:tx.hash}; }
    catch(e){ return {ok:false, reason: parseRevert(e)}; }
  }
  async function transfer(pid, from, to, amount){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.transfer(to, amount); await tx.wait(); refresh(); return {ok:true, hash:tx.hash}; }
    catch(e){ return {ok:false, reason: parseRevert(e)}; }
  }
  async function distributeYield(pid, totalUsdc){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.distributeYield(totalUsdc); await tx.wait(); refresh(); return {ok:true, hash:tx.hash}; }
    catch(e){ return {ok:false, reason: parseRevert(e)}; }
  }
  // ── Gate de gobernanza de emisión (Llave 2) ──
  async function enableEmission(pid){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.enableEmission(true); await tx.wait(); logEv('EmissionEnabled','pid '+pid); return {ok:true,hash:tx.hash}; }
    catch(e){ return {ok:false,reason:parseRevert(e)}; }
  }
  async function disableEmission(pid){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.enableEmission(false); await tx.wait(); logEv('EmissionDisabled','pid '+pid); return {ok:true,hash:tx.hash}; }
    catch(e){ return {ok:false,reason:parseRevert(e)}; }
  }
  async function pauseEmission(pid, reason=''){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.pauseEmission(reason); await tx.wait(); logEv('EmissionPaused','pid '+pid+': '+reason); return {ok:true,hash:tx.hash}; }
    catch(e){ return {ok:false,reason:parseRevert(e)}; }
  }
  async function unpauseEmission(pid){
    const p = projects[pid];
    const tok = await contract(p.token,'TOKAIToken',true);
    try{ const tx = await tok.unpauseEmission(); await tx.wait(); logEv('EmissionUnpaused','pid '+pid); return {ok:true,hash:tx.hash}; }
    catch(e){ return {ok:false,reason:parseRevert(e)}; }
  }
  async function bal(pid, addr){
    const p = projects[pid]; if(!p) return 0;
    const tok = await contract(p.token,'TOKAIToken',false);
    return Number(await tok.balanceOf(addr));
  }

  function parseRevert(e){
    // intenta extraer el motivo de compliance (TransferNotCompliant(reason))
    const m = (e.reason || e.shortMessage || e.message || '').match(/TransferNotCompliant\("?([^")]+)"?\)/);
    return m ? m[1] : (e.shortMessage || 'Transacción revertida');
  }

  // ── estado local que on-chain no expone directamente ──
  const [events,setEvents] = useState([]);
  const [identities,setIdentities] = useState({});
  const logEv = (ev,detail)=> setEvents(e=>[{t:Date.now(),ev,detail},...e].slice(0,50));

  // wrappers que registran eventos locales para la trazabilidad de la UI
  async function _registerIdentity(addr,jur,cat){
    const r = await registerIdentity(addr,jur,cat);
    if(r.ok){ setIdentities(i=>({...i,[addr]:{verified:true,jur,cat}})); logEv('IdentityRegistered',short(addr)+' · jur '+jur); }
    return r;
  }
  async function _mint(pid,to,amount){ const r=await mint(pid,to,amount); if(r.ok)logEv('Mint',amount+' → '+short(to)); return r; }
  async function _transfer(pid,from,to,amount){ const r=await transfer(pid,from,to,amount); if(r.ok)logEv('Transfer',amount+' → '+short(to)); else logEv('TransferBlocked',r.reason); return r; }
  async function _distributeYield(pid,amt){ const r=await distributeYield(pid,amt); if(r.ok)logEv('YieldDistributed','pid '+pid); return r; }
  async function _enableEmission(pid){ const r=await enableEmission(pid); return r; }
  async function _disableEmission(pid){ const r=await disableEmission(pid); return r; }
  async function _pauseEmission(pid,reason){ const r=await pauseEmission(pid,reason); return r; }
  async function _unpauseEmission(pid){ const r=await unpauseEmission(pid); return r; }

  // F2 — claimableYield y claimYield: llamadas reales al contrato TOKAIToken
  async function claimableYield(pid, addr) {
    try {
      const p = projects[pid] || projects.find(x => x.id === pid);
      if (!p || !p.token) return 0;
      const tok = await contract(p.token, 'TOKAIToken', false);
      return Number(await tok.claimableYield(addr));
    } catch { return 0; }
  }
  async function claimYield(pid, addr) {
    try {
      const p = projects[pid] || projects.find(x => x.id === pid);
      if (!p || !p.token) return { ok:false, reason:'Proyecto sin contrato desplegado' };
      const tok = await contract(p.token, 'TOKAIToken', true);
      const gasEst = await tok.claimYield.estimateGas();
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      const tx = await tok.claimYield();
      const receipt = await tx.wait();
      // Leer amount del evento YieldClaimed
      let amount = 0;
      const iface = new window.ethers.Interface(abis['TOKAIToken']);
      for (const log of receipt.logs) {
        try {
          const parsed = iface.parseLog(log);
          if (parsed && parsed.name === 'YieldClaimed') amount = Number(parsed.args.amount);
        } catch {}
      }
      logEv('YieldClaimed', `${short(addr)} · ${amount} · gas: ${Number(gasPOL).toFixed(5)} POL`);
      refresh();
      return { ok:true, amount, hash:tx.hash, gasPOL };
    } catch(e) { return { ok:false, reason:parseRevert(e) }; }
  }
  function canTransfer(){ return {allowed:true,checks:[],reason:null}; }
  function revokeIdentity(){ return {ok:false,reason:'Revocá on-chain'}; }
  async function createOrder(pid, seller, amountTokens, priceUsdCents){
    if(!dep || !dep.otcMarket) return {ok:false, reason:'OTCMarket no configurado'};
    try{
      const p = projects.find(x=>x.id===pid); if(!p) return {ok:false,reason:'Proyecto no encontrado'};
      const otc = await contract(dep.otcMarket,'OTCMarket',true);
      const tok = await contract(p.token,'TOKAIToken',true);
      // Aprobar OTCMarket para transferir tokens del seller
      await (await tok.approve(dep.otcMarket, amountTokens)).wait();
      const tx = await otc.createOrder(p.token, amountTokens, BigInt(priceUsdCents));
      const receipt = await tx.wait();
      let orderId = null;
      const iface = new window.ethers.Interface(abis['OTCMarket']);
      for(const log of receipt.logs){ try{ const ev=iface.parseLog(log); if(ev&&ev.name==='OrderCreated') orderId=Number(ev.args.orderId); }catch{} }
      logEv('OTCOrderCreated',`#${orderId} ${amountTokens} tokens @ ${priceUsdCents}c`);
      refresh(); return {ok:true, orderId, hash:tx.hash};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }
  async function fillOrder(orderId, buyer){
    if(!dep || !dep.otcMarket) return {ok:false, reason:'OTCMarket no configurado'};
    try{
      const otc = await contract(dep.otcMarket,'OTCMarket',true);
      const usdc = await contract(dep.usdc,'TOKAIToken',true); // ERC-20 approve
      // Calcular USDC requerido desde el order
      const order = await (await contract(dep.otcMarket,'OTCMarket',false)).orders(orderId);
      const totalUsdc = order.priceUsdcTotal;
      await (await usdc.approve(dep.otcMarket, totalUsdc)).wait();
      const tx = await otc.fillOrder(orderId);
      const receipt = await tx.wait();
      logEv('OTCFilled',`Orden #${orderId} completada`);
      refresh(); return {ok:true, hash:tx.hash};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }
  async function cancelOrder(orderId){
    if(!dep || !dep.otcMarket) return {ok:false, reason:'OTCMarket no configurado'};
    try{
      const otc = await contract(dep.otcMarket,'OTCMarket',true);
      const tx = await otc.cancelOrder(orderId);
      await tx.wait();
      logEv('OTCCancelled',`Orden #${orderId}`);
      refresh(); return {ok:true, hash:tx.hash};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }
  function createProject(){ return {ok:false,reason:'Creá el proyecto vía deploy'}; }
  function advanceTime(){ /* no aplica en cadena real */ }

  // ── v3.3.0 — ERC-721 GATCertificate functions ──────────────────────────────

  /**
   * Agrega un inversor a la whitelist on-chain del contrato ERC-3643/ERC-721.
   * Debe ser llamada desde la wallet compliance_address autorizada en el contrato.
   * @param {object} p    - proyecto (con p.compliance para ERC-3643 o p.token para ERC-721)
   * @param {string} addr - dirección del inversor a habilitar
   */
  async function addQualifiedInvestor(p, addr){
    if(!p || !p.tokenStandard) return {ok:false, reason:'Proyecto sin estándar definido'};
    try{
      if(p.tokenStandard === 'ERC-721'){
        // GATCertificate: addQualifiedInvestor(address)
        const abiName = abis && abis['GATCertificate'] ? 'GATCertificate' : 'TOKAIToken';
        const c = await contract(p.token, abiName, true);
        const gasEst = await c.addQualifiedInvestor.estimateGas(addr);
        const { gasPrice } = await provider().getFeeData();
        const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
        const tx = await c.addQualifiedInvestor(addr);
        await tx.wait();
        logEv('QualifiedInvestorAdded', short(addr)+' (ERC-721) gas: '+Number(gasPOL).toFixed(5)+' POL');
        return {ok:true, hash:tx.hash, gasPOL};
      } else {
        // ERC-3643: el Identity Registry gestiona la identidad
        const r = await _registerIdentity(addr, 32, 2);
        return r;
      }
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }

  /**
   * Mint múltiple ERC-721 (batchMint) desde la wallet operator_address.
   * @param {object} p        - proyecto ERC-721
   * @param {string} to       - destinatario
   * @param {number} quantity - cantidad de NFTs
   */
  async function batchMint(p, to, quantity){
    if(!p) return {ok:false, reason:'Proyecto no encontrado'};
    try{
      const abiName = abis && abis['GATCertificate'] ? 'GATCertificate' : 'TOKAIToken';
      const c = await contract(p.token, abiName, true);
      const gasEst = await c.batchMint.estimateGas(to, quantity);
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      const tx = await c.batchMint(to, quantity);
      await tx.wait();
      logEv('BatchMint', quantity+' NFTs → '+short(to)+' gas: '+Number(gasPOL).toFixed(5)+' POL');
      return {ok:true, hash:tx.hash, gasPOL};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }

  /**
   * Canje (Fase 2): el holder quema su PRE-GAT (ERC-721) para reclamar GAT definitivo.
   * @param {object} p       - proyecto ERC-721 con is_active_phase2 = true
   * @param {number} tokenId - ID del NFT a quemar
   */
  async function redeem(p, tokenId){
    if(!p) return {ok:false, reason:'Proyecto no encontrado'};
    if(!p.isActivePhase2) return {ok:false, reason:'La Fase 2 de canje aún no está activa. Esperá la habilitación de TOKAI.'};
    try{
      const abiName = abis && abis['GATCertificate'] ? 'GATCertificate' : 'TOKAIToken';
      const c = await contract(p.token, abiName, true);
      const gasEst = await c.redeem.estimateGas(tokenId);
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      const tx = await c.redeem(tokenId);
      await tx.wait();
      logEv('Redeem', 'PRE-GAT #'+tokenId+' quemado · canje iniciado gas: '+Number(gasPOL).toFixed(5)+' POL');
      return {ok:true, hash:tx.hash, gasPOL};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }

  /**
   * Estima el gas en POL para cualquier función de contrato.
   * @returns { gasUnits: bigint, gasPOL: string, gasUSD: string }
   */
  async function estimateGas(contractAddr, abiName, fnName, args=[]){
    try{
      const c = await contract(contractAddr, abiName, false);
      const gasEst = await c[fnName].estimateGas(...args);
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      // POL ≈ $0.40 USD (hardcoded demo; en prod usar Chainlink POL/USD)
      const gasUSD = (Number(gasPOL) * 0.40).toFixed(4);
      return { gasUnits:gasEst, gasPOL, gasUSD };
    }catch(e){ return { gasUnits:0n, gasPOL:'0', gasUSD:'0' }; }
  }

  /**
   * Estrategia A — Despliega el token ERC-3643 vía TokenFactory desde MetaMask.
   * Llama a deployToken(name, symbol, maxSupply) y persiste token_address en el backend.
   * Auth via cookie HttpOnly (credentials: 'include').
   * @param {object} project  - proyecto con p.name, p.symbol, p.maxSupply, p.id
   * @returns {{ ok:boolean, tokenAddr?:string, complianceAddr?:string, hash?:string, reason?:string }}
   */
  async function deployToken(project) {
    if (!dep || !dep.tokenFactory) return { ok:false, reason:'TokenFactory no configurado. Contactá a TOKAI.' };
    try {
      const factory = await contract(dep.tokenFactory, 'TokenFactory', true);
      const signerAddr = await (await signer()).getAddress();
      // Firma correcta según estándar del proyecto
      const std = (project.tokenStandard || 'ERC-3643').toUpperCase();
      let tx;
      if (std === 'ERC-4626') {
        tx = await factory.deployERC4626(project.name, project.symbol, signerAddr);
      } else if (std === 'ERC-7540') {
        tx = await factory.deployERC7540(project.name, project.symbol, signerAddr);
      } else if (std === 'ERC-1155') {
        const uri = project.metadataUri || 'https://tokai.com.ar/metadata/{id}.json';
        tx = await factory.deployERC1155(uri, project.name, project.symbol, signerAddr);
      } else if (std === 'ERC-5192') {
        const baseURI = project.metadataUri || 'https://tokai.com.ar/nft/';
        const maxSupply = BigInt(project.maxSupply || 10000);
        tx = await factory.deployERC5192(project.name, project.symbol, maxSupply, baseURI, signerAddr);
      } else {
        // ERC-3643 por defecto
        const maxSupply = window.ethers.parseEther(String(project.maxSupply || 1000000));
        const priceUsdCents = BigInt(Math.round((project.priceUsd || 100) * 100));
        tx = await factory.deployERC3643(project.name, project.symbol, maxSupply, priceUsdCents, signerAddr);
      }
      const receipt = await tx.wait();

      // Parsear evento ProjectDeployed del receipt
      const iface = new window.ethers.Interface(abis['TokenFactory']);
      let tokenAddr = null, complianceAddr = null;
      for (const log of receipt.logs) {
        try {
          const parsed = iface.parseLog(log);
          if (parsed && parsed.name === 'ProjectDeployed') {
            tokenAddr      = parsed.args.token;
            complianceAddr = parsed.args.registry; // IdentityRegistry en ERC-3643
          }
        } catch {}
      }
      if (!tokenAddr) return { ok:false, reason:'Contrato desplegado pero no se pudo leer la dirección. Revisá el tx en Polygonscan.' };

      // F3 — Persistir en backend con validación de respuesta
      if (window.__API_URL__) {
        try {
          const patchRes = await fetch(`${window.__API_URL__}/projects/${project.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type':'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              tokenAddress: tokenAddr,
              tokenDeployed: true,
              tokenDeployTxHash: tx.hash,
              tokenFactoryAddress: dep.tokenFactory,
              tokenDeployEvent: 'ProjectDeployed',
              tokenDeployNetwork: dep.network || 'polygon',
              tokenDeployChainId: dep.chainId,
              tokenDeployBlockNumber: receipt.blockNumber,
              ronda: 6
            }),
          });
          if (!patchRes.ok) {
            // Token desplegado on-chain pero no persistido — reportar al usuario
            console.warn('[deployToken] Backend PATCH falló:', patchRes.status);
            return { ok:true, tokenAddr, complianceAddr, hash:tx.hash, gasPOL,
              warning: `Token desplegado en ${tokenAddr}, pero el estado no se guardó en la plataforma (HTTP ${patchRes.status}). Contactá a TOKAI.` };
          }
        } catch(patchErr) {
          console.warn('[deployToken] Backend PATCH error de red:', patchErr.message);
          return { ok:true, tokenAddr, complianceAddr, hash:tx.hash, gasPOL,
            warning: `Token desplegado en ${tokenAddr}, pero no se pudo actualizar la plataforma (sin conexión). Contactá a TOKAI con el hash: ${tx.hash}` };
        }
      }

      logEv('TokenDeployed', `${project.symbol} → ${tokenAddr} gas: ${Number(gasPOL).toFixed(5)} POL`);
      return { ok:true, tokenAddr, complianceAddr, hash:tx.hash, gasPOL };
    } catch(e) { return { ok:false, reason:parseRevert(e) }; }
  }

  return {
    identities, projects, balances:balancesCache, holders:{}, yieldPool:{}, orders:[], events, now:Math.floor(Date.now()/1000),
    registerIdentity:_registerIdentity, revokeIdentity, canTransfer,
    mint:_mint, transfer:_transfer, distributeYield:_distributeYield,
    enableEmission:_enableEmission, disableEmission:_disableEmission,
    pauseEmission:_pauseEmission, unpauseEmission:_unpauseEmission,
    claimableYield, claimYield, createOrder, fillOrder, cancelOrder, createProject, advanceTime,
    // v3.3.0 — ERC-721 / multi-standard
    addQualifiedInvestor, batchMint, redeem, estimateGas,
    // v3.5.0 — Estrategia A (deploy de token)
    deployToken,
    // F1 — updateProject en live: persiste en backend vía PATCH
    updateProject: async (id, fields) => {
      if (!window.__API_URL__) return { ok:false, reason:'Sin API URL' };
      try {
        const res = await fetch(`${window.__API_URL__}/projects/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type':'application/json' },
          credentials: 'include',
          body: JSON.stringify(fields),
        });
        if (!res.ok) return { ok:false, reason:`HTTP ${res.status}` };
        refresh();
        return { ok:true };
      } catch(e) { return { ok:false, reason:e.message }; }
    },
    deleteProject: async (id) => {
      if (!window.__API_URL__) return { ok:false, reason:'Sin API URL' };
      try {
        const res = await fetch(`${window.__API_URL__}/projects/${id}`, {
          method: 'DELETE',
          credentials: 'include',
        });
        if (!res.ok) return { ok:false, reason:`HTTP ${res.status}` };
        refresh();
        return { ok:true };
      } catch(e) { return { ok:false, reason:e.message }; }
    },
    bal:(pid,a)=> balancesCache[`${pid}:${a}`] || 0,
    balAsync: bal, refresh, live:true
  };
}

/* hook que anima la evaluación secuencial de checks */
function useGate(){
  const [state,setState]=useState({checks:[],running:false,verdict:null});
  function run(allChecks, onDone){
    setState({checks:allChecks.map(c=>({...c,pending:true})),running:true,verdict:null});
    let i=0;
    const tick=()=>{
      i++;
      if(i<=allChecks.length){
        setState(s=>({...s,checks:allChecks.map((c,idx)=>idx<i?{...c,pending:false}:{...c,pending:true})}));
        setTimeout(tick,360);
      } else {
        const verdict=allChecks.every(c=>c.pass);
        setState({checks:allChecks,running:false,verdict});
        onDone&&onDone(verdict);
      }
    };
    setTimeout(tick,360);
  }
  function reset(){setState({checks:[],running:false,verdict:null})}
  return {...state,run,reset};
}

/* ─── Helper global: descarga CSV client-side ─── */
function downloadCsv(filename, header, rows){
  var esc = function(v){ v = v==null?'':String(v); return /[",\n;]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  var csv = [header.map(esc).join(',')].concat(rows.map(function(r){ return r.map(esc).join(','); })).join('\r\n');
  var blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 2000);
}

/* ════════════════════════════════════════════════════════════════════
   InvestorOnboardingCard — KYC real + suscripción con fondeo offline
   Consume POST /kyc, GET /kyc/status y POST /invest del backend.
   Visible solo con API configurada y proyecto real (UUID).
   ════════════════════════════════════════════════════════════════════ */
function InvestorOnboardingCard({project, wallet, toast}){
  var API = window.__API_URL__ || '';
  var walletAddr = /^0x[0-9a-fA-F]{40}$/.test((wallet&&wallet.addr)||'') ? wallet.addr : null;
  var [email,setEmail] = useState('');
  var [kycStatus,setKycStatus] = useState(null); // null|none|pending|approved|rejected
  var [busy,setBusy] = useState(false);
  var [qty,setQty] = useState(10);
  var [method,setMethod] = useState('usdc_polygon');
  var [reference,setReference] = useState('');
  var [order,setOrder] = useState(null);
  var priceUsd = (project.priceUsdCents||0)/100;
  var emailOk = /^[^@]+@[^@]+\.[^@]+$/.test(email.trim());
  var selMethod = PAYMENT_METHODS.find(function(m){ return m.id===method; }) || PAYMENT_METHODS[0];

  function checkStatus(){
    if(!API||!emailOk) return;
    var url = API+'/kyc/status?email='+encodeURIComponent(email.trim().toLowerCase())+(walletAddr?'&wallet='+walletAddr:'');
    fetch(url).then(function(r){ return r.ok?r.json():Promise.reject(); })
      .then(function(d){ setKycStatus(d.status); })
      .catch(function(){});
  }
  function startKyc(){
    if(!API||!emailOk){ toast&&toast({type:'err',title:'Email requerido',msg:'Ingresá un email válido.'}); return; }
    setBusy(true);
    var body = { email: email.trim().toLowerCase() };
    if(walletAddr) body.wallet_address = walletAddr;
    fetch(API+'/kyc', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){ return r.ok?r.json():r.json().then(function(e){ return Promise.reject(e); }); })
      .then(function(d){ setKycStatus(d.status); toast&&toast({title:'Verificación iniciada',msg:d.message||'Solicitud registrada.'}); })
      .catch(function(e){ toast&&toast({type:'err',title:'Error',msg:(e&&e.error)||'No se pudo iniciar la verificación.'}); })
      .finally(function(){ setBusy(false); });
  }
  function subscribe(){
    if(!API||!emailOk){ toast&&toast({type:'err',title:'Email requerido',msg:'Ingresá un email válido.'}); return; }
    if(!(Number(qty)>0)){ toast&&toast({type:'err',title:'Cantidad inválida',msg:'Ingresá una cantidad mayor a cero.'}); return; }
    setBusy(true);
    var body = { projectId: project.id, email: email.trim().toLowerCase(), qty: Number(qty), method: method };
    if(walletAddr) body.wallet_address = walletAddr;
    if(reference.trim()) body.reference = reference.trim();
    fetch(API+'/invest', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){ return r.ok?r.json():r.json().then(function(e){ return Promise.reject(e); }); })
      .then(function(d){ setOrder(d); toast&&toast({title:'Orden registrada',msg:d.message||'TOKAI confirmará tu fondeo.'}); })
      .catch(function(e){ toast&&toast({type:'err',title:'Error',msg:(e&&e.error)||'No se pudo registrar la orden.'}); })
      .finally(function(){ setBusy(false); });
  }

  var inp = {width:'100%',padding:'9px 12px',borderRadius:8,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:12.5,boxSizing:'border-box'};
  var kycBadge = kycStatus==='approved' ? {t:'KYC APROBADO',bg:'rgba(0,214,126,.15)',c:'var(--emerald)'}
    : kycStatus==='pending' ? {t:'KYC EN REVISIÓN',bg:'rgba(255,178,62,.15)',c:'#FFB23E'}
    : kycStatus==='rejected' ? {t:'KYC RECHAZADO',bg:'rgba(255,92,92,.15)',c:'#FF5C5C'}
    : null;

  return h('div',{className:'card',style:{marginBottom:18,border:'1.5px solid rgba(0,214,126,.25)'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}},
      h('div',{},
        h('div',{style:{fontWeight:700,fontSize:14}},'Suscripción real · '+project.symbol),
        h('div',{style:{fontSize:11,color:'var(--txt-mute)'}},'Verificación KYC + fondeo offline (RG 1088). TOKAI confirma y habilita tu wallet en la whitelist on-chain.')),
      kycBadge&&h('span',{style:{padding:'3px 10px',borderRadius:9,fontSize:10,fontWeight:800,background:kycBadge.bg,color:kycBadge.c}},kycBadge.t)),
    order
      ? h('div',{style:{padding:'16px',borderRadius:10,background:'rgba(0,214,126,.06)',border:'1px solid rgba(0,214,126,.3)'}},
          h('div',{style:{fontWeight:700,fontSize:14,color:'var(--emerald)',marginBottom:6}},'✅ Orden '+order.id.slice(0,8)+'… registrada'),
          h('div',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.6,marginBottom:8}},
            'Total estimado: '+(order.amount_usd?'USD '+order.amount_usd:'a confirmar')+'. Ahora realizá el fondeo:'),
          selMethod.steps.map(function(s,i){ return h('div',{key:i,style:{fontSize:12,color:'var(--txt-dim)',marginBottom:4}},'  '+(i+1)+'. '+s); }),
          h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginTop:8}},'Cuando TOKAI acredite los fondos, tu wallet queda en la whitelist para recibir los tokens.'))
      : h('div',{},
          h('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:10}},
            h('div',{},
              h('label',{style:{fontSize:11,color:'var(--txt-mute)',display:'block',marginBottom:4}},'Tu email *'),
              h('input',{style:inp,type:'email',value:email,placeholder:'inversor@email.com',
                onChange:function(e){ setEmail(e.target.value); setKycStatus(null); },
                onBlur:checkStatus})),
            h('div',{},
              h('label',{style:{fontSize:11,color:'var(--txt-mute)',display:'block',marginBottom:4}},'Wallet'),
              h('div',{style:Object.assign({},inp,{color:walletAddr?'var(--emerald)':'var(--txt-mute)',fontFamily:'var(--mono)',fontSize:11,paddingTop:11})},
                walletAddr?short(walletAddr):'— conectá MetaMask —'))),
          (kycStatus===null||kycStatus==='none'||kycStatus==='rejected')&&h('button',{className:'btn btn-ghost btn-sm',style:{marginBottom:12},disabled:busy||!emailOk,onClick:startKyc},
            busy?'…':'① Iniciar verificación KYC'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}},
            h('div',{},
              h('label',{style:{fontSize:11,color:'var(--txt-mute)',display:'block',marginBottom:4}},'Cantidad de tokens'),
              h('input',{style:inp,type:'number',min:1,value:qty,onChange:function(e){ setQty(e.target.value); }})),
            h('div',{},
              h('label',{style:{fontSize:11,color:'var(--txt-mute)',display:'block',marginBottom:4}},'Método de fondeo'),
              h('select',{style:inp,value:method,onChange:function(e){ setMethod(e.target.value); }},
                PAYMENT_METHODS.map(function(m){ return h('option',{key:m.id,value:m.id},m.label); }))),
            h('div',{},
              h('label',{style:{fontSize:11,color:'var(--txt-mute)',display:'block',marginBottom:4}},'Total estimado'),
              h('div',{style:Object.assign({},inp,{fontWeight:700,color:'var(--emerald)'})},priceUsd?'USD '+fmt(priceUsd*Number(qty||0)):'—'))),
          h('div',{style:{marginBottom:12}},
            h('label',{style:{fontSize:11,color:'var(--txt-mute)',display:'block',marginBottom:4}},'Referencia / comprobante (opcional)'),
            h('input',{style:inp,value:reference,placeholder:'Hash de tx, ID de transferencia…',onChange:function(e){ setReference(e.target.value); }})),
          h('button',{className:'btn btn-primary',style:{width:'100%'},disabled:busy||!emailOk,onClick:subscribe},
            busy?'Enviando…':'② Registrar orden de suscripción →')));
}

function InvestView({chain,wallet,projectId,toast}){
  const userJur = (chain.identities[wallet.addr]?.jur) || wallet.jur;
  const isGeofenced = chain.blockedJurisdictions.includes(userJur);

  if (wallet.role !== 'admin' && isGeofenced) {
    return h('div', {style:{maxWidth:640, margin:'0 auto', paddingTop:40}},
      h('div', {className:'card', style:{borderColor:'var(--red)', background:'rgba(255, 92, 92, 0.03)', padding:'40px 32px', textAlign:'center', borderRadius:16}},
        h(Icon, {d:I.shield, style:{width:64, height:64, color:'var(--red)', marginBottom:20}}),
        h('h1', {style:{fontSize:22, fontWeight:800, color:'var(--red)', marginBottom:12}}, 'Acceso Restringido por Geofencing'),
        h('p', {style:{fontSize:14, lineHeight:1.6, color:'var(--txt)', marginBottom:24}},
          `Tu jurisdicción detectada (${JUR[userJur] || 'ISO '+userJur}) se encuentra actualmente restringida para la oferta y suscripción de este activo digital RWA.`
        ),
        h('div', {className:'card', style:{background:'var(--black)', padding:16, border:'1.5px dashed rgba(255, 92, 92, 0.2)', marginBottom:24, textAlign:'left'}},

            'De acuerdo con las regulaciones de la CNV argentina, la SEC de EE.UU. (Reg D) y normativas de prevención contra el lavado de dinero de GAFI, la oferta pública de este activo no está autorizada para inversores de tu región geográfica actual.'
          )
        ),
        h('div', {style:{display:'flex', gap:12, justifyContent:'center'}},
          h('a', {className:'btn btn-ghost', href:'#/dash'}, '← Volver al Portal'),
          h('button', {className:'btn btn-primary', style:{background:'var(--red)', border:'none'}, onClick:()=>{
            toast({
              title: 'Soporte Normativo',
              msg: 'Por consultas de acreditación internacional, ponete en contacto con compliance@tokai.com.'
            });
          }}, 'Contactar Compliance')
        )
      )
    );
  }

  const [pid,setPid]=useState(projectId!=null?projectId:(chain.projects[0]?chain.projects[0].id:0));
  const [step,setStep]=useState(0); // 0 select, 1 kyc, 2 fund, 3 buy, 4 done
  const [amount,setAmount]=useState(1);
  const gate=useGate();
  const p=chain.projects.find(x=>String(x.id)===String(pid))||chain.projects[0]||{symbol:'—',regime:'—',jurisdictions:[],priceUsdCents:0};
  const rpid=p.id;
  const id=chain.identities[wallet.addr];
  const verified=id&&id.verified;
  const myBal=chain.bal(rpid,wallet.addr);

  useEffect(()=>{ if(projectId!=null) setPid(projectId); },[projectId]);

  // determine current step from state, checking if projectId is explicitly passed
  useEffect(()=>{
    if (projectId != null) {
      setStep(verified ? (myBal > 0 ? 4 : 2) : 1);
    } else {
      setStep(verified ? (myBal > 0 ? 4 : 2) : 0);
    }
  },[verified, pid, projectId]);

  const steps=['Proyecto','Verificación KYC','Fondeo','Suscripción'];
  function doKyc(jur,cat){
    chain.registerIdentity(wallet.addr,jur,cat);
    toast({title:'KYC verificado',msg:`${JUR[jur]} · ${CAT[cat]} registrado en IdentityRegistry`,hash:txHash()});
    setStep(2);
  }
  function doBuy(){
    const checks=chain.canTransfer(rpid,null,wallet.addr,amount).checks;
    gate.run(checks,(ok)=>{
      if(ok){
        const r=chain.mint(rpid,wallet.addr,amount);
        if(r.ok){toast({title:'Suscripción exitosa',msg:`${amount} ${p.symbol} emitidos a tu wallet`,hash:txHash()});setStep(4);}
      } else {
        toast({type:'err',title:'Suscripción bloqueada',msg:'El contrato rechazó la operación por compliance'});

    window.__API_URL__&&p&&typeof p.id==='string'&&p.id.length===36&&h(InvestorOnboardingCard,{project:p,wallet,toast}),
    // stepper
    h('div',{className:'stepper'},steps.map((s,i)=>h('div',{key:i,className:'step '+(step>i?'done':step===i?'active':'')},
      h('div',{className:'step-bar'}),
      h('div',{className:'step-label'},h('span',{className:'step-num'},step>i?'✓':i+1),s)))),

    h('div',{className:'row'},
      h('div',{style:{flex:'1 1 60%'}},
        // STEP 0: select project
        step===0&&h('div',{className:'card'},
          h('h3',{style:{fontSize:15,fontWeight:700,marginBottom:14}},'Elegí un proyecto'),
          h('div',{className:'field'},h('label',{},'Proyecto'),
            h('select',{value:String(pid),onChange:e=>setPid(e.target.value)},
              chain.projects.map(x=>h('option',{key:x.id,value:String(x.id)},`${x.name} (${x.symbol})`)))),
          h('div',{style:{marginTop:8}},
            h('div',{className:'kv'},h('span',{className:'k'},'Régimen'),h('span',{className:'v'},p.regime)),
            h('div',{className:'kv'},h('span',{className:'k'},'Precio por token'),h('span',{className:'v'},p.priceUsdCents?fmtUsd(p.priceUsdCents):'—')),
            h('div',{className:'kv'},h('span',{className:'k'},'Jurisdicciones'),h('span',{className:'v'},p.jurisdictions.map(j=>JUR[j].split(' ')[0]).join(' '))),
            h('div',{className:'kv'},h('span',{className:'k'},'Transferibilidad'),h('span',{className:'v'},p.soulbound?'Soulbound':p.lockupDays?`Lock-up ${p.lockupDays}d`:'Libre (KYC)'))),

        ),
        // STEP 1: KYC — modo detectado automáticamente (PSAV / Emisor / Demo)
        step===1&&h('div',{},
          h(KycGate,{project:p, walletAddr:wallet.addr, chain, toast,
            onComplete:()=>setStep(2)})
        ),
        // STEP 2: Fund
        step===2&&h('div',{className:'card'},

        // STEP 3: Buy

            h('button',{className:'btn btn-primary btn-sm',onClick:()=>setStep(0)},'Otro proyecto'))
        ),
      ),
      // Right rail: live gate + position
      h('div',{style:{flex:'1 1 40%',display:'flex',flexDirection:'column',gap:16}},
        h(ComplianceGate,{checks:gate.checks,running:gate.running,verdict:gate.verdict,title:'Verificación on-chain'}),
        h('div',{className:'card'},
          h('div',{className:'gate-title',style:{marginBottom:14}},h(Icon,{d:I.wallet,style:{width:14,height:14}}),'Tu posición'),

function AdminMint({chain,toast}){
  const [pid,setPid]=useState(chain.projects[0]?chain.projects[0].id:0);
  const [target,setTarget]=useState(DEMO_WALLETS[1].addr);
  const [amount,setAmount]=useState(10);
  const gate=useGate();
  /* Comparación por String: los proyectos reales usan UUID, los demo id numérico */
  const p=chain.projects.find(x=>String(x.id)===String(pid))||chain.projects[0]||{symbol:'—',id:pid};
  const rpid=p.id;
  function ensureKyc(addr){ const w=DEMO_WALLETS.find(x=>x.addr===addr); if(w&&w.role!=='admin'&&!chain.identities[addr]) chain.registerIdentity(addr,w.jur,w.cat); }
  function mint(){
    const w=DEMO_WALLETS.find(x=>x.addr===target);
    // pre-register kyc if demo wallet has it (except the no-kyc one)
    if(w&&w.label.includes('sin KYC')){} else ensureKyc(target);
    const checks=chain.canTransfer(rpid,null,target,amount).checks;
    gate.run(checks,(ok)=>{
      if(ok){const r=chain.mint(rpid,target,amount);if(r.ok)toast({title:'Emisión ejecutada',msg:`${amount} ${p.symbol} → ${short(target)}`,hash:txHash()});}
      else toast({type:'err',title:'Emisión bloqueada',msg:'Compliance rechazó al destinatario'});
    });
  }
  return h('div',{className:'row'},
    h('div',{style:{flex:'1 1 55%'}},h('div',{className:'card'},
      h('h3',{style:{fontSize:15,fontWeight:700,marginBottom:14}},'Emisión primaria (mint)'),
      h('div',{className:'field'},h('label',{},'Proyecto'),h('select',{value:String(pid),onChange:e=>setPid(e.target.value)},chain.projects.map(x=>h('option',{key:x.id,value:String(x.id)},x.name)))),
      h('div',{className:'field'},h('label',{},'Wallet destino'),h('select',{value:target,onChange:e=>setTarget(e.target.value)},DEMO_WALLETS.filter(w=>w.role!=='admin').map(w=>h('option',{key:w.addr,value:w.addr},w.label)))),
      h('div',{className:'field'},h('label',{},'Cantidad'),h('input',{type:'number',min:1,value:amount,onChange:e=>setAmount(+e.target.value)})),
      h('button',{className:'btn btn-primary',style:{width:'100%'},disabled:gate.running,onClick:mint},gate.running?'Verificando…':'Emitir tokens'),
      h('p',{className:'muted',style:{fontSize:11.5,marginTop:12,lineHeight:1.5}},'Probá con "Inversor · EEUU" en un proyecto solo-ARG para ver el geo-blocking, o "Inversor sin KYC" para ver el rechazo por identidad.')
    )),
    h('div',{style:{flex:'1 1 45%'}},h(ComplianceGate,{checks:gate.checks,running:gate.running,verdict:gate.verdict,title:'Validación de emisión'}))
  );
}

    if(p.totalSupply===0){toast({type:'err',title:'Sin holders',msg:'No hay tokens emitidos en este proyecto'});return;}

    if(r.ok)toast({title:'Yield distribuido',msg:`USD ${fmt(amount)} repartidos pro-rata entre ${p.totalSupply} tokens`,hash:txHash()});

      yp&&h('div',{style:{marginTop:14}},h('div',{className:'kv'},h('span',{className:'k'},'Acumulado/token'),h('span',{className:'v',style:{color:'var(--emerald)'}},'USD '+fmt(yp.perToken))))

function MarketView({chain,wallet,toast,initialPid}){
  const initPid = initialPid!=null ? initialPid : (chain.projects[0]?chain.projects[0].id:0);
  const [pid,setPid]=useState(initPid);
  const [amount,setAmount]=useState(1);
  const [price,setPrice]=useState(3100);
  const gate=useGate();
  const p=chain.projects.find(x=>String(x.id)===String(pid))||chain.projects[0]||{soulbound:false,symbol:'—',id:0,jurisdictions:[]};
  const rpid=p.id;
  const myBal=chain.bal(rpid,wallet.addr);
  const openOrders=chain.orders.filter(o=>o.active&&o.pid===rpid);

  /* Historial simulado de transacciones ejecutadas */
  const [tradeHistory,setTradeHistory]=useState([
    {id:1,pid:0,buyer:'0xA1b2C3d4E5f6A1b2C3d4E5f6A1b2C3d4E5f6A1b2',seller:'0xB4c5D6e7F8a9B4c5D6e7F8a9B4c5D6e7F8a9B4c5',amount:10,price:3100,ts:Date.now()-86400000*3},
    {id:2,pid:0,buyer:'0xC7d8E9f0A1b2C7d8E9f0A1b2C7d8E9f0A1b2C7d8',seller:'0xD0e1F2a3B4c5D0e1F2a3B4c5D0e1F2a3B4c5D0e1',amount:5,price:3150,ts:Date.now()-86400000},
    {id:3,pid:1,buyer:'0xE3f4A5b6C7d8E3f4A5b6C7d8E3f4A5b6C7d8E3f4',seller:'0xF6a7B8c9D0e1F6a7B8c9D0e1F6a7B8c9D0e1F6a7',amount:2,price:450,ts:Date.now()-3600000*5},
  ]);
  const historial=tradeHistory.filter(t=>String(t.pid)===String(rpid));

  function create(){
    if(p.soulbound){toast({type:'err',title:'Token soulbound',msg:'Este proyecto no admite mercado secundario por diseño'});return;}
    const r=chain.createOrder(rpid,wallet.addr,amount,price);

    p.soulbound&&h('div',{className:'card',style:{borderColor:'rgba(255,178,62,.3)',marginBottom:16}},
      h('div',{style:{display:'flex',gap:11,alignItems:'center'}},h(Icon,{d:I.lock,style:{width:18,height:18,color:'var(--amber)'}}),
        h('div',{},h('b',{style:{color:'var(--amber)'}},'Token soulbound'),h('div',{className:'muted',style:{fontSize:12.5}},'Este proyecto está diseñado como ecosistema cerrado (Howey-safe). No tiene mercado secundario — los certificados son intransferibles.')))),
    !p.soulbound&&h('div',{className:'row'},
      /* Panel izquierdo: publicar + compliance gate */
      h('div',{style:{flex:'1 1 38%',display:'flex',flexDirection:'column',gap:16}},
        h('div',{className:'card'},
          h('h3',{style:{fontSize:14,fontWeight:700,marginBottom:14}},'Publicar orden de venta'),
          h('div',{className:'field'},h('label',{},'Cantidad ('+myBal+' disponibles)'),h('input',{type:'number',min:1,max:myBal,value:amount,onChange:e=>setAmount(+e.target.value)})),
          h('div',{className:'field'},h('label',{},'Precio por token (USD)'),h('input',{type:'number',value:price,onChange:e=>setPrice(+e.target.value)})),
          h('button',{className:'btn btn-primary',style:{width:'100%'},disabled:myBal<1,onClick:create},myBal<1?'No tenés tokens':'Publicar orden')),
        h(ComplianceGate,{checks:gate.checks,running:gate.running,verdict:gate.verdict,title:'Validación de la operación'})
      ),
      /* Panel derecho: order book + historial */
      h('div',{style:{flex:'1 1 62%',display:'flex',flexDirection:'column',gap:16}},
        h('div',{className:'card',style:{padding:0,overflowX:'auto'}},
          h('div',{style:{padding:'16px 20px',borderBottom:'1px solid var(--line-solid)',display:'flex',alignItems:'center',gap:10}},
            h('h3',{style:{fontSize:14,fontWeight:700,margin:0}},'Órdenes abiertas · '+p.symbol),
            openOrders.length>0&&h('span',{style:{fontSize:10,color:'var(--txt-mute)',padding:'2px 8px',borderRadius:10,background:'rgba(255,255,255,.04)'}},openOrders.length+' activas')),
          openOrders.length===0
            ?h('div',{className:'empty'},h(Icon,{d:I.market}),h('div',{},'No hay órdenes abiertas'),h('div',{style:{fontSize:12,marginTop:4}},'Publicá la primera desde el panel izquierdo'))
            :h('table',{},

              h('tbody',{},openOrders.map(o=>{

                const blocked=!ct.allowed&&!isOwn;

                return h('tr',{key:o.id},

/* ════════════════════════════════════════════════════════════════════
   AdminPitch — el emisor carga su contenido persuasivo
   Aparece en tab "Pitch ✦" del AdminView
   ════════════════════════════════════════════════════════════════════ */
function AdminPitch({chain, toast}){
  const projects = chain.projects||[];
  const [pid,setPid] = useState(0);
  const p = projects[pid]||projects[0]||{};

  // Estado del pitch (se guarda en el proyecto vía updateProject)
  const initPitch = ()=> p.pitch || {
    headline:'', porque:'', bullets:['','',''],
    videoUrl:'', docs:[], scenarios:null
  };
  const [f,setF] = useState(initPitch);
  const upd = (k,v) => setF(s=>({...s,[k]:v}));

  // Cambio de proyecto
  function syncPid(i){ setPid(i); setF(projects[i]?.pitch||{headline:'',porque:'',bullets:['','',''],videoUrl:'',docs:[],scenarios:null}); }

  function addBullet(){ upd('bullets',[...f.bullets,'']); }
  function setBullet(i,v){ const b=[...f.bullets]; b[i]=v; upd('bullets',b); }
  function delBullet(i){ upd('bullets',f.bullets.filter((_,j)=>j!==i)); }

  // Documentos
  function addDoc(name,tipo,url){ upd('docs',[...f.docs,{name,tipo,url,id:Date.now()}]); }
  function delDoc(id){ upd('docs',f.docs.filter(d=>d.id!==id)); }

  function readDocFile(file){
    const reader=new FileReader();
    reader.onload=()=>addDoc(file.name, file.type.includes('pdf')?'pdf':'imagen', reader.result);
    reader.readAsDataURL(file);
  }

  function save(){
    if(chain.updateProject) chain.updateProject(pid,{pitch:{...f}});
    toast&&toast({title:'Pitch guardado',msg:'Los inversores verán este contenido en la ficha del proyecto.'});
  }

  const fs = {width:'100%',padding:'9px 12px',borderRadius:9,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:13,boxSizing:'border-box',fontFamily:'inherit'};

    h('div',{className:'eyebrow'},'Contenido para inversores'),
    h('h1',{className:'page'},'Pitch del proyecto'),
    h('p',{className:'page-sub'},'Este contenido aparece en la ficha del proyecto cuando el inversor hace click en el CTA del widget. Es tu espacio para convencer. TOKAI no edita esto — es tu voz como emisor.'),

    // selector de proyecto
    projects.length>1 && h('div',{style:{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}},
      projects.map((pr,i)=>h('button',{key:i,onClick:()=>syncPid(i),
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,
          border:'1.5px solid '+(i===pid?'var(--emerald)':'var(--line-solid)'),
          background:i===pid?'rgba(0,214,126,.08)':'var(--panel)',
          color:i===pid?'var(--emerald)':'var(--txt)'}},pr.name))),

    h('div',{style:{display:'grid',gap:14}},

      // 1. Headline
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'① Título del pitch'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:8}},'Una frase que resume por qué vale la pena invertir. Máximo 80 caracteres.'),
        h('input',{value:f.headline,maxLength:80,placeholder:'Ej.: El primer complejo tokenizado del corredor productivo de Mendoza',style:fs,onChange:e=>upd('headline',e.target.value)}),
        h('div',{style:{fontSize:10,color:'var(--txt-mute)',textAlign:'right',marginTop:4}},(f.headline||'').length+'/80')),

      // 2. Por qué invertir
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'② Por qué invertir'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:8}},'Describí el activo, el contexto, la oportunidad y los diferenciales. Máximo 1.500 caracteres.'),
        h('textarea',{value:f.porque,rows:6,maxLength:1500,placeholder:'Ej.: El complejo Grand Alyson se encuentra en la intersección de Ruta Nacional 7 y Acceso Este, el corredor de mayor crecimiento inmobiliario de Mendoza...',style:{...fs,resize:'vertical'},onChange:e=>upd('porque',e.target.value)}),
        h('div',{style:{fontSize:10,color:'var(--txt-mute)',textAlign:'right',marginTop:4}},(f.porque||'').length+'/1500')),

      // 3. Puntos clave
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'③ Puntos clave'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:12}},'De 3 a 6 razones concretas para invertir. Frases cortas, datos si tenés.'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:7}},
          f.bullets.map((b,i)=>h('div',{key:i,style:{display:'flex',gap:7,alignItems:'center'}},

            f.bullets.length>3&&h('button',{onClick:()=>delBullet(i),style:{background:'none',border:'none',color:'#FF5C5C',cursor:'pointer',fontSize:16,flexShrink:0}},'×')))),

      // 5. Documentos
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'⑤ Documentos para inversores'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:12}},'Subí documentos clave: term sheet, memoria descriptiva, renders, contratos. PDF o imagen.'),
        f.docs.length>0&&h('div',{style:{display:'flex',flexDirection:'column',gap:6,marginBottom:12}},
          f.docs.map(doc=>h('div',{key:doc.id,style:{display:'flex',gap:10,alignItems:'center',padding:'8px 12px',borderRadius:9,background:'rgba(255,255,255,.03)',border:'1px solid var(--line-solid)'}},
            h('span',{style:{fontSize:18}},(DOC_ICONS[doc.tipo]||DOC_ICONS.otro)),
            h('span',{style:{fontSize:12.5,flex:1,color:'var(--txt-dim)'}},(doc.name||doc.tipo)),
            h('button',{onClick:()=>delDoc(doc.id),style:{background:'none',border:'none',color:'#FF5C5C',cursor:'pointer',fontSize:13,flexShrink:0}},'× Quitar')))),
        h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
          h('label',{style:{padding:'8px 14px',borderRadius:9,border:'1px dashed var(--line-solid)',cursor:'pointer',fontSize:12,color:'var(--txt-mute)',display:'flex',gap:6,alignItems:'center'}},
            '📎 Subir documento',
            h('input',{type:'file',accept:'.pdf,image/*',multiple:true,style:{display:'none'},onChange:e=>[...e.target.files].forEach(f2=>readDocFile(f2))})),
          h('button',{onClick:()=>{ const url=prompt('URL del documento (PDF público):'); if(url) addDoc('Documento externo','otro',url); },style:{padding:'8px 14px',borderRadius:9,border:'1px dashed var(--line-solid)',background:'none',cursor:'pointer',fontSize:12,color:'var(--txt-mute)'}},

      // guardar
      h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        h('button',{className:'btn btn-primary',onClick:save},'Guardar pitch'),
        h('div',{style:{fontSize:12,color:'var(--txt-mute)'}},'Visible para inversores en la ficha del proyecto.'))
    )
  );
}

        ),

          h('h4', {style:{fontSize:13, fontWeight:700, color:'var(--red)', marginBottom:6}}, 'Cumplimiento Normativo (Compliance Gate)'),

  const profile = profiles.find(x=>x.key===profileKey) || profiles[0] || null;

  const rentaPeriodo = p.payoutFreq==='Mensual'?rentaAnual/12:p.payoutFreq==='Trimestral'?rentaAnual/4:rentaAnual;
  const plusvalia = invertido*(effPlus/100);
  const totalRetorno = rentaAnual*(p.termMonths/12)+plusvalia;
  const roiTotal = invertido>0?(totalRetorno/invertido*100):0;
  const pct = p.maxSupply?Math.min(100,Math.round(p.totalSupply/p.maxSupply*100)):0;
  const MECH = {A:{t:'Distribución periódica (push de yield)',d:'El emisor cobra el flujo, lo convierte a USDC y lo reparte pro-rata. Reclamás con claimYield().'},
