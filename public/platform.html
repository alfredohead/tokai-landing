/* ════════════════════════════════════════════════════════════════════
   MOTOR DE CADENA SIMULADO — refleja exactamente IdentityRegistry +
   ModularCompliance + TOKAIToken (verificado contra 9 tests EVM).
   ════════════════════════════════════════════════════════════════════ */
function useChain(opts){
  const [identities, setIdentities] = useState({});       // addr -> {verified,jur,cat,verifiedAt,hash}
  const [projects, setProjects] = useState(INITIAL_PROJECTS);
  const [balances, setBalances] = useState({});           // `${pid}:${addr}` -> amount
  const [holders, setHolders] = useState({});             // pid -> Set(addr)
  const [firstAcq, setFirstAcq] = useState({});           // `${pid}:${addr}` -> ts
  const [yieldPool, setYieldPool] = useState({});         // pid -> {perToken, claimed:{addr:n}}
  const [orders, setOrders] = useState([]);               // {id,pid,seller,amount,price,active}
  const [events, setEvents] = useState([]);               // event log
  const [now, setNow] = useState(Date.now());
  const [blockedJurisdictions, setBlockedJurisdictions] = useState([840]); // EE.UU. (840) por defecto
  
  /* ── Carga proyectos del backend al iniciar sesión ── */
  function syncProjects(){
    if(!opts || !opts.apiUrl || !opts.loggedIn) return;
    fetch(opts.apiUrl + '/api/v1/projects', { credentials: 'include' })
    .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
    .then(function(data){
      if(Array.isArray(data.projects) && data.projects.length > 0){
        var mapped = data.projects.map(mapBackendProject);
        setProjects(mapped);
      }
    })
    .catch(function(){}); // silencioso — mantiene INITIAL_PROJECTS como fallback
  }
  useEffect(function(){
    syncProjects();
  }, [opts && opts.loggedIn]);

  /* ── Retry automático si el backend estaba caído al cargar ── */
  useEffect(function(){
    if(!opts || !opts.apiUrl || !opts.loggedIn) return;
    // Si projects sigue siendo los INITIAL (id numérico), reintenta cada 30s
    var timer = setInterval(function(){
      var hasRealProjects = projects.some(function(p){ return typeof p.id === 'string' && p.id.length === 36; });
      if(hasRealProjects){ clearInterval(timer); return; }
      syncProjects();
    }, 30000);
    return function(){ clearInterval(timer); };
  }, [opts && opts.loggedIn]);

  function toggleJurisdictionBlock(jurCode){
    setBlockedJurisdictions(s => s.includes(jurCode) ? s.filter(c => c !== jurCode) : [...s, jurCode]);
    log('GeofencingUpdate', `Jurisdicción ${JUR[jurCode]} ${blockedJurisdictions.includes(jurCode) ? 'HABILITADA' : 'RESTRINGIDA'}`);
  }

  const log = (ev, detail) => setEvents(e=>[{ev,detail,t:Date.now(),hash:txHash()},...e].slice(0,200));

  /* ── IdentityRegistry.registerIdentity ── */
  function registerIdentity(addr, jur, cat){
    setIdentities(s=>({...s,[addr]:{verified:true,jur,cat,verifiedAt:Date.now(),hash:txHash().slice(0,18)}}));
    log('IdentityRegistered', `${short(addr)} · ${JUR[jur]} · ${CAT[cat]}`);
  }
  function revokeIdentity(addr){
    setIdentities(s=>({...s,[addr]:{...s[addr],verified:false}}));
    log('IdentityRevoked', short(addr));
  }

  /* ── ModularCompliance.canTransfer — lógica idéntica al contrato ── */
  function canTransfer(pid, from, to, amount){
    const p = projects.find(x=>x.id===pid);
    const checks = [];
    // destino KYC
    const idTo = identities[to];
    checks.push({rule:'KYC del destinatario', detail:'IdentityRegistry.isVerified(to)', pass:!!(idTo&&idTo.verified)});
    // Geofencing global TOKAI (Gobernanza)
    const geofenceOk = !idTo || !blockedJurisdictions.includes(idTo.jur);
    checks.push({rule:'Cumplimiento Geofencing TOKAI', detail:idTo?`${JUR[idTo.jur]} ${geofenceOk?'autorizado':'bloqueado por geofence'}`:'sin identidad', pass:geofenceOk});
    // geo-blocking
    const jurOk = idTo && idTo.verified && p.jurisdictions.includes(idTo.jur);
    checks.push({rule:'Jurisdicción habilitada', detail:idTo&&idTo.verified?`${JUR[idTo.jur]} ${jurOk?'∈':'∉'} allowlist`:'sin identidad', pass:!!jurOk});
    if(from){ // transferencia secundaria
      checks.push({rule:'No es soulbound', detail:p.soulbound?'token intransferible':'transferible', pass:!p.soulbound});
      const idFrom = identities[from];
      checks.push({rule:'KYC del origen', detail:'IdentityRegistry.isVerified(from)', pass:!!(idFrom&&idFrom.verified)});
      if(p.lockupDays>0){
        const acq = firstAcq[`${pid}:${from}`]||0;
        const elapsed = (now-acq)/(86400000);
        const lockOk = acq>0 && elapsed>=p.lockupDays;
        checks.push({rule:`Lock-up cumplido (${p.lockupDays}d)`, detail:acq?`${Math.floor(elapsed)}d / ${p.lockupDays}d`:'sin adquisición', pass:lockOk});
      }
    }
    if(p.maxHolders>0){
      const hs = holders[pid]||new Set();
      const isNew = !hs.has(to);
      const ok = !isNew || hs.size < p.maxHolders;
      checks.push({rule:`Tope de holders (${p.maxHolders})`, detail:`${hs.size}/${p.maxHolders} holders`, pass:ok});
    }
    const allPass = checks.every(c=>c.pass);
    const reason = checks.find(c=>!c.pass);
    return {allowed:allPass, checks, reason:reason?reason.rule:null};
  }

  /* ── TOKAIToken.mint ── */
  function mint(pid, to, amount){
    const v = canTransfer(pid, null, to, amount);
    if(!v.allowed) return {ok:false, reason:v.reason, checks:v.checks};
    setBalances(b=>({...b,[`${pid}:${to}`]:(b[`${pid}:${to}`]||0)+amount}));
    setHolders(hh=>{ const s=new Set(hh[pid]||[]); s.add(to); return {...hh,[pid]:s}; });
    setFirstAcq(fa=>{ const k=`${pid}:${to}`; return fa[k]?fa:{...fa,[k]:Date.now()}; });
    setProjects(ps=>ps.map(p=>p.id===pid?{...p,totalSupply:p.totalSupply+amount,raised:p.raised+amount*(p.priceUsdCents/100)}:p));
    const p = projects.find(x=>x.id===pid);
    log('Mint', `${amount} ${p.symbol} → ${short(to)}`);
    return {ok:true, checks:v.checks};
  }

  /* ── TOKAIToken.transfer (secundario directo) ── */
  function transfer(pid, from, to, amount){
    const v = canTransfer(pid, from, to, amount);
    if(!v.allowed) return {ok:false, reason:v.reason, checks:v.checks};
    if((balances[`${pid}:${from}`]||0)<amount) return {ok:false, reason:'Saldo insuficiente', checks:v.checks};
    setBalances(b=>({...b,[`${pid}:${from}`]:b[`${pid}:${from}`]-amount,[`${pid}:${to}`]:(b[`${pid}:${to}`]||0)+amount}));
    setHolders(hh=>{ const s=new Set(hh[pid]||[]); s.add(to); if((balances[`${pid}:${from}`]||0)-amount<=0) s.delete(from); return {...hh,[pid]:s}; });
    setFirstAcq(fa=>{ const k=`${pid}:${to}`; return fa[k]?fa:{...fa,[k]:Date.now()}; });
    const p = projects.find(x=>x.id===pid);
    log('Transfer', `${amount} ${p.symbol}: ${short(from)} → ${short(to)}`);
    return {ok:true, checks:v.checks};
  }

  /* ── distributeYield ── */
  function distributeYield(pid, totalUsd){
    const p = projects.find(x=>x.id===pid);
    if(p.totalSupply===0) return {ok:false,reason:'Sin holders'};
    setYieldPool(y=>{ const cur=y[pid]||{perToken:0,claimed:{},history:[]}; return {...y,[pid]:{...cur,perToken:cur.perToken+totalUsd/p.totalSupply,history:[{t:Date.now(),total:totalUsd,perToken:totalUsd/p.totalSupply},...(cur.history||[])]}}; });
    log('YieldDistributed', `USD ${fmt(totalUsd)} · ${p.symbol} (${fmt(totalUsd/p.totalSupply)}/token)`);
    return {ok:true};
  }
  function claimableYield(pid, addr){
    const yp = yieldPool[pid]; if(!yp) return 0;
    const bal = balances[`${pid}:${addr}`]||0;
    const claimed = yp.claimed[addr]||0;
    return bal*yp.perToken - claimed;
  }
  function claimYield(pid, addr){
    const amt = claimableYield(pid,addr);
    if(amt<=0) return {ok:false,reason:'Nada para reclamar'};
    setYieldPool(y=>{ const yp=y[pid]; return {...y,[pid]:{...yp,claimed:{...yp.claimed,[addr]:(yp.claimed[addr]||0)+amt}}}; });
    const p=projects.find(x=>x.id===pid);
    log('YieldClaimed', `USD ${fmt(amt)} · ${p.symbol} → ${short(addr)}`);
    return {ok:true, amount:amt};
  }

  /* ── Mercado secundario permisionado ── */
  function createOrder(pid, seller, amount, priceUsd){
    if((balances[`${pid}:${seller}`]||0)<amount) return {ok:false,reason:'Saldo insuficiente'};
    const id = orders.length;
    setOrders(o=>[...o,{id,pid,seller,amount,price:priceUsd,active:true,t:Date.now()}]);
    const p=projects.find(x=>x.id===pid);
    log('OrderCreated', `#${id} · ${amount} ${p.symbol} @ USD ${fmt(priceUsd)}`);
    return {ok:true};
  }
  function fillOrder(orderId, buyer){
    const o = orders.find(x=>x.id===orderId);
    if(!o||!o.active) return {ok:false,reason:'Orden inactiva'};
    if(o.seller===buyer) return {ok:false,reason:'No podés comprar tu propia orden'};
    const v = canTransfer(o.pid, o.seller, buyer, o.amount);
    if(!v.allowed) return {ok:false, reason:v.reason, checks:v.checks};
    setBalances(b=>({...b,[`${o.pid}:${o.seller}`]:b[`${o.pid}:${o.seller}`]-o.amount,[`${o.pid}:${buyer}`]:(b[`${o.pid}:${buyer}`]||0)+o.amount}));
    setHolders(hh=>{ const s=new Set(hh[o.pid]||[]); s.add(buyer); return {...hh,[o.pid]:s}; });
    setFirstAcq(fa=>{ const k=`${o.pid}:${buyer}`; return fa[k]?fa:{...fa,[k]:Date.now()}; });
    setOrders(os=>os.map(x=>x.id===orderId?{...x,active:false}:x));
    const p=projects.find(x=>x.id===o.pid);
    log('OrderFilled', `#${orderId} · ${o.amount} ${p.symbol} → ${short(buyer)}`);
    return {ok:true, checks:v.checks};
  }
  function cancelOrder(orderId, who){
    const o=orders.find(x=>x.id===orderId);
    if(!o||o.seller!==who) return {ok:false,reason:'No sos el vendedor'};
    setOrders(os=>os.map(x=>x.id===orderId?{...x,active:false}:x));
    log('OrderCancelled', `#${orderId}`);
    return {ok:true};
  }

  async function createProject(cfg){
    // actualización optimista inmediata
    const id = projects.length;
    const p = {id,...cfg,token:genAddr(cfg.symbol+id),compliance:genAddr(cfg.symbol+'c'+id),totalSupply:0,raised:0,
      banner:`linear-gradient(135deg,${cfg.color||'#1a4d8f'}33,${cfg.color||'#1a4d8f'})`};
    setProjects(ps=>[...ps,p]);
    log('ProjectCreated', `${cfg.name} (${cfg.symbol})`);

    // persistir en backend si hay sesión
    if(opts && opts.jwt && opts.apiUrl){
      try{
        const res = await fetch(opts.apiUrl + '/api/v1/projects', {
          method: 'POST',
          credentials: 'include',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            name: cfg.name, symbol: cfg.symbol, vertical: cfg.vertical,
            regime: cfg.regime || 'RG 1088', maxSupply: cfg.supplyMax || cfg.maxSupply || 0,
            priceUsdCents: cfg.priceUsd ? Math.round(cfg.priceUsd * 100) : (cfg.priceUsdCents || 0),
            assetType: cfg.assetType, yieldMechanism: cfg.yieldMechanism,
            yieldAnnualPct: cfg.yieldAnnualPct || 0, valuationUsd: cfg.valuationUsd || 0,
            description: cfg.desc || '', isSoulbound: cfg.soulbound || false,
            lockupDays: cfg.lockupDays || 0, maxHolders: cfg.maxHolders || 0,
            jurisdictions: cfg.jurisdictions || [32], color: cfg.color || '#1a4d8f',
          })
        });
        if(res.ok){
          const data = await res.json();
          // reemplazar el item optimista con el del backend (tiene UUID real)
          setProjects(ps => ps.map(x => x.id === id ? {...mapBackendProject(data.project), totalSupply:0, raised:0} : x));
        }
      } catch(e){ /* mantiene el estado optimista */ }
    }
    return id;
  }

  async function updateProject(id, patch){
    setProjects(ps=>ps.map(p=>p.id===id?{...p,...patch}:p));
    log('ProjectUpdated', `Proyecto ${id} actualizado`);
    if(opts && opts.jwt && opts.apiUrl){
      try{
        await fetch(opts.apiUrl + '/api/v1/projects/' + id, {
          method: 'PATCH',
          credentials: 'include',
        headers: {'Content-Type':'application/json'},
          body: JSON.stringify(patch)
        });
      } catch(e){}
    }
  }

  // Gate de gobernanza de emisión (demo — refleja lógica del contrato)
  function enableEmission(pid, serieId=0){
    setProjects(ps=>ps.map(p=>p.id===pid?{...p,emissionEnabled:{...(p.emissionEnabled||{}),[serieId]:true},emissionPaused:false}:p));
    log('EmissionEnabled',`pid ${pid} serie ${serieId}`);
    return {ok:true};
  }
  function disableEmission(pid, serieId=0){
    setProjects(ps=>ps.map(p=>p.id===pid?{...p,emissionEnabled:{...(p.emissionEnabled||{}),[serieId]:false}}:p));
    log('EmissionDisabled',`pid ${pid} serie ${serieId}`);
    return {ok:true};
  }
  function pauseEmission(pid, reason=''){
    setProjects(ps=>ps.map(p=>p.id===pid?{...p,emissionPaused:true,emissionPauseReason:reason}:p));
    log('EmissionPaused',`pid ${pid}: ${reason}`);
    return {ok:true};
  }
  function unpauseEmission(pid){
    setProjects(ps=>ps.map(p=>p.id===pid?{...p,emissionPaused:false,emissionPauseReason:''}:p));
    log('EmissionUnpaused',`pid ${pid}`);
    return {ok:true};
  }

  /* time-travel para demostrar lock-up */
  function advanceTime(days){ setNow(n=>n+days*86400000); log('TimeAdvanced', `+${days} días (solo demo)`); }

  return {identities,projects,balances,holders,yieldPool,orders,events,now,blockedJurisdictions,toggleJurisdictionBlock,
    registerIdentity,revokeIdentity,canTransfer,mint,transfer,distributeYield,
    claimableYield,claimYield,createOrder,fillOrder,cancelOrder,createProject,updateProject,
    enableEmission,disableEmission,pauseEmission,unpauseEmission,advanceTime,
    bal:(pid,a)=>balances[`${pid}:${a}`]||0};
}

// Red activa: se lee desde el deployment inyectado, default = Amoy
function getActiveNetwork() {
  const dep = (typeof window !== 'undefined') ? window.__DEPLOYMENT__ : null;
  const chainId = dep && dep.chainId ? dep.chainId : 80002;
  return NETWORKS[chainId] || NETWORKS[80002];
}

// Compatibilidad: AMOY sigue funcionando como alias
const AMOY = NETWORKS[80002];

/* Detecta si el entorno puede operar en vivo (MetaMask + ethers + deployment) */
function web3Available(){
  return typeof window !== 'undefined' && !!window.ethereum && !!window.ethers && !!window.__DEPLOYMENT__;
}

/* Hook de conexión Web3. Devuelve estado de wallet y helpers. */
function useWeb3(){
  const [account,setAccount] = useState(null);
  const [chainOk,setChainOk] = useState(false);
  const [connecting,setConnecting] = useState(false);
  const [error,setError] = useState(null);

  async function connect(){
    if(!window.ethereum){ setError('No se detectó MetaMask. Instalalo para operar en vivo.'); return false; }
    setConnecting(true); setError(null);
    try{
      const accs = await window.ethereum.request({ method:'eth_requestAccounts' });
      setAccount(accs[0]);
      // verificar red
      const cid = await window.ethereum.request({ method:'eth_chainId' });
      if(cid !== getActiveNetwork().chainIdHex){
        try{
          await window.ethereum.request({ method:'wallet_switchEthereumChain', params:[{chainId:getActiveNetwork().chainIdHex}] });
        }catch(switchErr){
          if(switchErr.code === 4902){
            await window.ethereum.request({ method:'wallet_addEthereumChain', params:[getActiveNetwork().params] });
          } else throw switchErr;
        }
      }
      setChainOk(true);
      return true;
    }catch(e){ setError(e.message || 'Error de conexión'); return false; }
    finally{ setConnecting(false); }
  }

  useEffect(()=>{
    if(!window.ethereum) return;
    const onAcc = (accs)=> setAccount(accs[0]||null);
    const onChain = (cid)=> setChainOk(cid===getActiveNetwork().chainIdHex);
    window.ethereum.on && window.ethereum.on('accountsChanged', onAcc);
    window.ethereum.on && window.ethereum.on('chainChanged', onChain);
    return ()=>{ if(window.ethereum.removeListener){ window.ethereum.removeListener('accountsChanged',onAcc); window.ethereum.removeListener('chainChanged',onChain); } };
  },[]);

  async function switchNetwork(){
    if(!window.ethereum) return false;
    const net = getActiveNetwork();
    try{
      await window.ethereum.request({ method:'wallet_switchEthereumChain', params:[{chainId:net.chainIdHex}] });
      setChainOk(true); return true;
    }catch(e){
      if(e.code===4902){
        try{
          await window.ethereum.request({ method:'wallet_addEthereumChain', params:[net.params] });
          setChainOk(true); return true;
        }catch(_){ return false; }
      }
      return false;
    }
  }

  return { account, chainOk, connecting, error, connect, switchNetwork, available: !!(window.ethereum) };
}

/* ─── Capa de contratos en vivo (ethers v6) ───
   Implementa la MISMA interfaz que useChain() pero contra contratos reales.
   Se usa solo cuando web3Available() === true.                              */
function useChainWeb3(account){
  const dep = window.__DEPLOYMENT__;
  const abis = window.__ABIS__;
  const [projects,setProjects] = useState([]);
  const [tick,setTick] = useState(0);
  const refresh = ()=> setTick(t=>t+1);

  function provider(){ return new window.ethers.BrowserProvider(window.ethereum); }
  async function signer(){ return await provider().getSigner(); }
  async function contract(addr, abiName, withSigner){
    const p = provider();
    const c = new window.ethers.Contract(addr, abis[abiName], withSigner ? await p.getSigner() : p);
    return c;
  }

  // cargar proyectos desde la factory
  const [balancesCache,setBalancesCache] = useState({});
  useEffect(()=>{ (async()=>{
    if(!dep) return;
    try{
      const factory = await contract(dep.tokenFactory, 'TokenFactory', false);
      const n = Number(await factory.projectCount());
      
      // Cargar todos los proyectos y sus datos en paralelo
      const projectPromises = Array.from({ length: n }, async (_, i) => {
        try {
          const pr = await factory.projects(i);
          const tok = await contract(pr.token, 'TOKAIToken', false);
          
          const [symbol, totalSupply, maxSupply, priceUsdCents, balance] = await Promise.all([
            tok.symbol().catch(() => 'TOK'),
            tok.totalSupply().then(Number).catch(() => 0),
            tok.maxSupply().then(Number).catch(() => 0),
            tok.priceUsdCents().then(Number).catch(() => 0),
            account ? tok.balanceOf(account).then(Number).catch(() => 0) : Promise.resolve(0)
          ]);

          return {
            id: i,
            name: pr.name,
            token: pr.token,
            compliance: pr.compliance,
            symbol,
            totalSupply,
            maxSupply,
            priceUsdCents,
            balance
          };
        } catch (itemErr) {
          console.error(`Error cargando proyecto en indice ${i}:`, itemErr);
          return null;
        }
      });

      const ps = (await Promise.all(projectPromises)).filter(Boolean);
      const bcache = {};
      ps.forEach(p => {

  async function registerIdentity(addr, jur, cat){

  async function mint(pid, to, amount, serieId=0){

  function parseRevert(e){
    // intenta extraer el motivo de compliance (TransferNotCompliant(reason))
    const m = (e.reason || e.shortMessage || e.message || '').match(/TransferNotCompliant\("?([^")]+)"?\)/);
    return m ? m[1] : (e.shortMessage || 'Transacción revertida');
  }

  // wrappers que registran eventos locales para la trazabilidad de la UI
  async function _registerIdentity(addr,jur,cat){

  // ── v3.3.0 — ERC-721 GATCertificate functions ──────────────────────────────

  /**
   * Agrega un inversor a la whitelist on-chain del contrato ERC-3643/ERC-721.
   * Debe ser llamada desde la wallet compliance_address autorizada en el contrato.
   * @param {object} p    - proyecto (con p.compliance para ERC-3643 o p.token para ERC-721)
   * @param {string} addr - dirección del inversor a habilitar
   */
  async function addQualifiedInvestor(p, addr){
    if(!p || !p.tokenStandard) return {ok:false, reason:'Proyecto sin estándar definido'};
    try{
      if(p.tokenStandard === 'ERC-721'){
        // GATCertificate: addQualifiedInvestor(address)
        const abiName = abis && abis['GATCertificate'] ? 'GATCertificate' : 'TOKAIToken';
        const c = await contract(p.token, abiName, true);
        const gasEst = await c.addQualifiedInvestor.estimateGas(addr);
        const { gasPrice } = await provider().getFeeData();
        const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
        const tx = await c.addQualifiedInvestor(addr);
        await tx.wait();
        logEv('QualifiedInvestorAdded', short(addr)+' (ERC-721) gas: '+Number(gasPOL).toFixed(5)+' POL');
        return {ok:true, hash:tx.hash, gasPOL};
      } else {
        // ERC-3643: el Identity Registry gestiona la identidad
        const r = await _registerIdentity(addr, 32, 2);
        return r;
      }
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }

  /**
   * Mint múltiple ERC-721 (batchMint) desde la wallet operator_address.
   * @param {object} p        - proyecto ERC-721
   * @param {string} to       - destinatario
   * @param {number} quantity - cantidad de NFTs
   */
  async function batchMint(p, to, quantity){
    if(!p) return {ok:false, reason:'Proyecto no encontrado'};
    try{
      const abiName = abis && abis['GATCertificate'] ? 'GATCertificate' : 'TOKAIToken';
      const c = await contract(p.token, abiName, true);
      const gasEst = await c.batchMint.estimateGas(to, quantity);
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      const tx = await c.batchMint(to, quantity);
      await tx.wait();
      logEv('BatchMint', quantity+' NFTs → '+short(to)+' gas: '+Number(gasPOL).toFixed(5)+' POL');
      return {ok:true, hash:tx.hash, gasPOL};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }

  /**
   * Canje (Fase 2): el holder quema su PRE-GAT (ERC-721) para reclamar GAT definitivo.
   * @param {object} p       - proyecto ERC-721 con is_active_phase2 = true
   * @param {number} tokenId - ID del NFT a quemar
   */
  async function redeem(p, tokenId){
    if(!p) return {ok:false, reason:'Proyecto no encontrado'};
    if(!p.isActivePhase2) return {ok:false, reason:'La Fase 2 de canje aún no está activa. Esperá la habilitación de TOKAI.'};
    try{
      const abiName = abis && abis['GATCertificate'] ? 'GATCertificate' : 'TOKAIToken';
      const c = await contract(p.token, abiName, true);
      const gasEst = await c.redeem.estimateGas(tokenId);
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      const tx = await c.redeem(tokenId);
      await tx.wait();
      logEv('Redeem', 'PRE-GAT #'+tokenId+' quemado · canje iniciado gas: '+Number(gasPOL).toFixed(5)+' POL');
      return {ok:true, hash:tx.hash, gasPOL};
    }catch(e){ return {ok:false, reason:parseRevert(e)}; }
  }

  /**
   * Estima el gas en POL para cualquier función de contrato.
   * @returns { gasUnits: bigint, gasPOL: string, gasUSD: string }
   */
  async function estimateGas(contractAddr, abiName, fnName, args=[]){
    try{
      const c = await contract(contractAddr, abiName, false);
      const gasEst = await c[fnName].estimateGas(...args);
      const { gasPrice } = await provider().getFeeData();
      const gasPOL = window.ethers.formatEther(gasEst * gasPrice);
      // POL ≈ $0.40 USD (hardcoded demo; en prod usar Chainlink POL/USD)
      const gasUSD = (Number(gasPOL) * 0.40).toFixed(4);
      return { gasUnits:gasEst, gasPOL, gasUSD };
    }catch(e){ return { gasUnits:0n, gasPOL:'0', gasUSD:'0' }; }
  }

  return {
    identities, projects, balances:balancesCache, holders:{}, yieldPool:{}, orders:[], events, now:Math.floor(Date.now()/1000),
    registerIdentity:_registerIdentity, revokeIdentity, canTransfer,
    mint:_mint, transfer:_transfer, distributeYield:_distributeYield,
    enableEmission:_enableEmission, disableEmission:_disableEmission,
    pauseEmission:_pauseEmission, unpauseEmission:_unpauseEmission,
    claimableYield, claimYield, createOrder, fillOrder, cancelOrder, createProject, advanceTime,
    // v3.3.0 — ERC-721 / multi-standard
    addQualifiedInvestor, batchMint, redeem, estimateGas,
    updateProject: ()=>{}, // live: estado es on-chain
    bal:(pid,a)=> balancesCache[`${pid}:${a}`] || 0,
    balAsync: bal, refresh, live:true
  };
}

/* hook que anima la evaluación secuencial de checks */
function useGate(){
  const [state,setState]=useState({checks:[],running:false,verdict:null});
  function run(allChecks, onDone){
    setState({checks:allChecks.map(c=>({...c,pending:true})),running:true,verdict:null});
    let i=0;
    const tick=()=>{
      i++;
      if(i<=allChecks.length){
        setState(s=>({...s,checks:allChecks.map((c,idx)=>idx<i?{...c,pending:false}:{...c,pending:true})}));
        setTimeout(tick,360);
      } else {
        const verdict=allChecks.every(c=>c.pass);
        setState({checks:allChecks,running:false,verdict});
        onDone&&onDone(verdict);
      }
    };
    setTimeout(tick,360);
  }
  function reset(){setState({checks:[],running:false,verdict:null})}
  return {...state,run,reset};
}

function AdminMint({chain,toast}){
  const [pid,setPid]=useState(0);
  const [target,setTarget]=useState(DEMO_WALLETS[1].addr);
  const [amount,setAmount]=useState(10);
  const gate=useGate();
  const p=chain.projects.find(x=>x.id===pid);
  function ensureKyc(addr){ const w=DEMO_WALLETS.find(x=>x.addr===addr); if(w&&w.role!=='admin'&&!chain.identities[addr]) chain.registerIdentity(addr,w.jur,w.cat); }
  function mint(){
    const w=DEMO_WALLETS.find(x=>x.addr===target);
    // pre-register kyc if demo wallet has it (except the no-kyc one)
    if(w&&w.label.includes('sin KYC')){} else ensureKyc(target);
    const checks=chain.canTransfer(pid,null,target,amount).checks;
    gate.run(checks,(ok)=>{
      if(ok){const r=chain.mint(pid,target,amount);if(r.ok)toast({title:'Emisión ejecutada',msg:`${amount} ${p.symbol} → ${short(target)}`,hash:txHash()});}
      else toast({type:'err',title:'Emisión bloqueada',msg:'Compliance rechazó al destinatario'});
    });
  }
  return h('div',{className:'row'},
    h('div',{style:{flex:'1 1 55%'}},h('div',{className:'card'},
      h('h3',{style:{fontSize:15,fontWeight:700,marginBottom:14}},'Emisión primaria (mint)'),
      h('div',{className:'field'},h('label',{},'Proyecto'),h('select',{value:pid,onChange:e=>setPid(+e.target.value)},chain.projects.map(x=>h('option',{key:x.id,value:x.id},x.name)))),
      h('div',{className:'field'},h('label',{},'Wallet destino'),h('select',{value:target,onChange:e=>setTarget(e.target.value)},DEMO_WALLETS.filter(w=>w.role!=='admin').map(w=>h('option',{key:w.addr,value:w.addr},w.label)))),
      h('div',{className:'field'},h('label',{},'Cantidad'),h('input',{type:'number',min:1,value:amount,onChange:e=>setAmount(+e.target.value)})),
      h('button',{className:'btn btn-primary',style:{width:'100%'},disabled:gate.running,onClick:mint},gate.running?'Verificando…':'Emitir tokens'),
      h('p',{className:'muted',style:{fontSize:11.5,marginTop:12,lineHeight:1.5}},'Probá con "Inversor · EEUU" en un proyecto solo-ARG para ver el geo-blocking, o "Inversor sin KYC" para ver el rechazo por identidad.')
    )),
    h('div',{style:{flex:'1 1 45%'}},h(ComplianceGate,{checks:gate.checks,running:gate.running,verdict:gate.verdict,title:'Validación de emisión'}))
  );
}

    p.soulbound&&h('div',{className:'card',style:{borderColor:'rgba(255,178,62,.3)',marginBottom:16}},
      h('div',{style:{display:'flex',gap:11,alignItems:'center'}},h(Icon,{d:I.lock,style:{width:18,height:18,color:'var(--amber)'}}),
        h('div',{},h('b',{style:{color:'var(--amber)'}},'Token soulbound'),h('div',{className:'muted',style:{fontSize:12.5}},'Este proyecto está diseñado como ecosistema cerrado (Howey-safe). No tiene mercado secundario — los certificados son intransferibles.')))),
    !p.soulbound&&h('div',{className:'row'},
      /* Panel izquierdo: publicar + compliance gate */
      h('div',{style:{flex:'1 1 38%',display:'flex',flexDirection:'column',gap:16}},
        h('div',{className:'card'},
          h('h3',{style:{fontSize:14,fontWeight:700,marginBottom:14}},'Publicar orden de venta'),
          h('div',{className:'field'},h('label',{},'Cantidad ('+myBal+' disponibles)'),h('input',{type:'number',min:1,max:myBal,value:amount,onChange:e=>setAmount(+e.target.value)})),
          h('div',{className:'field'},h('label',{},'Precio por token (USD)'),h('input',{type:'number',value:price,onChange:e=>setPrice(+e.target.value)})),
          h('button',{className:'btn btn-primary',style:{width:'100%'},disabled:myBal<1,onClick:create},myBal<1?'No tenés tokens':'Publicar orden')),
        h(ComplianceGate,{checks:gate.checks,running:gate.running,verdict:gate.verdict,title:'Validación de la operación'})
      ),
      /* Panel derecho: order book + historial */
      h('div',{style:{flex:'1 1 62%',display:'flex',flexDirection:'column',gap:16}},
        h('div',{className:'card',style:{padding:0,overflowX:'auto'}},
          h('div',{style:{padding:'16px 20px',borderBottom:'1px solid var(--line-solid)',display:'flex',alignItems:'center',gap:10}},

          openOrders.length===0
            ?h('div',{className:'empty'},h(Icon,{d:I.market}),h('div',{},'No hay órdenes abiertas'),h('div',{style:{fontSize:12,marginTop:4}},'Publicá la primera desde el panel izquierdo'))
            :h('table',{},

              h('tbody',{},openOrders.map(o=>{
                /* Validación pasiva de compliance para cada orden */
                const ct=chain.canTransfer(o.pid,o.seller,wallet.addr,o.amount);
                const isOwn=o.seller===wallet.addr;
                const blocked=!ct.allowed&&!isOwn;
                const blockReason=ct.reason;
                return h('tr',{key:o.id},
                  h('td',{className:'mono'},'#'+o.id),

/* ════════════════════════════════════════════════════════════════════
   AdminPitch — el emisor carga su contenido persuasivo
   Aparece en tab "Pitch ✦" del AdminView
   ════════════════════════════════════════════════════════════════════ */
function AdminPitch({chain, toast}){
  const projects = chain.projects||[];
  const [pid,setPid] = useState(0);
  const p = projects[pid]||projects[0]||{};

  // Estado del pitch (se guarda en el proyecto vía updateProject)
  const initPitch = ()=> p.pitch || {
    headline:'', porque:'', bullets:['','',''],
    videoUrl:'', docs:[], scenarios:null
  };
  const [f,setF] = useState(initPitch);
  const upd = (k,v) => setF(s=>({...s,[k]:v}));

  // Cambio de proyecto
  function syncPid(i){ setPid(i); setF(projects[i]?.pitch||{headline:'',porque:'',bullets:['','',''],videoUrl:'',docs:[],scenarios:null}); }

  function addBullet(){ upd('bullets',[...f.bullets,'']); }
  function setBullet(i,v){ const b=[...f.bullets]; b[i]=v; upd('bullets',b); }
  function delBullet(i){ upd('bullets',f.bullets.filter((_,j)=>j!==i)); }

  // Documentos
  function addDoc(name,tipo,url){ upd('docs',[...f.docs,{name,tipo,url,id:Date.now()}]); }
  function delDoc(id){ upd('docs',f.docs.filter(d=>d.id!==id)); }

  function readDocFile(file){
    const reader=new FileReader();
    reader.onload=()=>addDoc(file.name, file.type.includes('pdf')?'pdf':'imagen', reader.result);
    reader.readAsDataURL(file);
  }

  function save(){
    if(chain.updateProject) chain.updateProject(pid,{pitch:{...f}});
    toast&&toast({title:'Pitch guardado',msg:'Los inversores verán este contenido en la ficha del proyecto.'});
  }

  const fs = {width:'100%',padding:'9px 12px',borderRadius:9,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:13,boxSizing:'border-box',fontFamily:'inherit'};
  const DOC_ICONS = {pdf:'📄',imagen:'🖼️',term_sheet:'📋',memoria:'📝',render:'🏗️',otro:'📎'};

  return h('div',{},
    h('div',{className:'eyebrow'},'Contenido para inversores'),
    h('h1',{className:'page'},'Pitch del proyecto'),
    h('p',{className:'page-sub'},'Este contenido aparece en la ficha del proyecto cuando el inversor hace click en el CTA del widget. Es tu espacio para convencer. TOKAI no edita esto — es tu voz como emisor.'),

    // selector de proyecto
    projects.length>1 && h('div',{style:{display:'flex',gap:8,marginBottom:20,flexWrap:'wrap'}},
      projects.map((pr,i)=>h('button',{key:i,onClick:()=>syncPid(i),
        style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontSize:12,fontWeight:600,
          border:'1.5px solid '+(i===pid?'var(--emerald)':'var(--line-solid)'),
          background:i===pid?'rgba(0,214,126,.08)':'var(--panel)',
          color:i===pid?'var(--emerald)':'var(--txt)'}},pr.name))),

    h('div',{style:{display:'grid',gap:14}},

      // 1. Headline
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'① Título del pitch'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:8}},'Una frase que resume por qué vale la pena invertir. Máximo 80 caracteres.'),
        h('input',{value:f.headline,maxLength:80,placeholder:'Ej.: El primer complejo tokenizado del corredor productivo de Mendoza',style:fs,onChange:e=>upd('headline',e.target.value)}),
        h('div',{style:{fontSize:10,color:'var(--txt-mute)',textAlign:'right',marginTop:4}},(f.headline||'').length+'/80')),

      // 2. Por qué invertir
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'② Por qué invertir'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:8}},'Describí el activo, el contexto, la oportunidad y los diferenciales. Máximo 1.500 caracteres.'),
        h('textarea',{value:f.porque,rows:6,maxLength:1500,placeholder:'Ej.: El complejo Grand Alyson se encuentra en la intersección de Ruta Nacional 7 y Acceso Este, el corredor de mayor crecimiento inmobiliario de Mendoza...',style:{...fs,resize:'vertical'},onChange:e=>upd('porque',e.target.value)}),
        h('div',{style:{fontSize:10,color:'var(--txt-mute)',textAlign:'right',marginTop:4}},(f.porque||'').length+'/1500')),

      // 3. Puntos clave
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'③ Puntos clave'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:12}},'De 3 a 6 razones concretas para invertir. Frases cortas, datos si tenés.'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:7}},
          f.bullets.map((b,i)=>h('div',{key:i,style:{display:'flex',gap:7,alignItems:'center'}},
            h('span',{style:{color:'var(--emerald)',fontWeight:700,fontSize:14,flexShrink:0}},'✦'),
            h('input',{value:b,placeholder:'Ej.: Ubicación premium: 8.000 vehículos diarios frente al complejo',style:{...fs,flex:1},onChange:e=>setBullet(i,e.target.value)}),
            f.bullets.length>3&&h('button',{onClick:()=>delBullet(i),style:{background:'none',border:'none',color:'#FF5C5C',cursor:'pointer',fontSize:16,flexShrink:0}},'×')))),
        f.bullets.length<6&&h('button',{onClick:addBullet,style:{marginTop:8,fontSize:12,color:'var(--emerald)',background:'none',border:'none',cursor:'pointer'}},'+  agregar punto')),

      // 4. Video
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'④ Video de presentación (opcional)'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:8}},'URL de YouTube o Vimeo. El video se embebe en la ficha del proyecto.'),
        h('input',{value:f.videoUrl,placeholder:'https://www.youtube.com/watch?v=...',style:fs,onChange:e=>upd('videoUrl',e.target.value)}),
        f.videoUrl && h('div',{style:{marginTop:12,fontSize:12,color:'var(--txt-mute)'}},
          '✓ Video configurado: ',h('span',{style:{color:'var(--emerald)',fontFamily:'var(--mono)',fontSize:11}},f.videoUrl.slice(0,60)+'...'))),

      // 5. Documentos
      h('div',{className:'card'},
        h('div',{style:{fontWeight:700,fontSize:13,color:'var(--emerald)',marginBottom:8}},'⑤ Documentos para inversores'),
        h('div',{style:{fontSize:11.5,color:'var(--txt-mute)',marginBottom:12}},'Subí documentos clave: term sheet, memoria descriptiva, renders, contratos. PDF o imagen.'),
        f.docs.length>0&&h('div',{style:{display:'flex',flexDirection:'column',gap:6,marginBottom:12}},
          f.docs.map(doc=>h('div',{key:doc.id,style:{display:'flex',gap:10,alignItems:'center',padding:'8px 12px',borderRadius:9,background:'rgba(255,255,255,.03)',border:'1px solid var(--line-solid)'}},
            h('span',{style:{fontSize:18}},(DOC_ICONS[doc.tipo]||DOC_ICONS.otro)),
            h('span',{style:{fontSize:12.5,flex:1,color:'var(--txt-dim)'}},(doc.name||doc.tipo)),
            h('button',{onClick:()=>delDoc(doc.id),style:{background:'none',border:'none',color:'#FF5C5C',cursor:'pointer',fontSize:13,flexShrink:0}},'× Quitar')))),
        h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
          h('label',{style:{padding:'8px 14px',borderRadius:9,border:'1px dashed var(--line-solid)',cursor:'pointer',fontSize:12,color:'var(--txt-mute)',display:'flex',gap:6,alignItems:'center'}},
            '📎 Subir documento',
            h('input',{type:'file',accept:'.pdf,image/*',multiple:true,style:{display:'none'},onChange:e=>[...e.target.files].forEach(f2=>readDocFile(f2))})),
          h('button',{onClick:()=>{ const url=prompt('URL del documento (PDF público):'); if(url) addDoc('Documento externo','otro',url); },style:{padding:'8px 14px',borderRadius:9,border:'1px dashed var(--line-solid)',background:'none',cursor:'pointer',fontSize:12,color:'var(--txt-mute)'}},
            '🔗 Agregar URL'))),

      // guardar
      h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        h('button',{className:'btn btn-primary',onClick:save},'Guardar pitch'),
        h('div',{style:{fontSize:12,color:'var(--txt-mute)'}},'Visible para inversores en la ficha del proyecto.'))
    )
  );
}

/* Inspirada en la ficha de Reental: ubicación, rentabilidad, plazo,
   proyección económica, simulador. Pero con honestidad de liquidez
   (mercado permisionado) y el régimen regulatorio al frente.          */
function AssetDetail({chain,wallet,pid,toast,go}){
  const _raw = chain.projects.find(x=>x.id===pid) || chain.projects[0] || {};
  // normalización defensiva: en modo live los proyectos vienen de la cadena sin
  // metadata de ficha. Rellenamos con defaults seguros para no romper el render.
  const p = Object.assign({
    name:'—', symbol:'—', vertical:'—', location:'—', assetType:'—', status:'On-chain',
    banner:'linear-gradient(135deg,#0d2847,#1a4d8f)', soulbound:false, regime:'—',
    termMonths:0, yieldAnnualPct:0, plusvaliaPct:0, payoutFreq:'No aplica',
    priceUsdCents:0, valuationUsd:0, maxSupply:0, totalSupply:0, raised:0, lockupDays:0,
    jurisdictions:[], docs:[], tranches:[], tokenProfiles:[], proforma:null,
    ronda:1, rondaLabel:'Clasificación', yieldMechanism:'A',
    yieldSource:'—'
  }, _raw);
  const userJur = (chain.identities[wallet.addr]?.jur) || wallet.jur;
  const isGeofenced = chain.blockedJurisdictions.includes(userJur);

  if (wallet.role !== 'admin' && isGeofenced) {
    return h('div', {style:{maxWidth:640, margin:'0 auto', paddingTop:40}},
      h('div', {className:'card', style:{borderColor:'var(--red)', background:'rgba(255, 92, 92, 0.03)', padding:'40px 32px', textAlign:'center', borderRadius:16}},
        h(Icon, {d:I.shield, style:{width:64, height:64, color:'var(--red)', marginBottom:20}}),
        h('h1', {style:{fontSize:22, fontWeight:800, color:'var(--red)', marginBottom:12}}, 'Acceso Restringido por Geofencing'),
        h('p', {style:{fontSize:14, lineHeight:1.6, color:'var(--txt)', marginBottom:24}},
          `Tu jurisdicción detectada (${JUR[userJur] || 'ISO '+userJur}) se encuentra actualmente restringida para la oferta y suscripción de este activo digital RWA.`
        ),
        h('div', {className:'card', style:{background:'var(--black)', padding:16, border:'1.5px dashed rgba(255, 92, 92, 0.2)', marginBottom:24, textAlign:'left'}},
          h('h4', {style:{fontSize:13, fontWeight:700, color:'var(--red)', marginBottom:6}}, 'Cumplimiento Normativo (Compliance Gate)'),
          h('p', {className:'muted', style:{fontSize:12, lineHeight:1.5}},
            'De acuerdo con las regulaciones de la CNV argentina, la SEC de EE.UU. (Reg D) y normativas de prevención contra el lavado de dinero de GAFI, la oferta pública de este activo no está autorizada para inversores de tu región geográfica actual.'
          )
        ),
        h('div', {style:{display:'flex', gap:12, justifyContent:'center'}},
          h('button', {className:'btn btn-ghost', onClick:()=>go('dash')}, '← Volver al Portal'),
          h('button', {className:'btn btn-primary', style:{background:'var(--red)', border:'none'}, onClick:()=>{
            toast({
              title: 'Soporte Normativo',
              msg: 'Por consultas de acreditación internacional, ponete en contacto con compliance@tokai.com.'
            });
          }}, 'Contactar Compliance')
        )
      )
    );
  }

  const profiles = p.tokenProfiles || [];
  const [lightbox,setLightbox] = useState(null);
  const [profileKey,setProfileKey] = useState(profiles[0]?profiles[0].key:null);
  const profile = profiles.find(x=>x.key===profileKey) || profiles[0] || null;
  const [tokens,setTokens] = useState(10);
  // el simulador usa el rendimiento del PERFIL elegido (tramo del waterfall), no el global
  const effYield = profile ? profile.yieldPct : p.yieldAnnualPct;
  const effPlus = profile ? profile.plusvalia : p.plusvaliaPct;
  const invertido = (p.priceUsdCents/100)*tokens;
  const rentaAnual = invertido*(effYield/100);
  const rentaPeriodo = p.payoutFreq==='Mensual'?rentaAnual/12:p.payoutFreq==='Trimestral'?rentaAnual/4:rentaAnual;
  const plusvalia = invertido*(effPlus/100);
  const totalRetorno = rentaAnual*(p.termMonths/12)+plusvalia;
  const roiTotal = invertido>0?(totalRetorno/invertido*100):0;
  const pct = p.maxSupply?Math.min(100,Math.round(p.totalSupply/p.maxSupply*100)):0;
  const MECH = {A:{t:'Distribución periódica (push de yield)',d:'El emisor cobra el flujo, lo convierte a USDC y lo reparte pro-rata. Reclamás con claimYield().'},
    B:{t:'Amortización + waterfall',d:'La cuota (capital + interés) se reparte por tramos en cascada. El First Loss absorbe la mora antes que el Senior.'},
    C:{t:'Sin flujo financiero (Howey-safe)',d:'Ecosistema cerrado. El token da acceso y beneficios, nunca renta en fiat. El contrato no distribuye nada económico.'}};
  const mech = MECH[p.yieldMechanism] || MECH.A;

  const pitch = p.pitch||null;
  const hasVideo = pitch&&pitch.videoUrl&&(pitch.videoUrl.includes('youtube')||pitch.videoUrl.includes('youtu.be')||pitch.videoUrl.includes('vimeo'));
  function ytEmbed(url){
    const m=url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m?'https://www.youtube.com/embed/'+m[1]:url.replace('vimeo.com/','player.vimeo.com/video/');
  }

/* ─────────────────────── MODAL CANJE PRE-GAT → GAT ─────────────────────── */
/* Glassmorphism premium — reemplaza window.confirm en el flujo de redeem ERC-721  */
function RedeemModal({p, bal, onClose, onSuccess, chain, toast}){
  const [selectedId,setSelectedId]=useState(1);
  const [confirmed,setConfirmed]=useState(false);
  const [loading,setLoading]=useState(false);
  const [gasInfo,setGasInfo]=useState({gasPOL:'~0.00004',gasUSD:'~0.016'});

  useEffect(function(){
    if(!chain.estimateGas||!p.token) return;
    chain.estimateGas(p.token,'GATCertificate','redeem',[selectedId])
      .then(function(g){ setGasInfo(g); }).catch(function(){});
  },[selectedId]);

  async function doRedeem(){
    if(!confirmed||!selectedId||loading) return;
    setLoading(true);
    try{
      const r=chain.redeem ? await chain.redeem(p,selectedId) : {ok:false,reason:'Conectá MetaMask para operar on-chain'};
      if(r&&r.ok) onSuccess(selectedId,r.hash||null);
      else toast&&toast({type:'err',title:'Error en canje',msg:r?.reason||'Intentá de nuevo'});
    }finally{ setLoading(false); }
  }

  const finalSymbol = p.symbol ? p.symbol.replace(/PRE-?/i,'') : 'GAT';

  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',backdropFilter:'blur(10px)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}},
    h('div',{style:{maxWidth:490,width:'100%',background:'linear-gradient(145deg,rgba(16,20,32,.97),rgba(10,14,24,.99))',border:'1px solid rgba(0,214,126,.18)',boxShadow:'0 0 0 1px rgba(255,255,255,.04),0 32px 80px rgba(0,0,0,.7)',borderRadius:20,padding:28,position:'relative'}},
      h('button',{onClick:onClose,disabled:loading,style:{position:'absolute',top:16,right:18,background:'none',border:'none',color:'var(--txt-mute)',cursor:'pointer',fontSize:22,lineHeight:1}},'×'),
      h('div',{style:{fontWeight:800,fontSize:16,marginBottom:3}},'Canje de Certificado PRE-GAT'),
      h('div',{style:{fontSize:12,color:'var(--txt-mute)',marginBottom:18}},'Operación irreversible on-chain — leé atentamente antes de confirmar'),

      /* Flujo visual quema → recibe */
      h('div',{style:{display:'flex',alignItems:'stretch',borderRadius:14,overflow:'hidden',border:'1px solid rgba(255,255,255,.06)',marginBottom:18}},
        h('div',{style:{flex:1,padding:'14px 16px',background:'rgba(255,92,92,.05)',textAlign:'center'}},
          h('div',{style:{fontSize:9,color:'var(--txt-mute)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:5}},'Se quema'),
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:800,fontSize:17,color:'#FF5C5C'}},p.symbol||'PRE-GAT'),
          h('div',{style:{fontSize:10,color:'var(--txt-dim)',marginTop:3}},'Token ID #'+selectedId)),
        h('div',{style:{display:'flex',alignItems:'center',padding:'0 14px',color:'var(--txt-mute)',fontSize:20,background:'rgba(255,255,255,.02)'}},'→'),
        h('div',{style:{flex:1,padding:'14px 16px',background:'rgba(0,214,126,.04)',textAlign:'center'}},
          h('div',{style:{fontSize:9,color:'var(--txt-mute)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:5}},'Recibís'),
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:800,fontSize:17,color:'var(--emerald)'}},finalSymbol),
          h('div',{style:{fontSize:10,color:'var(--txt-dim)',marginTop:3}},'Token definitivo'))),

      /* Selector de NFT IDs (IDs 1..bal, máx 12 visibles) */
      h('div',{style:{marginBottom:16}},
        h('div',{style:{fontSize:12,fontWeight:600,color:'var(--txt)',marginBottom:8}},'Seleccioná el NFT a canjear'),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
          Array.from({length:Math.min(bal,12)},(_,i)=>i+1).map(function(id){
            const sel=id===selectedId;
            return h('button',{key:id,onClick:function(){ setSelectedId(id); setConfirmed(false); },
              style:{padding:'7px 13px',borderRadius:9,cursor:'pointer',fontFamily:'var(--mono)',fontSize:12.5,fontWeight:sel?700:400,
                border:'1.5px solid '+(sel?'var(--emerald)':'rgba(255,255,255,.08)'),
                background:sel?'rgba(0,214,126,.1)':'rgba(255,255,255,.02)',
                color:sel?'var(--emerald)':'var(--txt)',transition:'all .12s'}},'#'+id);
          })),
        bal>12&&h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginTop:6}},'… y '+(bal-12)+' NFTs más. Ingresá el ID:')),

      /* Gas estimado */
      h('div',{style:{marginBottom:18,padding:'11px 14px',borderRadius:11,background:'rgba(0,214,126,.04)',border:'1px solid rgba(0,214,126,.12)',display:'flex',alignItems:'center',gap:12}},
        h('span',{style:{fontSize:20}},'⛽'),
        h('div',{},
          h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginBottom:2}},'Gas estimado para este canje'),
          h('div',{style:{fontFamily:'var(--mono)',fontWeight:700,fontSize:13}},
            gasInfo.gasPOL,' POL',
            h('span',{style:{fontWeight:400,color:'var(--txt-mute)',marginLeft:8}},'≈ USD '+gasInfo.gasUSD),
            h('span',{style:{fontSize:10,color:'var(--txt-mute)',marginLeft:6}},'(POL demo ≈ $0.40)')))),

      /* Checkbox de confirmación irreversible */
      h('label',{style:{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer',marginBottom:20,padding:'12px 14px',borderRadius:10,background:'rgba(255,178,62,.04)',border:'1px solid rgba(255,178,62,.12)'}},
        h('input',{type:'checkbox',checked:confirmed,onChange:function(e){ setConfirmed(e.target.checked); },style:{width:15,height:15,marginTop:1,accentColor:'var(--emerald)',flexShrink:0}}),
        h('span',{style:{fontSize:12,color:'var(--txt-dim)',lineHeight:1.5}},
          'Entiendo que el NFT ',h('strong',{style:{fontFamily:'var(--mono)',color:'#FF5C5C'}},'#'+selectedId),
          ' será ',h('strong',{},'quemado permanentemente'),' y que esta operación no puede revertirse. Recibiré el token definitivo ',
          h('strong',{style:{color:'var(--emerald)'}},finalSymbol),' en 3–5 días hábiles.')),

      /* Botones */
      h('div',{style:{display:'flex',gap:10}},
        h('button',{className:'btn btn-ghost',style:{flex:1},onClick:onClose,disabled:loading},'Cancelar'),
        h('button',{className:'btn btn-primary',style:{flex:1,opacity:(!confirmed||loading)?0.45:1},disabled:!confirmed||loading,onClick:doRedeem},
          loading?'Procesando…':'Confirmar canje #'+selectedId)))
  );
}

function PortfolioView({chain,wallet,toast,go}){
  const id = chain.identities[wallet.addr];
  const positions = chain.projects.map(p=>({p,bal:chain.bal(p.id,wallet.addr),claimable:chain.claimableYield(p.id,wallet.addr)})).filter(x=>x.bal>0);
  const totalValue = positions.reduce((s,x)=>s+x.bal*(x.p.priceUsdCents/100),0);
  const totalClaimable = positions.reduce((s,x)=>s+x.claimable,0);
  const [redeemModal,setRedeemModal]=useState(null);
  const [pendingRedemptions,setPendingRedemptions]=useState([]);

  function claimAll(){
    let total=0;
    positions.forEach(x=>{ if(x.claimable>0){ const r=chain.claimYield(x.p.id,wallet.addr); if(r.ok)total+=r.amount; } });
    if(total>0)toast({title:'Yield reclamado',msg:'USD '+fmt(total)+' acreditados de todos los proyectos'});
    else toast({type:'warn',title:'Nada para reclamar',msg:'No tenés yield pendiente'});
  }

  return h('div',{},
    h('div',{className:'eyebrow'},'Mi cartera'),
    h('h1',{className:'page'},'Posición consolidada'),
    h('p',{className:'page-sub'},'Todas tus inversiones en un solo lugar: balance, renta acumulada y acciones rápidas. Como inversor verificado, operás en todos los proyectos compatibles con tu jurisdicción.'),
    !id||!id.verified?h('div',{className:'card',style:{textAlign:'center',padding:'40px'}},
      h(Icon,{d:I.wallet,style:{width:36,height:36,margin:'0 auto 14px',opacity:.4}}),
      h('h3',{style:{fontSize:16,fontWeight:700,marginBottom:6}},'Verificá tu identidad para empezar'),
      h('p',{className:'muted',style:{fontSize:13,marginBottom:16}},'Necesitás KYC aprobado para invertir y ver tu cartera.'),
      h('button',{className:'btn btn-primary',onClick:()=>go('invest')},'Ir a verificación')
    ):h('div',{},
      // resumen

function AdminGeofencing({chain, toast}){
  const countries = [

    {code: 76, name: 'Brasil', flag: '🇧🇷', desc: 'Sujeto a normativas de la CVM brasilera.'}

  return h('div', {className:'card', style:{padding:24}},
    h('h2', {style:{fontSize:17, fontWeight:700, marginBottom:8}}, 'Gobernanza de Geofencing'),

      'Restringí el acceso de inversores de forma preventiva según su origen geográfico. Cuando un país se encuentra restringido, los inversores asociados a esa jurisdicción no podrán suscribir capital ni acceder al detalle de los activos tokenizados, previniendo ofertas públicas accidentales.'

        return h('div', {key:c.code, className:'card', style:{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 20px', border:'1px solid '+(isBlocked ? 'rgba(255, 92, 92, 0.25)' : 'rgba(0, 214, 126, 0.25)'), background:isBlocked ? 'rgba(255, 92, 92, 0.03)' : 'rgba(0, 214, 126, 0.03)'}},
          h('div', {style:{display:'flex', alignItems:'center', gap:14}},
            h('span', {style:{fontSize:32}}, c.flag),
            h('div', {},
              h('div', {style:{fontWeight:700, display:'flex', alignItems:'center', gap:8}}, 
                c.name, 
                h('span', {style:{fontSize:11, fontFamily:'var(--mono)', color:'var(--txt-mute)'}}, '(ISO '+c.code+')'),
                isBlocked && h('span', {className:'badge red', style:{fontSize:9}}, 'Restringido')

            onClick: () => {
              chain.toggleJurisdictionBlock(c.code);
              toast({
                title: isBlocked ? 'Acceso Habilitado' : 'Acceso Restringido',
                msg: `${c.name} ahora se encuentra ${isBlocked ? 'habilitado' : 'bloqueado'} preventivamente.`
              });
            }
          }, isBlocked ? 'Habilitar acceso' : 'Restringir acceso')
        );
      })
    )
  );
}

function GuideView({chain, role, go, setRole}){
  const [guideRole, setGuideRole] = useState(role && GUIDES[role] ? role : 'investor');
  const [step, setStep] = useState(0);
  const g = GUIDES[guideRole];
  const steps = g.steps;
  const s = steps[step];
  const pct = Math.round(((step+1)/steps.length)*100);

  function pick(r){ setGuideRole(r); setStep(0); }
  function tryIt(){
    const v = s.action.view;
    // la vista real puede exigir un rol específico
    if(['invest','portfolio'].includes(v) && setRole) setRole('investor');
    else if(v==='admin' && setRole) setRole('issuer');
    else if(v==='tokai' && setRole) setRole('tokai');
    go(v);
  }

  return h('div',{},
    h('div',{className:'eyebrow'},'Manual interactivo'),
    h('h1',{className:'page'},'Guía de uso de la plataforma'),
    h('p',{className:'page-sub'},'Aprendé a usar TOKAI según tu rol. Elegí abajo y seguí los pasos — desde cada paso podés saltar a la vista real para probarlo.'),

    // selector de rol
    h('div',{style:{display:'flex',gap:10,marginBottom:22,flexWrap:'wrap'}},
      Object.entries(GUIDES).map(([k,v])=>h('button',{key:k,onClick:()=>pick(k),
        style:{flex:'1 1 180px',textAlign:'left',padding:'14px 16px',borderRadius:12,cursor:'pointer',
          border:'1.5px solid '+(guideRole===k?v.color:'var(--line-solid)'),
          background:guideRole===k?v.color+'14':'var(--panel)',transition:'all .15s'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
          h('span',{style:{width:9,height:9,borderRadius:'50%',background:v.color,display:'inline-block'}}),
          h('span',{style:{fontWeight:700,fontSize:14,color:guideRole===k?v.color:'var(--txt)'}},v.label)),
        h('div',{style:{fontSize:11,color:'var(--txt-mute)',lineHeight:1.4}},v.intro.slice(0,72)+'…'))) ),

    // progreso
    h('div',{className:'between',style:{marginBottom:8,fontSize:12}},
      h('span',{className:'muted'},'Paso '+(step+1)+' de '+steps.length),
      h('span',{className:'mono',style:{color:g.color}},pct+'%')),
    h('div',{className:'proj-progress',style:{marginBottom:20}},
      h('div',{className:'proj-progress-fill',style:{width:pct+'%',background:g.color}})),

    // tarjeta del paso
    h('div',{className:'card',style:{borderColor:g.color+'40',marginBottom:16}},
      h('div',{style:{display:'flex',gap:14,alignItems:'flex-start'}},
        h('div',{style:{flexShrink:0,width:38,height:38,borderRadius:10,background:g.color+'18',color:g.color,
          display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:17}},step+1),
        h('div',{style:{flex:1}},
          h('h2',{style:{fontSize:18,fontWeight:700,marginBottom:8}},s.title),
          h('p',{style:{fontSize:13.5,lineHeight:1.6,color:'var(--txt-dim)',marginBottom:s.tip?12:0}},s.body),
          s.tip&&h('div',{style:{display:'flex',gap:8,padding:'10px 12px',borderRadius:9,background:'var(--black)',borderLeft:'2px solid '+g.color}},
            h('span',{style:{color:g.color,fontWeight:700,fontSize:11,flexShrink:0,marginTop:1}},'TIP'),
            h('span',{style:{fontSize:12,color:'var(--txt-mute)',lineHeight:1.5}},s.tip)),
          s.action&&h('button',{className:'btn btn-primary btn-sm',style:{marginTop:14,background:g.color,borderColor:g.color},onClick:tryIt},
            s.action.label+' →')))),

    // navegación de pasos
    h('div',{className:'between',style:{marginBottom:24}},
      h('button',{className:'btn btn-ghost btn-sm',disabled:step===0,style:step===0?{opacity:.4}:{},onClick:()=>setStep(Math.max(0,step-1))},'← Anterior'),
      h('div',{style:{display:'flex',gap:6}},
        steps.map((_,i)=>h('button',{key:i,onClick:()=>setStep(i),'aria-label':'Paso '+(i+1),
          style:{width:9,height:9,borderRadius:'50%',border:'none',cursor:'pointer',padding:0,
            background:i===step?g.color:i<step?g.color+'80':'var(--line-solid)'}}))),
      step<steps.length-1
        ? h('button',{className:'btn btn-primary btn-sm',style:{background:g.color,borderColor:g.color},onClick:()=>setStep(step+1)},'Siguiente →')
        : h('button',{className:'btn btn-ghost btn-sm',onClick:()=>setStep(0)},'Reiniciar')),

    // FAQ
    h('h2',{style:{fontSize:16,fontWeight:700,marginBottom:12}},'Preguntas frecuentes · '+g.label),
    h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
      g.faq.map(([q,a],i)=>h('div',{key:i,className:'card',style:{padding:'14px 16px'}},
        h('div',{style:{fontWeight:700,fontSize:13,marginBottom:5,color:g.color}},q),
        h('div',{style:{fontSize:12.5,color:'var(--txt-dim)',lineHeight:1.55}},a))))
  );
}

   TOKAI Platform — Modo simple + login dual (views5)

/* ---------- LoginGate: email (Web2) o wallet ---------- */
/* ── Admin role asignado por el backend según JWT (no hardcodeado en frontend) ── */
var TOKAI_ADMIN_EMAILS = [];

/* ── Emails de emisores aprobados (persistidos en localStorage por TOKAI) ── */
function getApprovedEmitters() {
  try {
    var raw = localStorage.getItem('tokai_approved_emitters');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function saveApprovedEmitter(email, data) {
  try {
    var list = getApprovedEmitters();
    var exists = list.find(function(e){ return e.email === email; });
    if (!exists) list.push(Object.assign({ email: email, approvedAt: Date.now() }, data || {}));
    localStorage.setItem('tokai_approved_emitters', JSON.stringify(list));
  } catch(e) {}
}
function removeApprovedEmitter(email) {
  try {
    var list = getApprovedEmitters().filter(function(e){ return e.email !== email; });
    localStorage.setItem('tokai_approved_emitters', JSON.stringify(list));
  } catch(e) {}
}

function LoginGate({onLogin, web3, toast}){
  const [email,setEmail]     = useState('');
  const [tab,setTab]         = useState('email');
  const [phase,setPhase]     = useState('input');   // input | otp | signing
  const [otp,setOtp]         = useState('');
  const [generatedOtp,setGeneratedOtp] = useState('');
  const [sending,setSending] = useState(false);
  const [error,setError]     = useState('');

  /* ── Generar OTP de 6 dígitos y "enviarlo" ──────────────────────
     En producción: POST /api/auth/send-otp → backend envía email real.
     En demo: el código aparece en pantalla (tooltip dorado) para testing.
     La lógica es idéntica — solo cambia si el código se muestra o se envía.   */
  async function sendOtp() {
    const v = email.trim().toLowerCase();
    if(!/^[^@]+@[^@]+\.[^@]+$/.test(v)){
      setError('Ingresá un email válido.'); return;
    }
    setError('');
    setSending(true);

    if(window.__API_URL__) {
      try {
        const res = await fetch(window.__API_URL__ + '/auth/otp/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: v }),
        });
        if(res.status === 429) {
          const errData = await res.json().catch(()=>({}));
          const msg = errData.error || 'Demasiados intentos.';
          setError(msg + ' Hacé clic en "Enviar código" de nuevo cuando estés listo.');
          setSending(false); return;
        }
        if(!res.ok) { setError('Error al enviar. Intentá de nuevo.'); setSending(false); return; }
        setSending(false);
        setPhase('otp');
        toast&&toast({ title: 'Código enviado', msg: 'Revisá tu bandeja de ' + v + '.' });
      } catch(e) {
        setError('No se pudo conectar con el servidor.'); setSending(false);
      }
      return;
    }

    /* Modo demo: mostrar código en pantalla */
    await new Promise(r=>setTimeout(r,900));
    const code = String(Math.floor(100000 + Math.random() * 900000));
    setGeneratedOtp(code);
    setSending(false);
    setPhase('otp');
    toast&&toast({
      title: 'Código enviado',
      msg: 'Demo: el código aparece en pantalla.',
    });
  }

  /* ── Verificar OTP ─────────────────────────────────────────────── */
  async function verifyOtp() {
    const v = email.trim().toLowerCase();

    if(window.__API_URL__) {
      setSending(true);
      try {
        const res = await fetch(window.__API_URL__ + '/auth/otp/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: v, code: otp.trim() }),
        });
        const data = await res.json();
        if(!res.ok) { setError(data.message || 'Código incorrecto.'); setSending(false); return; }
        setSending(false);
        setError('');
        const backendRole = data.user.role;
        const frontRole = backendRole === 'admin' ? 'tokai' : backendRole;
        onLogin({
          method: 'email', id: data.user.email,
          label: backendRole === 'admin' ? 'TOKAI Admin' : data.user.email.split('@')[0],
          role: frontRole,
          isAdmin: backendRole === 'admin',
          approved: data.user.status === 'approved',
        });
      } catch(e) {
        setError('Error de conexión. Intentá de nuevo.'); setSending(false);
      }
      return;
    }

    /* Modo demo */
    if(otp.trim() !== generatedOtp){
      setError('Código incorrecto. Revisá el email o solicitá uno nuevo.'); return;
    }
    setError('');
    if(TOKAI_ADMIN_EMAILS.indexOf(v) !== -1){
      onLogin({method:'email', id:v, label:'TOKAI Admin', role:'tokai', isAdmin:true});
      return;
    }
    const approved = getApprovedEmitters().find(function(e){ return e.email===v; });
    if(approved){
      onLogin({method:'email', id:v, label:v.split('@')[0], role:'issuer', approved:true, approvalData:approved});
      return;
    }
    onLogin({method:'email', id:v, label:v.split('@')[0], role:'issuer', approved:false});
  }

  function resetToInput() { setPhase('input'); setOtp(''); setGeneratedOtp(''); setError(''); }

  /* ── Login con wallet: pide firma del desafío ─────────────────── */
  async function loginWallet(){
    if(web3&&web3.available){
      setPhase('signing');
      const ok = await web3.connect();
      if(ok){
        setPhase('input');
        onLogin({method:'wallet', id:web3.account, label:short(web3.account), role:'investor', approved:true});
        return;
      }
      setPhase('input');
      if(web3.error) toast&&toast({type:'err',title:'Error',msg:web3.error});
      else setPhase('input');
    } else {
      onLogin({method:'wallet', id:'0xDEMO', label:'Wallet demo', role:'investor', approved:true});
    }
  }

  const inp = {width:'100%',padding:'12px 14px',borderRadius:9,border:'1px solid var(--line-solid)',background:'var(--black)',color:'var(--txt)',fontSize:14,boxSizing:'border-box'};
  const inpOtp = Object.assign({},inp,{letterSpacing:'0.35em',fontSize:22,fontWeight:700,textAlign:'center',fontFamily:'var(--mono)'});

  return h('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'var(--black)'}},
    h('div',{style:{width:'100%',maxWidth:380}},

/* ---------- HomeEmisor: "¿Qué querés hacer?" ---------- */
function HomeEmisor({chain, auth, go, wallet, connectWallet}){
  const mine = (chain.projects||[]);
  const mainProject = mine[0]||null;

  /* Próxima acción según etapa */
  function nextAction(p) {
    if(!p) return {label:'Crear tu primer proyecto', view:'wizard', color:'var(--emerald)', urgent:true};
    const s = getProjectStage(p);
    if(s===1) return {label:'TOKAI está analizando tu proyecto', view:null, color:'#FFB23E', urgent:false};
    if(s===2) return {label:'Revisá la tesis de valor que TOKAI te envió', view:'thesis-client', color:'#FFB23E', urgent:true};
    if(s===3) return {label:'Revisá el reporte del modelo de negocio', view:'thesis-client', color:'#FFB23E', urgent:!!p.reportSentToClient};
    if(s===4) return {label:'TOKAI está configurando el contrato', view:null, color:'#9AA0A6', urgent:false};
    if(s===5) {
      if(!wallet||!wallet.addr) return {label:'Conectá tu wallet MetaMask para recibir la habilitación', view:null, color:'#FFB23E', urgent:true, walletNeeded:true};
      return {label:'TOKAI va a habilitar tu emisión pronto', view:null, color:'#9AA0A6', urgent:false};
    }
    if(s===6) return {label:'¡Podés emitir tokens! Andá a Emisión', view:'admin', color:'var(--emerald)', urgent:true};
    if(s===7) return {label:'Tu proyecto está activo y distribuyendo', view:'admin', color:'var(--emerald)', urgent:false};
    return {label:'Crear tu primer proyecto', view:'wizard', color:'var(--emerald)', urgent:true};
  }

  const next = nextAction(mainProject);

  return h('div',{},
    h('div',{className:'eyebrow'},'Hola'+(auth&&auth.label?', '+auth.label:'')),
    h('h1',{className:'page'},'Mi panel de emisor'),

    /* Wallet status */
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'10px 14px',borderRadius:10,marginBottom:16,
      background:wallet&&wallet.addr?'rgba(0,214,126,.06)':'rgba(255,178,62,.06)',
      border:'1px solid '+(wallet&&wallet.addr?'rgba(0,214,126,.2)':'rgba(255,178,62,.2)')}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{width:8,height:8,borderRadius:'50%',background:wallet&&wallet.addr?'var(--emerald)':'#FFB23E'}}),
        wallet&&wallet.addr
          ? h('span',{style:{fontSize:12,color:'var(--txt-dim)'}},'Wallet conectada: ',h('span',{style:{fontFamily:'var(--mono)',fontSize:11,color:'var(--emerald)'}},'0x…'+wallet.addr.slice(-6)))
          : h('span',{style:{fontSize:12,color:'#FFB23E'}},'Wallet no conectada')),
      !wallet||!wallet.addr
        ? h('button',{className:'btn btn-ghost btn-sm',style:{borderColor:'rgba(255,178,62,.4)',color:'#FFB23E'},
            onClick:()=>{if(connectWallet)connectWallet();else toast&&toast({title:'Conectar',msg:'Usá el botón de wallet en el menú superior.'});}},
            '🦊 Conectar MetaMask')
        : mainProject && !mainProject.issuerWallet && h('button',{className:'btn btn-ghost btn-sm',
            onClick:()=>{if(chain.updateProject)chain.updateProject(0,{issuerWallet:wallet.addr});},
            style:{fontSize:11}},'Vincular wallet al proyecto')),

    /* Progress bar del proyecto principal */
    mainProject && h('div',{className:'card',style:{marginBottom:14}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}},
        h('div',{},
          h('div',{style:{fontWeight:700,fontSize:14}},mainProject.name),
          h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginTop:2}},mainProject.vertical+' · '+mainProject.symbol)),
        h('div',{style:{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,
          background:next.urgent?'rgba(0,214,126,.12)':'rgba(255,255,255,.05)',
          color:next.urgent?'var(--emerald)':'var(--txt-mute)',
          border:'1px solid '+(next.urgent?'rgba(0,214,126,.25)':'rgba(255,255,255,.06)')}},
          'Etapa '+getProjectStage(mainProject)+'/7')),
      h(FlowProgress,{project:mainProject}),

      /* Próxima acción */
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'11px 13px',borderRadius:9,marginTop:10,
        background:next.urgent?'rgba(0,214,126,.06)':'rgba(255,255,255,.03)',
        border:'1px solid '+(next.urgent?'rgba(0,214,126,.2)':'rgba(255,255,255,.06)')}},
        h('div',{style:{fontSize:13,color:next.urgent?'var(--txt)':'var(--txt-dim)'}},
          next.urgent?'👉 ':' ',next.label),
        next.view && h('button',{className:'btn btn-primary btn-sm',onClick:()=>go(next.view)},'Ir →'))),

    /* Acciones rápidas */
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:mine.length>1?16:0}},
      [
        {k:'admin', label:'Mis proyectos', desc:'Emisión, yield, identidades', icon:'M3 7h18M3 12h18M3 17h18', color:'#4DA8FF'},
        {k:'thesis-client', label:'Tesis de valor', desc:'Revisar y confirmar', icon:'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5', color:'#A78BFA'},
        mine.length===0 && {k:'wizard', label:'Crear proyecto', desc:'Tokenizá tu activo', icon:'M12 5v14M5 12h14', color:'var(--emerald)'},
        {k:'guide', label:'Cómo funciona', desc:'Guía del proceso', icon:'M12 17v.01M12 13a2 2 0 10-2-2', color:'#9AA0A6'},
      ].filter(Boolean).map(a=>h('button',{key:a.k,onClick:()=>go(a.k),
        style:{textAlign:'left',padding:'14px 16px',borderRadius:12,cursor:'pointer',
          border:'1px solid var(--line-solid)',background:'var(--panel)',
          display:'flex',gap:12,alignItems:'center',transition:'all .15s'},
        onMouseEnter:e=>{e.currentTarget.style.borderColor=a.color;e.currentTarget.style.background='rgba(255,255,255,.04)';},
        onMouseLeave:e=>{e.currentTarget.style.borderColor='var(--line-solid)';e.currentTarget.style.background='var(--panel)';}},
        h('div',{style:{width:36,height:36,borderRadius:9,background:a.color+'18',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
          h('svg',{viewBox:'0 0 24 24',fill:'none',stroke:a.color,strokeWidth:2,style:{width:18,height:18}},h('path',{d:a.icon,strokeLinecap:'round',strokeLinejoin:'round'}))),
        h('div',{},
          h('div',{style:{fontSize:13,fontWeight:700,marginBottom:2}},a.label),
          h('div',{style:{fontSize:11,color:'var(--txt-mute)'}},a.desc))))),

    /* Proyectos adicionales */
    mine.length>1 && h('div',{},
      h('div',{style:{fontSize:11,color:'var(--txt-mute)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.07em'}},'Tus proyectos ('+mine.length+')'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:6}},
        mine.map((p,i)=>h('button',{key:p.id,onClick:()=>go('asset',p.id),
          style:{textAlign:'left',padding:'10px 13px',borderRadius:9,cursor:'pointer',
            border:'1px solid var(--line-solid)',background:'var(--panel)',
            display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',{},
            h('div',{style:{fontWeight:600,fontSize:12.5}},p.name),
            h('div',{style:{fontSize:10,color:'var(--txt-mute)',marginTop:1}},'Etapa '+getProjectStage(p)+'/7 · '+p.symbol)),
          h(FlowProgress,{project:p,compact:true})))))
  );
}

  // Sellado BFA: calcula SHA-256 del ArrayBuffer de la imagen → hex → sello demo con delay dramático de carga
  async function sealPhoto(file, dataCb){

    const ab = await file.arrayBuffer();
    const hashBuf = await crypto.subtle.digest('SHA-256', ab);
    const hashHex = Array.from(new Uint8Array(hashBuf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    const seal = { name:file.name, hash:hashHex, ts:Date.now(), bfaTx:'0x'+hashHex.slice(0,16)+'…(demo)' };
    
    // Feedback visual del hashing on-chain
    await new Promise(r => setTimeout(r, 1600));
    
    const reader = new FileReader();
    reader.onload = ()=>{
      dataCb(reader.result, seal);
      setSealing(false);
      setSealingFile('');
    };
    reader.readAsDataURL(file);
  }
