<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TOKAI RWA - Tokenizacion de activos reales</title>
  <desc id="desc">Preview social de TOKAI RWA, laboratorio de estructuracion, tokenizacion y compliance para activos reales.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050706"/>
      <stop offset="0.55" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#0B1F16"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D67E"/>
      <stop offset="1" stop-color="#007A4D"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 495 C240 420 385 575 630 475 C865 378 1030 435 1200 355 L1200 630 L0 630 Z" fill="#07130E"/>
