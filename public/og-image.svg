    <rect x="42" y="0" width="32" height="32" rx="5" fill="url(#emerald)" opacity="0.75"/>
    <rect x="84" y="0" width="32" height="32" rx="5" fill="url(#emerald)"/>
    <rect x="21" y="42" width="32" height="32" rx="5" fill="url(#emerald)" opacity="0.55"/>
